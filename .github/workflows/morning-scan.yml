name: Daily Morning Job Scan

on:
  schedule:
    # 09:00 UTC = 11:00 AM CEST / 10:00 AM CET
    - cron: '0 9 * * *'
  workflow_dispatch: # Allows you to trigger the scan manually from the GitHub UI anytime

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          npx playwright install chromium --with-deps

      - name: Run LinkedIn Scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node morning-berlin-scan.mjs

      - name: Run Direct ATS + BMW Scraper
        run: node morning-berlin-direct-scan.mjs

      - name: Commit & Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 auto: daily morning job scan results"
          file_pattern: "data/pipeline.md data/scan-history.tsv scratch/morning-berlin-jobs.md"
