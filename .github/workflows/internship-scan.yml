name: 2027 Internship Scan

on:
  # GitHub schedules are UTC. This runs every 3 hours.
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: internship-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run Career-Ops internship scan
        env:
          CAREER_OPS_PORTALS: config/internship-portals.yml
          MIN_INTERNSHIP_SCORE: "4.0"
          # Optional LLM keys are reserved for future Career-Ops scoring hooks.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npm run internship:scan

      - name: Send email digest
        env:
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          # Set this repository variable to true if you want "no new jobs today" emails.
          SEND_EMPTY_DIGEST: ${{ vars.SEND_EMPTY_DIGEST }}
        run: npm run internship:digest

      - name: Commit scan state
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/pipeline.md data/scan-history.tsv output/internship-digest.json output/internship-digest.md || true
          if git diff --cached --quiet; then
            echo "No scan state changes to commit."
          else
            git commit -m "Update internship scan state"
            git push
          fi
