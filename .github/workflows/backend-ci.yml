name: Backend CI

on:
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

permissions:
  contents: read

jobs:
  backend:
    name: django check + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: python -m pip install -e "backend[dev]"
      - run: python backend/manage.py check
      - run: python backend/manage.py makemigrations --check --dry-run
      - run: pytest backend -q
