name: Secret Scan

on:
  push:
    branches: [main, 'feat/**']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run secret scan
        run: bash tools/check-secrets.sh
