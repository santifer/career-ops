name: Tests

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
      - name: Install Tectonic (for compile-resume tests)
        run: |
          curl --proto '=https' --tlsv1.2 -fsSL https://drop-sh.fullyjustified.net | sh
          sudo mv tectonic /usr/local/bin/tectonic
          tectonic --version
      - run: npm install
      - name: Install playwright-cli + Chromium for smoke tests
        run: |
          npm install -g @playwright/cli
          playwright-cli install-browser chromium
      - name: yash-resume-pipeline unit tests (verbose)
        run: node --test tests/yash-resume-pipeline.test.mjs
      - run: node test-all.mjs --quick
