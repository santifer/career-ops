name: Auto-Fix Agent

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  auto-fix:
    if: github.event.issue.pull_request && contains(github.event.comment.body, '/fix')
    runs-on: ubuntu-latest
    steps:
      - name: Get PR Details
        id: pr_details
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.issue.number }}
          PR_DATA=$(gh pr view $PR_NUMBER --repo ${{ github.repository }} --json headRefName,baseRefName)
          HEAD_BRANCH=$(echo $PR_DATA | jq -r '.headRefName')
          BASE_BRANCH=$(echo $PR_DATA | jq -r '.baseRefName')
          echo "head_branch=$HEAD_BRANCH" >> $GITHUB_OUTPUT
          echo "base_branch=$BASE_BRANCH" >> $GITHUB_OUTPUT

      - name: Checkout Original PR Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr_details.outputs.head_branch }}
          fetch-depth: 0

      - name: Fetch PR Diff and Review Comments
        id: fetch_context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.issue.number }}
          gh pr diff $PR_NUMBER --repo ${{ github.repository }} > /tmp/pr_diff.txt
          gh pr view $PR_NUMBER --repo ${{ github.repository }} --json comments | jq -r '.comments[].body' > /tmp/pr_comments.txt

      - name: Generate and Apply Fix
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: |
          python3 << 'PYTHON_EOF'
import os, sys, json, re
from openai import OpenAI

client = OpenAI(
    api_key=os.getenv("OPENAI_API_KEY"),
    base_url=os.getenv("OPENAI_BASE_URL", "https://api.z.ai/api/coding/paas/v4")
)

with open("/tmp/pr_diff.txt", "r") as f: diff = f.read()
with open("/tmp/pr_comments.txt", "r") as f: comments = f.read()

prompt = f"""You are an autonomous code-fixing agent. A PR has issues.
Generate the COMPLETE, corrected content for each affected file.
PR DIFF:
=== DIFF START ===
{diff[:6000]}
=== DIFF END ===
REVIEW COMMENTS:
=== COMMENTS START ===
{comments[:2000]}
=== COMMENTS END ===
Output ONLY a valid JSON array: [{{"path": "src/main.py", "content": "..."}}]
"""

try:
    resp = client.chat.completions.create(
        model=os.getenv("OPENAI_MODEL", "glm-5.1"),
        messages=[{'role': 'user', 'content': prompt}],
        temperature=0.1
    )
    raw = resp.choices[0].message.content
    json_match = re.search(r'\[\s*\{.*\}\s*\]', raw, re.DOTALL)
    fixes = json.loads(json_match.group(0) if json_match else raw)
    for fix in fixes:
        os.makedirs(os.path.dirname(fix['path']) or '.\', exist_ok=True)
        with open(fix['path'], 'w') as f: f.write(fix['content'])
    with open("/tmp/fix_applied.txt", "w") as f: f.write("SUCCESS")
except Exception as e:
    print(f"Error: {e}")
    sys.exit(1)
PYTHON_EOF

      - name: Commit and Push Fix to New Branch
        if: hashFiles('/tmp/fix_applied.txt') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.issue.number }}
          HEAD_BRANCH=${{ steps.pr_details.outputs.head_branch }}
          BASE_BRANCH=${{ steps.pr_details.outputs.base_branch }}
          NEW_BRANCH="auto-fix/pr-${PR_NUMBER}"
          git config user.name "Hermes Auto-Fix Agent"
          git config user.email "agent@hermes.local"
          git checkout -b $NEW_BRANCH
          git add .
          git commit -m "chore: auto-fix applied by Hermes Agent for PR #${PR_NUMBER}"
          git push -u origin $NEW_BRANCH

      - name: Open New PR with Fix
        if: hashFiles('/tmp/fix_applied.txt') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.issue.number }}
          BASE_BRANCH=${{ steps.pr_details.outputs.base_branch }}
          NEW_BRANCH="auto-fix/pr-${PR_NUMBER}"
          gh pr create --repo ${{ github.repository }} --base $BASE_BRANCH --head $NEW_BRANCH \
            --title "🤖 Auto-Fix: Resolving issues from PR #${PR_NUMBER}" \
            --body "Autonomously generated by Hermes Agent to resolve review comments in #${PR_NUMBER}."

