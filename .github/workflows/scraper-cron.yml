name: Scraper Worker (Cron)

on:
  schedule:
    # Run every 6 hours: midnight, 6am, noon, 6pm UTC
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
    # Allow manual triggering from GitHub Actions UI
    inputs:
      user_id:
        description: 'Specific user ID to scan (leave empty for all users)'
        required: false
        default: ''
      run_id:
        description: 'Run ID for dashboard tracing'
        required: false
        default: ''
      action_script:
        description: 'Script to run (e.g. scratch-scan.mjs)'
        required: false
        default: 'scratch-scan.mjs'
      action_args:
        description: 'Arguments for the script'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --production

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run worker process
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          SCAN_USER_ID: ${{ github.event.inputs.user_id }}
          RUN_ID: ${{ github.event.inputs.run_id }}
          ACTION_SCRIPT: ${{ github.event.inputs.action_script }}
          ACTION_ARGS: ${{ github.event.inputs.action_args }}
        run: |
          # Allowlist validation — only permit known scripts (CodeRabbit security fix)
          ALLOWED_SCRIPTS="scratch-scan.mjs agentic-tailor.mjs rank-pipeline.mjs auto-apply.mjs add-job.mjs"
          SCRIPT="${ACTION_SCRIPT:-scratch-scan.mjs}"
          # Exact string matching instead of regex-based grep to prevent partial matches (CodeRabbit fix)
          if ! printf '%s\n' "$ALLOWED_SCRIPTS" | tr ' ' '\n' | grep -Fxq "$SCRIPT"; then
            echo "Error: action_script '$SCRIPT' is not in the allowlist."
            exit 1
          fi
          node .github/scripts/run-scrapers.mjs

      - name: Notify dashboard (completion)
        if: ${{ always() }}
        env:
          DASHBOARD_WEBHOOK_URL: ${{ secrets.DASHBOARD_WEBHOOK_URL }}
          WORKER_WEBHOOK_SECRET: ${{ secrets.WORKER_WEBHOOK_SECRET }}
          USER_ID: ${{ github.event.inputs.user_id }}
          RUN_ID: ${{ github.event.inputs.run_id }}
          ACTION_SCRIPT: ${{ github.event.inputs.action_script }}
          ACTION_ARGS: ${{ github.event.inputs.action_args }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$DASHBOARD_WEBHOOK_URL" ] || [ -z "$WORKER_WEBHOOK_SECRET" ]; then
            echo "Dashboard webhook not configured; skipping."
            exit 0
          fi
          # Use jq for safe JSON serialization (handles quotes/newlines in args)
          payload="$(jq -cn \
            --arg user_id "$USER_ID" \
            --arg run_id "$RUN_ID" \
            --arg action_script "$ACTION_SCRIPT" \
            --arg action_args "$ACTION_ARGS" \
            --arg status "$JOB_STATUS" \
            --arg run_url "$RUN_URL" \
            '{user_id:$user_id,run_id:$run_id,action_script:$action_script,action_args:$action_args,status:$status,run_url:$run_url}')"
          curl -fsS -X POST "$DASHBOARD_WEBHOOK_URL" \
            -H "content-type: application/json" \
            -H "x-worker-secret: $WORKER_WEBHOOK_SECRET" \
            --data "$payload" \
            && echo "Notified dashboard."
