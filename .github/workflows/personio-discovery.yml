name: Personio Discovery

on:
  schedule:
    - cron: '0 6 */3 * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run Personio discovery
        run: node discover-personio.mjs

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/pipeline.md data/scan-history.tsv data/personio-tenants.json data/discovery-report.md
          if ! git diff --cached --quiet; then
            git commit -m "chore(personio): scheduled discovery run $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No new offers found — nothing to commit."
          fi
