<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Ranker</title>
  <style>
    :root {
      --bg: #0d0d14;
      --surface: #1a1a2e;
      --surface2: #242440;
      --hindi: #ff9500;
      --telugu: #00b4d8;
      --text: #e8e8f0;
      --muted: #66668a;
      --gold: #ffd700;
      --green: #4caf50;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      padding: 14px 24px;
      border-bottom: 1px solid #1e1e35;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .logo { font-size: 1.25rem; font-weight: 700; color: var(--gold); }

    .stats-bar {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.82rem;
      color: var(--muted);
      min-width: 0;
    }

    .round-badge {
      background: var(--surface2);
      padding: 3px 12px;
      border-radius: 20px;
      color: var(--text);
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .progress-wrap {
      flex: 1;
      max-width: 180px;
      height: 5px;
      background: var(--surface2);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), #ffaa00);
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    nav { display: flex; gap: 4px; flex-shrink: 0; }

    nav button {
      background: transparent;
      border: 1px solid #2a2a45;
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 0.83rem;
      transition: all 0.15s;
    }

    nav button.active, nav button:hover {
      background: var(--surface2);
      color: var(--text);
      border-color: #44447a;
    }

    /* ── Shared ── */
    #app-content {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .center-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 32px 24px;
      text-align: center;
    }

    .spinner {
      width: 38px;
      height: 38px;
      border: 3px solid var(--surface2);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .screen-title { font-size: 1.25rem; font-weight: 600; }
    .screen-sub { color: var(--muted); font-size: 0.9rem; max-width: 420px; line-height: 1.6; }

    .btn-primary {
      background: var(--gold);
      color: #000;
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: opacity 0.15s;
    }

    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Setup box ── */
    .setup-box {
      background: var(--surface);
      border: 1px solid #2a2a45;
      border-radius: 12px;
      padding: 24px 28px;
      max-width: 520px;
      text-align: left;
    }

    .setup-box h3 { color: var(--gold); margin-bottom: 14px; font-size: 1rem; }
    .setup-box ol { padding-left: 18px; }
    .setup-box li { margin: 10px 0; font-size: 0.88rem; color: var(--muted); line-height: 1.7; }
    .setup-box strong { color: var(--text); }
    .setup-box code {
      background: var(--surface2);
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 0.82rem;
      color: #a0a0cc;
      font-family: 'SF Mono', 'Consolas', monospace;
    }

    /* ── Lang badge ── */
    .lang-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      width: fit-content;
    }

    .lang-Hindi { background: rgba(255,149,0,.12); color: var(--hindi); border: 1px solid rgba(255,149,0,.25); }
    .lang-Telugu { background: rgba(0,180,216,.12); color: var(--telugu); border: 1px solid rgba(0,180,216,.25); }

    /* ── Battle view ── */
    .battle-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 20px;
    }

    .battle-prompt {
      font-size: 1rem;
      color: var(--muted);
    }

    .arena {
      display: flex;
      align-items: stretch;
      gap: 20px;
      width: 100%;
      max-width: 780px;
    }

    .movie-card {
      flex: 1;
      background: var(--surface);
      border: 2px solid #252540;
      border-radius: 16px;
      padding: 28px 22px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.15s, box-shadow 0.15s;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 200px;
      position: relative;
      user-select: none;
    }

    .movie-card:hover {
      border-color: var(--gold);
      background: var(--surface2);
      transform: translateY(-3px);
      box-shadow: 0 10px 32px rgba(255,215,0,.08);
    }

    .movie-card.winner {
      border-color: var(--green) !important;
      background: rgba(76,175,80,.08) !important;
      transform: scale(1.02) !important;
    }

    .movie-card.loser {
      opacity: 0.4;
      transform: scale(0.97) !important;
      pointer-events: none;
    }

    .movie-title { font-size: 1.45rem; font-weight: 700; line-height: 1.2; }
    .movie-year { color: var(--muted); font-size: 0.88rem; }

    .movie-record {
      margin-top: auto;
      font-size: 0.8rem;
      color: var(--muted);
      display: flex;
      gap: 8px;
    }

    .record-wins { color: var(--green); }
    .record-losses { color: #e94560; }

    .card-hint {
      position: absolute;
      bottom: 10px;
      right: 14px;
      font-size: 0.72rem;
      color: var(--muted);
      opacity: 0;
      transition: opacity 0.15s;
    }

    .movie-card:hover .card-hint { opacity: 0.6; }

    .vs-label {
      font-size: 1rem;
      font-weight: 700;
      color: #333355;
      flex-shrink: 0;
      align-self: center;
    }

    .battle-footer {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .btn-skip {
      background: transparent;
      border: 1px solid #2a2a45;
      color: var(--muted);
      padding: 8px 22px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.84rem;
      transition: all 0.15s;
    }

    .btn-skip:hover { border-color: #44447a; color: var(--text); }

    .kb-hint { font-size: 0.73rem; color: #33334a; }

    /* ── Round complete banner ── */
    .round-banner {
      background: linear-gradient(135deg, rgba(255,215,0,.08), rgba(255,170,0,.04));
      border: 1px solid rgba(255,215,0,.2);
      border-radius: 14px;
      padding: 24px 32px;
      max-width: 400px;
    }

    .round-banner h3 { color: var(--gold); margin-bottom: 8px; font-size: 1.15rem; }
    .round-banner p { color: var(--muted); font-size: 0.88rem; line-height: 1.6; }

    .banner-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

    .btn-secondary {
      background: var(--surface2);
      border: 1px solid #44447a;
      color: var(--text);
      padding: 9px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.88rem;
      transition: background 0.15s;
    }

    .btn-secondary:hover { background: #2a2a50; }

    /* ── Standings view ── */
    .standings-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 24px;
      gap: 16px;
      max-width: 920px;
      width: 100%;
      margin: 0 auto;
    }

    .standings-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .standings-header h2 { font-size: 1.1rem; }
    .standings-sub { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }

    .btn-sync {
      background: var(--surface2);
      border: 1px solid #44447a;
      color: var(--text);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.84rem;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn-sync:hover { background: #2a2a50; }
    .btn-sync:disabled { opacity: 0.45; cursor: not-allowed; }

    .table-wrap {
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid #1e1e35;
    }

    table { width: 100%; border-collapse: collapse; }

    th {
      background: var(--surface);
      padding: 10px 14px;
      text-align: left;
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      font-weight: 600;
      white-space: nowrap;
    }

    td { padding: 10px 14px; font-size: 0.88rem; border-top: 1px solid #14142a; }
    tr:hover td { background: var(--surface); }

    .rank-num { font-weight: 700; width: 44px; }
    .r1 { color: #ffd700; }
    .r2 { color: #c0c0c0; }
    .r3 { color: #cd7f32; }

    .no-games { color: var(--muted); font-style: italic; font-size: 0.8rem; }

    @media (max-width: 580px) {
      .arena { flex-direction: column; }
      .vs-label { align-self: center; transform: rotate(90deg); }
      .movie-title { font-size: 1.2rem; }
      .stats-bar .progress-wrap { display: none; }
    }
  </style>
</head>
<body>

<header>
  <span class="logo">🎬 Movie Ranker</span>
  <div class="stats-bar" id="stats-bar"></div>
  <nav>
    <button id="nav-battle" class="active" onclick="switchView('battle')">⚔️ Battle</button>
    <button id="nav-standings" onclick="switchView('standings')">📊 Standings</button>
  </nav>
</header>

<div id="app-content" style="display:flex;flex-direction:column;flex:1;"></div>

<script>
  let currentMatch = null;
  let currentView = 'battle';
  let busy = false;

  const appEl = document.getElementById('app-content');
  const statsEl = document.getElementById('stats-bar');

  // ── Render helpers ──────────────────────────────────────────────────

  function setHTML(html) { appEl.innerHTML = html; }

  function updateStatsBar(d) {
    if (!d?.initialized) { statsEl.innerHTML = ''; return; }
    const pct = d.pairsInRound > 0 ? (d.pairsCompleted / d.pairsInRound * 100) : 0;
    statsEl.innerHTML = `
      <span class="round-badge">Round ${d.round}</span>
      <div class="progress-wrap" title="${d.pairsCompleted}/${d.pairsInRound} pairs this round">
        <div class="progress-bar" style="width:${pct}%"></div>
      </div>
      <span>${d.pairsCompleted}/${d.pairsInRound} this round</span>
      <span style="opacity:.4">·</span>
      <span>${d.totalComparisons} total</span>
    `;
  }

  function showLoading(msg) {
    setHTML(`<div class="center-screen">
      <div class="spinner"></div>
      <p class="screen-sub">${msg ?? 'Loading…'}</p>
    </div>`);
  }

  function showSetup(errMsg) {
    setHTML(`<div class="center-screen">
      <div style="font-size:2rem">🔑</div>
      <p class="screen-title">Google Sheets Setup Required</p>
      <div class="setup-box">
        <h3>One-time setup (about 5 minutes)</h3>
        <ol>
          <li>Go to <a href="https://console.cloud.google.com" target="_blank" style="color:var(--telugu)">Google Cloud Console</a> → create or select a project → search for and enable <strong>Google Sheets API</strong></li>
          <li>Go to <strong>IAM & Admin → Service Accounts</strong> → Create service account → Keys tab → Add Key → JSON → download it</li>
          <li>Save the downloaded JSON as <code>movie-ranker/service-account.json</code></li>
          <li>In the <code>movie-ranker/</code> folder, copy <code>.env.example</code> to <code>.env</code> (it already has the right value)</li>
          <li>Open your Google Sheet and share it with the <code>client_email</code> from the JSON (give it <strong>Editor</strong> access)</li>
          <li>Restart the server: <code>npm start</code></li>
        </ol>
      </div>
      ${errMsg ? `<p style="color:#e94560;font-size:0.8rem;max-width:440px">${errMsg}</p>` : ''}
      <button class="btn-primary" onclick="init()">I'm set up — try again</button>
    </div>`);
  }

  function showError(msg, retryFn) {
    setHTML(`<div class="center-screen">
      <div style="font-size:2rem">⚠️</div>
      <p class="screen-title">Something went wrong</p>
      <p class="screen-sub">${msg}</p>
      ${retryFn ? `<button class="btn-primary" id="retry-btn">Try Again</button>` : ''}
    </div>`);
    document.getElementById('retry-btn')?.addEventListener('click', retryFn);
  }

  function renderBattle(match) {
    const card = (movie, side, arrow) => {
      const langCls = `lang-${movie.language}`;
      const played = movie.wins + movie.losses;
      const recordHtml = played === 0
        ? `<span class="no-games">No games yet</span>`
        : `<span class="record-wins">${movie.wins}W</span>
           <span style="opacity:.4">·</span>
           <span class="record-losses">${movie.losses}L</span>
           <span style="opacity:.4">·</span>
           <span>Score ${movie.score}</span>`;
      return `
        <div class="movie-card" id="card-${side}" onclick="choose('${side}')">
          <span class="lang-badge ${langCls}">${movie.language}</span>
          <h2 class="movie-title">${movie.name}</h2>
          <p class="movie-year">${movie.year ?? ''}</p>
          <div class="movie-record">${recordHtml}</div>
          <span class="card-hint">${arrow}</span>
        </div>`;
    };

    setHTML(`<div class="battle-wrap">
      <p class="battle-prompt">Which movie do you prefer?</p>
      <div class="arena">
        ${card(match.movieA, 'a', '← Left arrow')}
        <div class="vs-label">VS</div>
        ${card(match.movieB, 'b', 'Right arrow →')}
      </div>
      <div class="battle-footer">
        <button class="btn-skip" onclick="choose('skip')">Can't decide — Skip</button>
        <p class="kb-hint">⌨  ← left movie &nbsp;|&nbsp; right movie →  &nbsp;|&nbsp; Space = skip</p>
      </div>
    </div>`);
  }

  function renderRoundComplete(newRound) {
    setHTML(`<div class="center-screen">
      <div class="round-banner">
        <h3>🏆 Round ${newRound - 1} Complete!</h3>
        <p>All pairs compared. Rankings updated.<br>Round ${newRound} matchups are ready.</p>
      </div>
      <div class="banner-actions">
        <button class="btn-primary" onclick="loadNextMatch()">Start Round ${newRound} →</button>
        <button class="btn-secondary" onclick="switchView('standings')">View Rankings</button>
      </div>
    </div>`);
  }

  // ── API ─────────────────────────────────────────────────────────────

  async function api(method, path, body) {
    const res = await fetch(path, {
      method,
      headers: body ? { 'Content-Type': 'application/json' } : {},
      body: body ? JSON.stringify(body) : undefined,
    });
    return res.json();
  }

  // ── Core actions ────────────────────────────────────────────────────

  async function init() {
    showLoading('Connecting to Google Sheets…');
    const status = await api('GET', '/api/status');
    updateStatsBar(status);

    if (!status.initialized) {
      showLoading('Loading your movies…');
      const result = await api('POST', '/api/init');
      if (result.error) {
        const isAuthErr = result.error.includes('GOOGLE_SERVICE_ACCOUNT_KEY') ||
                          result.error.includes('service-account') ||
                          result.error.includes('credentials') ||
                          result.error.includes('not found');
        if (isAuthErr) { showSetup(result.error); return; }
        showError(result.error, init);
        return;
      }
      const fresh = await api('GET', '/api/status');
      updateStatsBar(fresh);
    }

    await loadNextMatch();
  }

  async function loadNextMatch() {
    if (busy) return;
    busy = true;
    try {
      const match = await api('GET', '/api/match');
      if (match.error) { showError(match.error, loadNextMatch); return; }

      if (match.roundComplete) {
        renderRoundComplete(match.round);
        currentMatch = null;
      } else {
        currentMatch = match;
        renderBattle(match);
        updateStatsBar({
          initialized: true,
          round: match.round,
          pairsInRound: match.pairsInRound,
          pairsCompleted: match.pairsInRound - match.pairsRemaining,
          totalComparisons: match.totalComparisons,
        });
      }
    } finally {
      busy = false;
    }
  }

  async function choose(which) {
    if (!currentMatch || busy) return;
    busy = true;

    const winnerId = which === 'a' ? currentMatch.movieA.id
                   : which === 'b' ? currentMatch.movieB.id
                   : 'skip';

    if (which !== 'skip') {
      document.getElementById(`card-${which}`)?.classList.add('winner');
      document.getElementById(which === 'a' ? 'card-b' : 'card-a')?.classList.add('loser');
    }

    try {
      const result = await api('POST', '/api/match', { pairIdx: currentMatch.pairIdx, winnerId });

      if (result.error) { showError(result.error, loadNextMatch); return; }

      if (result.roundComplete) {
        const s = await api('GET', '/api/status');
        updateStatsBar(s);
        setTimeout(() => renderRoundComplete(result.newRound), 280);
        currentMatch = null;
      } else {
        updateStatsBar({
          initialized: true,
          round: result.newRound,
          pairsInRound: currentMatch.pairsInRound,
          pairsCompleted: currentMatch.pairsInRound - result.pairsRemaining,
          totalComparisons: result.totalComparisons,
        });
        setTimeout(async () => {
          busy = false;
          await loadNextMatch();
        }, 220);
        return; // don't set busy=false yet
      }
    } finally {
      if (busy) busy = false;
    }
  }

  async function switchView(view) {
    currentView = view;
    document.getElementById('nav-battle').classList.toggle('active', view === 'battle');
    document.getElementById('nav-standings').classList.toggle('active', view === 'standings');

    if (view === 'battle') {
      if (currentMatch) renderBattle(currentMatch);
      else await loadNextMatch();
    } else {
      await loadStandings();
    }
  }

  async function loadStandings() {
    showLoading('Loading rankings…');
    const [standings, status] = await Promise.all([
      api('GET', '/api/standings'),
      api('GET', '/api/status'),
    ]);

    if (standings.error) { showError(standings.error); return; }

    updateStatsBar(status);

    const subText = !status.totalComparisons
      ? 'No comparisons yet — start battling!'
      : `Based on ${status.totalComparisons} comparisons · Round ${status.round}`;

    const rows = standings.map((m, i) => {
      const rankCls = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : '';
      const langCls = `lang-${m.language}`;
      const played = m.wins + m.losses;
      const score = played === 0
        ? '<span class="no-games">—</span>'
        : `${m.score} <span style="opacity:.5;font-size:.8rem">(${m.wins}W-${m.losses}L)</span>`;
      return `<tr>
        <td class="rank-num ${rankCls}">${m.rank}</td>
        <td><strong>${m.name}</strong></td>
        <td><span class="lang-badge ${langCls}">${m.language}</span></td>
        <td style="color:var(--muted)">${m.year ?? '—'}</td>
        <td>${score}</td>
        <td style="color:var(--muted)">${played || '—'}</td>
      </tr>`;
    }).join('');

    setHTML(`<div class="standings-wrap">
      <div class="standings-header">
        <div>
          <h2>📊 Current Rankings</h2>
          <p class="standings-sub">${subText}</p>
        </div>
        <button class="btn-sync" id="sync-btn" onclick="syncToSheet(this)">🔄 Sync to Google Sheet</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th><th>Movie</th><th>Language</th><th>Year</th><th>Score</th><th>Played</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`);
  }

  async function syncToSheet(btn) {
    btn.disabled = true;
    btn.textContent = '⏳ Syncing…';
    const result = await api('POST', '/api/sync');
    if (result.success) {
      btn.textContent = `✅ Synced ${result.count} movies`;
      setTimeout(() => { btn.textContent = '🔄 Sync to Google Sheet'; btn.disabled = false; }, 3000);
    } else {
      btn.textContent = `❌ ${result.error || 'Sync failed'}`;
      setTimeout(() => { btn.textContent = '🔄 Sync to Google Sheet'; btn.disabled = false; }, 5000);
    }
  }

  // ── Keyboard ────────────────────────────────────────────────────────

  document.addEventListener('keydown', (e) => {
    if (currentView !== 'battle' || !currentMatch) return;
    if (document.activeElement?.tagName === 'BUTTON') return;
    if (e.key === 'ArrowLeft')  { e.preventDefault(); choose('a'); }
    if (e.key === 'ArrowRight') { e.preventDefault(); choose('b'); }
    if (e.key === ' ')          { e.preventDefault(); choose('skip'); }
  });

  // ── Boot ─────────────────────────────────────────────────────────────
  init();
</script>
</body>
</html>
