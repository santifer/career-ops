                - listitem [ref=e145]: Masters Degree or diploma on Finances
                - listitem [ref=e146]: Experience in the MedTech Industry
                - listitem [ref=e147]: Responsible for Income Statements
                - listitem [ref=e148]: Leadership and collaboration skills to engage with business stakeholders and drive alignment on financial assumptions
                - listitem [ref=e149]: Ability to lead through others and influence
                - listitem [ref=e150]: Previous experience in AS400/BPCS ERP
                - listitem [ref=e151]: Pragmatic, results-oriented with a strong bias towards executing with speed, agility, and quality
