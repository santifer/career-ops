            - generic [ref=e102]:
              - text: "Obrigado pelo seu interesse em trabalhar para nossa Empresa. Recrutar o talento certo é crucial para os nossos objetivos. No dia 01 de Abril de 2024, a 3M Healthcare passou por uma cisão corporativa que levou à criação de uma nova empresa chamada Solventum. Ainda estamos no processo de atualização da nossa página de carreiras e documentos de candidatura, que atualmente possuem a marca 3M. Por favor, tenha paciência conosco. Enquanto isso, a nossa Política de Privacidade aqui: https://www.solventum.com/en-us/home/legal/website-privacy-statement/applicant-privacy/ continua a ser aplicada a qualquer informação pessoal que enviar, e os cargos da marca 3M listados na nossa Página de Carreiras são para cargos na Solventum. Tal como era na 3M, na Solventum todos os candidatos qualificados serão considerados para emprego, independentemente da sua raça, cor, religião, sexo, orientação sexual, identidade de género, origem nacional, deficiência ou estatuto militar."
              - paragraph [ref=e103]
              - paragraph [ref=e104]
              - paragraph [ref=e105]: "Job Description:"
              - paragraph [ref=e106]
              - generic [ref=e108]: 3M Health Care is now Solventum
              - generic [ref=e112]:
                - paragraph [ref=e113]
                - paragraph [ref=e114]: At Solventum, we enable better, smarter, safer healthcare to improve lives. As a new company with a long legacy of creating breakthrough solutions for our customers’ toughest challenges, we pioneer game-changing innovations at the intersection of health, material and data science that change patients' lives for the better while enabling healthcare professionals to perform at their best. Because people, and their wellbeing, are at the heart of every scientific advancement we pursue.
                - paragraph [ref=e115]
                - paragraph [ref=e116]: We partner closely with the brightest minds in healthcare to ensure that every solution we create melds the latest technology with compassion and empathy. Because at Solventum, we never stop solving for you.
              - paragraph [ref=e117]
              - paragraph [ref=e118]: "The impact you will have in this role:"
              - paragraph [ref=e119]: "As the Senior Financial Analyst at the Jarinu, Brazil plant, you will have the opportunity to tap into your curiosity and collaborate with some of the most innovative and diverse people around the world. Here, you will make an impact by:"
              - list [ref=e120]:
                - listitem [ref=e121]: Having the opportunity to stand up the financial processes listed below at Sumare, which is a brand-new manufacturing site for Solventum
                - listitem [ref=e122]: Providing strategic and operational financial leadership to the Sumare Plant team and direct support to the Plant Director
                - listitem [ref=e123]: Being a strong business partner supporting the plant financial scorecard, continuous improvement initiatives, inventory/production analysis, and other short- to long term plant financial decisions
                - listitem [ref=e124]: Leading weekly, monthly, quarterly, and annual processes to support plant rhythms, month end close activities, QORs/MREs, OP and Strat Plans
                - listitem [ref=e125]: Collaborating with the business segments and Global Supply Chain organizations to support investment analysis at the site
                - listitem [ref=e126]: Analyzing plant spend and work with the teams to identify, communicate and execute productivity improvement opportunities
                - listitem [ref=e127]: Regularly measuring and assessing plant performance (weekly/monthly/quarterly) to predict results and drive corrective actions to meet targets
                - listitem [ref=e128]: Developing understanding of impacts to the plant financials driven by sales volume, mix, demand planning and supply planning dynamics to drive productivity at the site
                - listitem [ref=e129]: Monitoring external economic factors to support the plant management decision process
                - listitem [ref=e130]: Developing and driving end-to-end processes, analyses, and tools to standardize reporting to support the site
                - listitem [ref=e131]: Ensuring compliance to Global Financial Standards and Statutory requirements
              - paragraph [ref=e132]
              - paragraph [ref=e133]
              - paragraph [ref=e134]: Your Skills and Expertise
              - paragraph [ref=e135]: "To set you up for success in this role from day one, Solventum requires (at a minimum) the following qualifications:"
