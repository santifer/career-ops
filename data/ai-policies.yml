  ai_in_assessments: assume-prohibited
  ai_in_interviews: assume-prohibited
  disclosure_required: unknown
  notes: |
    Default assumes prep is allowed (no company has banned AI-assisted resume
    writing in public policy as of 2026-05) but assessments and interviews
    should be assumed proctored unless the company explicitly says otherwise.
