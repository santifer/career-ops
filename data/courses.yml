# data/courses.yml — Mitchell's course / learning-allocation registry
#
# Tier B item #6 (autonomous-build 2026-05-17). Operationalizes Dimension 6
# (course tracking) + Dimension 4 (TPgM evidence) + Dimension 5 (20% / side
# allocation tracking) of `data/ingest-feature-strategy-2026-05-17.md`, which
# in turn operationalizes the "PM-Bridge-Buildability" and "Skill-Portability"
# 5%/5% scoring dimensions added by `data/career-calibration-20260516-190152.md`
# §"What this changes in the system" → "modes/_profile.md §2 — reweight
# scoring matrix".
#
# This file is read by `scripts/tpgm-tracker.mjs` to compute the TPgM-
# credibility composite. The weekly skill-ingest pipeline
# (`scripts/skill-ingest.mjs`) may APPEND new course entries on completion via
# the schema at `lib/skill-ingest-schema.mjs`; existing entries are never
# silently mutated.
#
# Edit policy: User-Layer file. Autonomously editable per AGENTS.md "Corpus
# auto-edit (post-calibration 2026-05-16)". Every change goes through
# `scripts/agent-commit.mjs --agent <name>` so the git log is the audit
# trail. Mitchell reviews via `git log` / `git diff` after the fact and
# reverts anything he disagrees with.
#
# Status taxonomy:
#   not-started | in-progress | completed | paused | dropped | planning
#
# Archetype tags align with `modes/_profile.md` §1:
#   A2-PgM | A2-SA | A2-FDE | A2-AE | BRIDGE | GENERIC
#
# Scoring fields:
#   pm_bridge_weight       0–10 — how much completion moves the
#                          PM-Bridge-Buildability dimension. 10 = career-
#                          changing PM credibility; 0 = irrelevant.
#   skill_portability_weight 0–10 — how much completion increases the user's
#                          skill portability into finance / health / legal
#                          / other high-WTP non-tech industries.

