<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'; connect-src 'self' https://pulse-jobs-proxy.rahilnathanipulse.workers.dev https://*.workers.dev;">
<title>Job Pulse — Kanban</title>
<!--
  Built clean 2026-06-08 — see archive/job-pulse-kanban-legacy.html for prior version.
  Run: npm run kanban  (requires Go; starts server on http://localhost:7777)
-->
<style>
  :root{--bg:#0d0d0d;--surface:#161616;--surface2:#1e1e1e;--border:#2a2a2a;
        --text:#e0e0e0;--muted:#888;--accent:#6c63ff;--green:#4caf50;--red:#e53935;
        --gold:#ffb300;--cyan:#00bcd4;font-family:system-ui,sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;
         display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  header h1{font-size:1rem;font-weight:700;color:var(--accent)}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-left:auto}
  button{padding:5px 12px;border-radius:5px;border:1px solid var(--border);
         background:var(--surface2);color:var(--text);cursor:pointer;font-size:.8rem;white-space:nowrap}
  button:hover{border-color:var(--accent);color:var(--accent)}
  button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  button.primary:hover{background:#7b73ff}
  #status{font-size:.75rem;color:var(--muted);padding:0 8px}
  .board{display:flex;gap:12px;padding:12px;overflow-x:auto;flex:1;align-items:flex-start}
  .col{background:var(--surface);border:1px solid var(--border);border-radius:8px;
       min-width:220px;max-width:260px;flex-shrink:0;display:flex;flex-direction:column}
  .col-header{padding:8px 12px;font-size:.75rem;font-weight:700;text-transform:uppercase;
              letter-spacing:.06em;color:var(--muted);border-bottom:1px solid var(--border);
              display:flex;justify-content:space-between;align-items:center}
  .col-header .count{background:var(--surface2);border-radius:10px;padding:1px 7px;
                     font-size:.7rem;color:var(--muted)}
  .col-cards{padding:8px;display:flex;flex-direction:column;gap:6px;min-height:60px}
  .col.drag-over .col-cards{background:rgba(108,99,255,.06);border-radius:4px}
  .card{background:var(--surface2);border:1px solid var(--border);border-radius:6px;
        padding:9px 11px;cursor:grab;transition:border-color .15s}
  .card:hover{border-color:var(--accent)}
  .card.dragging{opacity:.4;cursor:grabbing}
  .card-title{font-size:.8rem;font-weight:600;margin-bottom:3px;overflow:hidden;
              text-overflow:ellipsis;white-space:nowrap}
  .card-company{font-size:.72rem;color:var(--muted)}
  .card-meta{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap}
  .tag{font-size:.65rem;padding:1px 6px;border-radius:4px;border:1px solid var(--border);
       color:var(--muted);white-space:nowrap}
  .tag.src-greenhouse{border-color:rgba(76,175,80,.4);color:#66bb6a}
  .tag.src-lever{border-color:rgba(0,188,212,.4);color:#26c6da}
  .tag.src-dice{border-color:rgba(255,179,0,.4);color:var(--gold)}
  .tag.src-indeed{border-color:rgba(108,99,255,.4);color:#9c94ff}
  footer{text-align:center;padding:8px;font-size:.7rem;color:var(--muted);
         border-top:1px solid var(--border)}
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;
            justify-content:center;align-items:center}
  .modal-bg.open{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:10px;
         padding:20px;min-width:320px;max-width:500px;max-height:80vh;overflow-y:auto}
  .modal h2{font-size:.9rem;margin-bottom:12px;color:var(--accent)}
  .modal pre{font-size:.72rem;color:var(--muted);background:var(--bg);padding:10px;
             border-radius:4px;overflow-x:auto;white-space:pre-wrap}
  .modal-close{float:right;background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
         background:var(--surface2);color:var(--text);border:1px solid var(--accent);
         border-radius:6px;padding:9px 18px;font-size:.8rem;z-index:200;
         pointer-events:none;max-width:min(600px,90vw);word-break:break-word;
         animation:fadeout .4s ease 3.6s forwards}
  @keyframes fadeout{to{opacity:0}}
</style>
</head>
<body>
<header>
  <h1>⚡ Job Pulse</h1>
  <span id="status">—</span>
  <div class="toolbar">
    <button class="primary" onclick="fetchJobs()">⬇ Fetch Jobs</button>
    <button onclick="dryRunSubmit()">🔍 Dry-Run Submit</button>
    <button onclick="exportJson()">⬆ Export JSON</button>
    <label style="cursor:pointer"><button as="span" onclick="document.getElementById('import-file').click()">⬇ Import JSON</button>
      <input id="import-file" type="file" accept=".json" style="display:none" onchange="importJson(event)"></label>
    <button onclick="clearAll()" style="color:var(--red)">✕ Clear</button>
  </div>
</header>

<div class="board" id="board"></div>

<div class="modal-bg" id="detail-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2 id="modal-title">—</h2>
    <pre id="modal-body"></pre>
    <a id="modal-link" href="#" target="_blank" rel="noopener" style="font-size:.8rem;color:var(--accent)">View posting ↗</a>
  </div>
</div>

<footer>
  <small>Built clean 2026-06-08 · <a href="archive/job-pulse-kanban-legacy.html" style="color:var(--muted)">legacy</a></small>
</footer>

<script type="module">
// ── Config ────────────────────────────────────────────────────────────────────
const WORKER  = 'https://pulse-jobs-proxy.rahilnathanipulse.workers.dev';
const STORAGE_KEY = 'pulse-jobs-v1';

// Greenhouse + Lever slugs mirroring config/sources.yml
const SOURCES = {
  greenhouse: ['stripe','anthropic','databricks','openai','notion','figma','linear'],
  lever:      ['figma','linear','notion-hq','hex','retool'],
};

// ── State ─────────────────────────────────────────────────────────────────────
let state = { cards: {}, version: 1 };

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = JSON.parse(raw);
  } catch { /* start fresh */ }
}

function saveState() {
  // Atomic: write to temp key, then rename
  const tmp = STORAGE_KEY + '__tmp';
  try {
    localStorage.setItem(tmp, JSON.stringify(state));
    localStorage.setItem(STORAGE_KEY, localStorage.getItem(tmp));
    localStorage.removeItem(tmp);
  } catch(e) {
    console.error('saveState failed:', e.message);
  }
}

// ── Columns from gen/states.json ──────────────────────────────────────────────
let COLUMNS = [];

async function loadColumns() {
  try {
    // Try to load from gen/states.json (served by kanban-server at /gen/states.json)
    const r = await fetch('/gen/states.json');
    if (r.ok) {
      const d = await r.json();
      COLUMNS = d.states.map(s => ({ id: s.id, label: s.label }));
      return;
    }
  } catch { /* fall through */ }
  // Fallback: hardcoded from states.yml (kept in sync manually)
  COLUMNS = [
    { id: 'new',       label: 'New' },
    { id: 'evaluated', label: 'Evaluated' },
    { id: 'applied',   label: 'Applied' },
    { id: 'blocked',   label: 'Blocked' },
    { id: 'responded', label: 'Responded' },
    { id: 'interview', label: 'Interview' },
    { id: 'offer',     label: 'Offer' },
    { id: 'rejected',  label: 'Rejected' },
    { id: 'discarded', label: 'Discarded' },
    { id: 'skip',      label: 'SKIP' },
  ];
}

// ── Dedup ─────────────────────────────────────────────────────────────────────
const SRC_PRIORITY = ['greenhouse','lever','ashby','workday','linkedin','icims','indeed','dice'];

function dedupKey(j) {
  const loc = (j.location || (j.remote ? 'remote' : 'unknown')).toLowerCase();
  return `${(j.company||'').toLowerCase()}|${(j.title||'').toLowerCase()}|${loc}`;
}

function mergeJobs(incoming) {
  let added = 0, skipped = 0;
  // Build existing key set
  const existing = {};
  for (const c of Object.values(state.cards)) {
    const k = dedupKey(c);
    existing[k] = c;
  }
  for (const job of incoming) {
    const k = dedupKey(job);
    const ex = existing[k];
    if (ex) {
      // Keep newer posted_at; same date → source priority
      const exTs = ex.posted_at ? Date.parse(ex.posted_at) : 0;
      const jTs  = job.posted_at ? Date.parse(job.posted_at) : 0;
      if (jTs > exTs || (jTs === exTs && SRC_PRIORITY.indexOf(job.source) < SRC_PRIORITY.indexOf(ex.source))) {
        job.state = ex.state; // preserve column placement
        job.id = ex.id;
        state.cards[ex.id] = job;
        skipped++;
      } else {
        skipped++;
      }
    } else {
      const id = `${job.source}-${job.external_id}-${Date.now()}`;
      job.id  = id;
      job.state = job.state || 'new';
      state.cards[id] = job;
      existing[k] = job;
      added++;
    }
  }
  return { added, skipped };
}

// ── Worker fetch ──────────────────────────────────────────────────────────────
async function fetchJobs() {
  setStatus('Fetching from Worker…');
  const all = [];
  const errs = [];
  const tasks = [
    ...SOURCES.greenhouse.map(s => fetch(`${WORKER}/greenhouse/${s}`).then(r=>r.json()).then(d=>{if(d.jobs)all.push(...d.jobs)}).catch(e=>errs.push(`GH/${s}:${e.message}`))),
    ...SOURCES.lever.map(s      => fetch(`${WORKER}/lever/${s}`).then(r=>r.json()).then(d=>{if(d.jobs)all.push(...d.jobs)}).catch(e=>errs.push(`LV/${s}:${e.message}`))),
  ];
  await Promise.allSettled(tasks);
  const { added, skipped } = mergeJobs(all);
  saveState();
  render();
  setStatus(`Fetched ${all.length} jobs → ${added} new, ${skipped} dupes${errs.length ? ` · ${errs.length} errors` : ''}`);
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg, ms = 4000) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), ms);
}

// ── Dry-run submit ─────────────────────────────────────────────────────────────
function dryRunSubmit() {
  const eligible = Object.values(state.cards).filter(c =>
    (c.state === 'new' || c.state === 'evaluated') && (c.grade === 'A' || c.grade === 'B')
  );
  if (eligible.length === 0) {
    toast('No eligible cards — grade A/B in New or Evaluated column required');
    return;
  }
  const out = { cards: {}, version: state.version };
  for (const c of eligible) out.cards[c.id] = c;
  const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'submit-queue.json';
  a.click();
  toast(`Downloaded ${eligible.length} cards as submit-queue.json — move to data/ then run: node scripts/auto-submit.mjs --kanban-json data/submit-queue.json --dry-run --report`);
}

// ── Export / Import ───────────────────────────────────────────────────────────
function exportJson() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `job-pulse-kanban-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  toast(`Exported ${Object.keys(state.cards).length} cards`);
}

function importJson(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const imported = JSON.parse(ev.target.result);
      if (!imported.cards || typeof imported.cards !== 'object' || Array.isArray(imported.cards))
        throw new Error('missing or invalid .cards (expected object)');
      if (!imported.version) throw new Error('missing .version');
      state = imported;
      saveState();
      render();
      toast(`Imported ${Object.keys(state.cards).length} cards`);
    } catch(err) { toast(`Import failed: ${err.message}`); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function clearAll() {
  if (!confirm('Clear all cards from the board? This cannot be undone.')) return;
  state.cards = {};
  saveState();
  render();
  setStatus('0 cards loaded');
  toast('Board cleared');
}

// ── Drag and drop ─────────────────────────────────────────────────────────────
let _dragId = null;

function onDragStart(e, cardId) {
  _dragId = cardId;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function onDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  _dragId = null;
}

function onDragOver(e, colEl) {
  e.preventDefault();
  colEl.classList.add('drag-over');
}

function onDragLeave(e, colEl) {
  colEl.classList.remove('drag-over');
}

function onDrop(e, colId, colEl) {
  e.preventDefault();
  colEl.classList.remove('drag-over');
  if (!_dragId || !state.cards[_dragId]) return;
  state.cards[_dragId].state = colId;
  saveState();
  render();
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  for (const col of COLUMNS) {
    const cards = Object.values(state.cards).filter(c => (c.state||'new') === col.id);

    const colEl = document.createElement('div');
    colEl.className = 'col';
    colEl.addEventListener('dragover',  e => onDragOver(e, colEl));
    colEl.addEventListener('dragleave', e => onDragLeave(e, colEl));
    colEl.addEventListener('drop',      e => onDrop(e, col.id, colEl));

    colEl.innerHTML = `<div class="col-header">${col.label}<span class="count">${cards.length}</span></div>`;

    const cardsEl = document.createElement('div');
    cardsEl.className = 'col-cards';

    for (const card of cards) {
      const el = document.createElement('div');
      el.className = 'card';
      el.draggable = true;
      el.addEventListener('dragstart', e => onDragStart(e, card.id));
      el.addEventListener('dragend',   onDragEnd);
      el.addEventListener('click',     () => openCard(card));

      const sal = card.salary_min
        ? `$${Math.round(card.salary_min/1000)}K${card.salary_max?'–$'+Math.round(card.salary_max/1000)+'K':'+'}` : '';

      el.innerHTML = `
        <div class="card-title">${esc(card.title||'—')}</div>
        <div class="card-company">${esc(card.company||'')} · ${esc(card.location||'')}</div>
        <div class="card-meta">
          <span class="tag src-${card.source||'unknown'}">${card.source||'?'}</span>
          ${card.grade ? `<span class="tag">${card.grade}</span>` : ''}
          ${sal ? `<span class="tag">${sal}</span>` : ''}
          ${card.verified ? `<span class="tag" style="color:var(--green)">✓ live</span>` : ''}
        </div>`;
      cardsEl.appendChild(el);
    }

    colEl.appendChild(cardsEl);
    board.appendChild(colEl);
  }
}

// ── Card detail modal ─────────────────────────────────────────────────────────
function openCard(card) {
  const display = { ...card };
  delete display.id;
  showModal(`${card.title} @ ${card.company}`, JSON.stringify(display, null, 2), card.url);
}

function showModal(title, body, link) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').textContent  = body;
  const a = document.getElementById('modal-link');
  if (link) { a.href = link; a.style.display = 'inline'; }
  else { a.style.display = 'none'; }
  document.getElementById('detail-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('detail-modal').classList.remove('open');
}

document.getElementById('detail-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadState();
await loadColumns();
render();
setStatus(`${Object.keys(state.cards).length} cards loaded`);

// Expose for tests
window._kanban = { state, saveState, loadState, mergeJobs, dedupKey, COLUMNS, SOURCES };

// onclick="..." attributes resolve against window scope; <script type="module"> is module-scoped,
// so functions defined here are NOT globally visible without explicit window assignment.
window.fetchJobs    = fetchJobs;
window.dryRunSubmit = dryRunSubmit;
window.exportJson   = exportJson;
window.importJson   = importJson;
window.clearAll     = clearAll;
window.closeModal   = closeModal;
</script>
</body>
</html>
