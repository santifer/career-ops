# Career-Ops Profile Configuration
# Copy this file to config/profile.yml and fill in your details.
# This is the single source of truth for your personal data across all modes.

candidate:
  full_name: "Jane Smith"
  email: "jane@example.com"
  phone: "+1 (310) 555-0123"
  location: "San Francisco, CA"
  linkedin: "linkedin.com/in/janesmith"
  portfolio_url: "https://janesmith.dev"
  github: "github.com/janesmith"
  twitter: "https://x.com/janesmith"

target_roles:
  # Your North Star roles — what you're optimizing for
  primary:
    - "Senior AI Engineer"
    - "Staff ML Engineer"
  # Archetypes help the evaluation system score fit
  archetypes:
    - name: "AI/ML Engineer"
      level: "Senior/Staff"
      fit: "primary"        # primary = dream role, secondary = good fit, adjacent = stretch
    - name: "AI Product Manager"
      level: "Senior"
      fit: "secondary"
    - name: "Solutions Architect"
      level: "Mid-Senior"
      fit: "adjacent"

narrative:
  # Your professional headline (1 line)
  headline: "ML Engineer turned AI product builder"
  # Your exit story — what makes you unique
  exit_story: "Built and sold my SaaS after 5 years. Now focused on applied AI at scale."
  # Your top 3-5 superpowers
  superpowers:
    - "End-to-end ML pipelines"
    - "Fast prototyping (idea to prod in 2 weeks)"
    - "Cross-functional communication"
  # Proof points — projects, articles, case studies with measurable impact
  proof_points:
    - name: "Project Alpha"
      url: "https://janesmith.dev/project-alpha"
      hero_metric: "Reduced inference latency 40%"
    - name: "Open Source Tool"
      url: "https://github.com/janesmith/tool"
      hero_metric: "2K+ GitHub stars"
  # Optional: dashboard/demo URL with credentials
  # dashboard:
  #   url: "https://janesmith.dev/demo"
  #   password: "demo-2026"

compensation:
  target_range: "$150K-200K"     # Your target total comp
  currency: "USD"
  minimum: "$120K"               # Walk-away number
  location_flexibility: "Remote preferred, 1 week/month on-site possible"

location:
  country: "United States"
  city: "San Francisco"
  timezone: "PST"
  visa_status: "No sponsorship needed"
  # For remote roles outside your country:
  # onsite_availability: "1 week/month in any city"

# ── NEW: profile tracks ─────────────────────────────────────────────────────
# Tracks let you foreground different slices of your experience depending on
# the role type. Each track has its own headline, summary framing, and a set
# of evidence tags used to filter and rank bullets/projects from cv.md.
#
# Optional: tag bullets in cv.md with <!-- tags: built, agent --> to enable
# tag-based filtering. Untagged bullets are included in all tracks (current behavior).
tracks:
  default: builder          # used when no --track flag and JD signal is ambiguous

  builder:
    label: "AI / Product Builder"
    headline: "AI Engineer & Product Builder — shipping agent systems end to end"
    summary_focus: |
      Frame as hands-on technical builder: agent systems, LLM pipelines,
      applied ML, fast prototyping, production delivery.
    primary_sections:
      - experience
      - projects
      - skills
    preferred_archetypes:
      - llmops
      - agentic
      - forward_deployed
    evidence_tags:
      - built
      - shipped
      - architected
      - automated
      - llm
      - agent
      - api

  leadership:
    label: "Leadership / Design-Facing / Cross-Functional"
    headline: "Head of Applied AI — leading AI teams across product, design, and engineering"
    summary_focus: |
      Frame as leader and multiplier: team building, cross-functional alignment,
      strategic AI roadmaps, executive communication, adoption at scale.
    primary_sections:
      - experience
      - projects
      - skills
    preferred_archetypes:
      - ai_pm
      - transformation
      - solutions_architect
    evidence_tags:
      - led
      - managed
      - directed
      - aligned
      - stakeholder
      - strategy
      - team

# ── NEW: personas (contact / region variants) ────────────────────────────────
# Personas let you switch the contact block (phone, location, work auth) for
# applications in different countries. CV content is unchanged — only the
# header contact row and page format are affected.
personas:
  default: primary          # which persona to use when no --persona flag is set

  primary:
    label: "Primary"
    phone: "+1 (310) 555-0123"
    location_line: "San Francisco, CA"
    address_display: "San Francisco, United States"
    timezone: "PST (UTC-8)"
    page_format_override: null    # null = let JD region detection decide
    authorization_line: "No sponsorship needed"
    date_format: "MM/DD/YYYY"

  # Example second persona — uncomment and fill in for a second country/region
  # secondary:
  #   label: "UK"
  #   phone: "+44 7XXX XXXXXX"
  #   location_line: "London, UK"
  #   address_display: "London, United Kingdom"
  #   timezone: "GMT / BST (UTC+0 / UTC+1)"
  #   page_format_override: a4
  #   authorization_line: "Right to Work: British Citizen"
  #   date_format: "DD/MM/YYYY"
