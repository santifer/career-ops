# Konfiguracja profilu Career-Ops (PL)
# Skopiuj ten plik do config/profile.yml i uzupełnij swoimi danymi.
# To jest jedyne źródło prawdy o Twoich danych osobowych we wszystkich trybach.

candidate:
  full_name: "Jan Kowalski"
  email: "jan.kowalski@example.com"
  phone: "+48 600 100 200"
  location: "Warszawa, Polska"
  linkedin: "linkedin.com/in/jankowalski"
  portfolio_url: "https://jankowalski.dev"
  github: "github.com/jankowalski"
  twitter: "https://x.com/jankowalski"

target_roles:
  # Twoje role North Star — to, pod co optymalizujesz
  primary:
    - "Senior AI Engineer"
    - "Staff ML Engineer"
  # Archetypy pomagają systemowi oceniać dopasowanie
  archetypes:
    - name: "AI/ML Engineer"
      level: "Senior/Staff"
      fit: "primary"        # primary = rola marzeń, secondary = dobre dopasowanie, adjacent = ambitne
    - name: "AI Product Manager"
      level: "Senior"
      fit: "secondary"
    - name: "Solutions Architect"
      level: "Mid-Senior"
      fit: "adjacent"

narrative:
  # Twój nagłówek zawodowy (1 linia)
  headline: "ML Engineer, który został budowniczym produktów AI"
  # Twoja historia "exit" — co Cię wyróżnia
  exit_story: "Zbudowałem i sprzedałem własny SaaS po 5 latach. Teraz skupiam się na stosowanym AI w skali."
  # Twoje 3-5 supermocy
  superpowers:
    - "Pipeline'y ML end-to-end"
    - "Szybkie prototypowanie (od pomysłu do produkcji w 2 tygodnie)"
    - "Komunikacja międzydziałowa"
  # Proof pointy — projekty, artykuły, case studies z mierzalnym wpływem
  proof_points:
    - name: "Projekt Alpha"
      url: "https://jankowalski.dev/projekt-alpha"
      hero_metric: "Zmniejszono opóźnienie inferencji o 40%"
    - name: "Narzędzie open source"
      url: "https://github.com/jankowalski/narzedzie"
      hero_metric: "2 tys.+ gwiazdek na GitHub"
  # Opcjonalnie: URL dashboardu/demo z danymi dostępowymi
  # dashboard:
  #   url: "https://jankowalski.dev/demo"
  #   password: "demo-2026"

compensation:
  # Specyfika PL: rozróżniaj formę zatrudnienia. Podaj widełki dla preferowanej formy.
  employment_type: "B2B"          # "UoP" | "B2B" | "UZ" — preferowana forma
  target_range: "25 000-32 000 zł" # Docelowe wynagrodzenie (netto+VAT dla B2B, brutto/mies. dla UoP)
  currency: "PLN"
  minimum: "20 000 zł"            # Kwota progowa (poniżej rezygnujesz)
  location_flexibility: "Preferowany remote, możliwy 1 tydzień/mies. w biurze"

location:
  country: "Polska"
  city: "Warszawa"
  timezone: "CET"
  visa_status: "Nie wymaga sponsoringu wizy (obywatel UE)"
  # Dla ról zdalnych poza Polską:
  # onsite_availability: "1 tydzień/mies. w dowolnym mieście"

cv:
  output_format: "html" # "html" (domyślnie) lub "latex"
  # (Opcjonalnie) ID projektu CV w Canva do wizualnego generowania przez /career-ops pdf.
  # Znajdziesz je w URL projektu Canva: https://www.canva.com/design/DAxxxxxxx/...
  # ID zaczyna się od "D" i ma 11 znaków.
  # canva_resume_design_id: "DAxxxxxxxxx"

# Próg auto-PDF podczas oceny (używany przez `/career-ops pipeline` i
# `bash batch/batch-runner.sh`).
#
# Dopasowane CV w PDF jest generowane automatycznie tylko gdy ocena oferty
# jest >= tego progu. Generowanie PDF kosztuje ~30-60 s na ofertę (start
# Playwright + render HTML), a większość ofert ze skanu dostaje 2.x/3.x i nigdy
# nie staje się realną aplikacją — więc próg unika marnowania renderów.
#
# Domyślnie (klucz nieobecny LUB zakomentowany): 3.0 — pierwotny próg
# `/career-ops pipeline`. Obie ścieżki oceny stosują ten sam domyślny próg,
# więc batch i tryb interaktywny traktują tę samą ofertę identycznie.
#
# Podnieś go (np. 4.0), aby generować PDF tylko dla mocniejszych dopasowań,
# a resztę zostawić jako sam raport — te można wygenerować na żądanie przez
# `/career-ops pdf {company-slug}`. Działają progi ułamkowe (np. 3.5 — oceny
# z połówką, jak 3.5/5, występują). Ustaw 0, aby generować PDF dla każdej oferty.
# auto_pdf_score_threshold: 4.0
