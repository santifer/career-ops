# Career-Ops Profile Configuration
# Copy this file to config/profile.yml and fill in your details.
# This is the single source of truth for your personal data across all modes.

candidate:
  full_name: "Jane Smith"
  email: "jane@example.com"
  phone: "+1-555-0123"
  location: "San Francisco, CA"
  linkedin: "linkedin.com/in/janesmith"
  portfolio_url: "https://janesmith.dev"
  github: "github.com/janesmith"
  twitter: "https://x.com/janesmith"

target_roles:
  # Your North Star roles — what you're optimizing for
  primary:
    - "Senior AI Engineer"
    - "Staff ML Engineer"
  # Archetypes help the evaluation system score fit
  archetypes:
    - name: "AI/ML Engineer"
      level: "Senior/Staff"
      fit: "primary"        # primary = dream role, secondary = good fit, adjacent = stretch
    - name: "AI Product Manager"
      level: "Senior"
      fit: "secondary"
    - name: "Solutions Architect"
      level: "Mid-Senior"
      fit: "adjacent"

narrative:
  # Your professional headline (1 line)
  headline: "ML Engineer turned AI product builder"
  # Your exit story — what makes you unique
  exit_story: "Built and sold my SaaS after 5 years. Now focused on applied AI at scale."
  # Your top 3-5 superpowers
  superpowers:
    - "End-to-end ML pipelines"
    - "Fast prototyping (idea to prod in 2 weeks)"
    - "Cross-functional communication"
  # Proof points — projects, articles, case studies with measurable impact
  proof_points:
    - name: "Project Alpha"
      url: "https://janesmith.dev/project-alpha"
      hero_metric: "Reduced inference latency 40%"
    - name: "Open Source Tool"
      url: "https://github.com/janesmith/tool"
      hero_metric: "2K+ GitHub stars"
  # Optional: dashboard/demo URL with credentials
  # dashboard:
  #   url: "https://janesmith.dev/demo"
  #   password: "demo-2026"

compensation:
  target_range: "$150K-200K"     # Your target total comp
  currency: "USD"
  minimum: "$120K"               # Walk-away number
  location_flexibility: "Remote preferred, 1 week/month on-site possible"

location:
  country: "United States"
  city: "San Francisco"
  timezone: "PST"
  visa_status: "No sponsorship needed"
  # For remote roles outside your country:
  # onsite_availability: "1 week/month in any city"
  # Discrete answers for visa-status dropdowns on application forms:
  # visa_form_answer_fulltime: "..."
  # visa_form_answer_parttime: "..."
  sponsorship_answer: "No sponsorship required"

# ── Application form answers (Layer 1 of the form-fill resolver) ──────────────
# Static answers the resolver fills deterministically (zero model tokens) via
# field-rules.mjs. The classic fixed fields plus the employer-independent custom
# fields the old fill used to leave blank. Reviewed by you before submit.
application_answers:
  salary_range: "$150,000 – 200,000"
  notice_period: "2 weeks"
  # Employer-independent custom fields:
  current_residence: "San Francisco, CA, USA"
  open_to_relocation: "Open to relocation for the right role."
  office_days_commitment: "Yes — I can commit to the required days in office."
  work_rights_freetext: "I have full working rights and require no sponsorship."
  work_rights_consent: "Yes, I consent."
  website: "https://your-portfolio.example.com"
  # Part-time guardrail (only used for roles classified part-time):
  # availability_parttime: "..."
  # max_hours_per_week_parttime: 24

# ── Local embedding endpoint (Layer 2 semantic answer cache) ──────────────────
# Optional. Enables zero-token reuse of previously answered form questions via a
# local embedding model. Point `python` at an interpreter that has
# sentence-transformers + torch and can load the model below. Override with
# $CAREER_OPS_EMBED_PYTHON. If unset/unavailable, Layer 2 is skipped gracefully.
# embedding:
#   python: "/abs/path/to/venv/bin/python"
#   model: "google/embeddinggemma-300m"
#   threshold: 0.85   # cosine cutoff for reusing a cached answer

# Optional follow-up cadence preferences for `node followup-cadence.mjs`.
# CLI flags still win for one-off runs (for example `--applied-days 10`).
# followup_cadence:
#   applied_first_days: 7
#   applied_subsequent_days: 7
#   applied_max_followups: 2
#   responded_initial_days: 1
#   responded_subsequent_days: 3
#   interview_thankyou_days: 1

cv:
  output_format: "html" # "html" (default) or "latex"
  # (Optional) Canva resume design ID for visual CV generation via /career-ops pdf.
  # Find it in your Canva design URL: https://www.canva.com/design/DAxxxxxxx/...
  # The ID starts with "D" and is 11 characters long.
  # canva_resume_design_id: "DAxxxxxxxxx"

# ── EEO / Diversity fields ────────────────────────────────────────────────────
# Default is "prefer not to say" for all diversity questions.
# Only used when a field is mandatory AND unskippable. Leave blank to use default.
eeo:
  default: "prefer not to say"
  ethnicity: ""   # e.g. "White", "Asian", "Black or African American"
  gender: ""      # e.g. "Male", "Female", "Non-binary", "Prefer not to say"

# ── Salary (single-number fields) ────────────────────────────────────────────
# Used when a form has a single numeric salary field rather than a free-text range.
salary:
  annual: ""          # e.g. 75000 — annual total compensation
  thousands: ""       # e.g. 75    — for fields labelled in "$K" or "thousands"
  hourly_parttime: "" # e.g. 30    — part-time hourly rate
  hourly_fulltime: "" # e.g. 38    — full-time hourly (annual / 52 / 38)

# ── References ────────────────────────────────────────────────────────────────
references: "Available on request"

# ── Formatting ────────────────────────────────────────────────────────────────
formatting:
  date_format: ""       # e.g. "DD/MM/YYYY" (AU), "MM/DD/YYYY" (US), "YYYY-MM-DD"
  phone_country: ""     # e.g. "+61" (AU), "+1" (US/CA), "+44" (UK)

# ── Automation ────────────────────────────────────────────────────────────────
automation:
  fill_concurrency: 1   # parallel headless fills — keep at 1 for public release
  login_timeout_min: 10 # minutes to wait for post-login form signal
  credentials_path: "data/portal-credentials.json"   # gitignored

# ── Cover Letter Settings ──────────────────────────────────────────────────
#
# Used by `/career-ops cover` and the cover letter sub-flow in `/career-ops pdf`.
# All fields are optional — omit any you don't need.

cover_letter:
  # Your notice period in calendar days. Surfaced as a prompt default when the
  # JD requests an immediate start. The user confirms the actual value before it
  # appears in the letter.
  notice_period_days: 30

  # Your current professional domain (used to detect domain gaps vs the JD).
  # Plain English, e.g. "digital media", "fintech", "healthcare IT".
  primary_domain: "your current domain"

  # Languages you are actively learning. Each entry MAY produce a closing
  # sentence in that language IF the JD location matches one of the listed
  # countries AND the user confirms inclusion during the cover letter flow.
  # Remove the block entirely if not applicable.
  language_learning:
    - language: Spanish
      current_level: B1
      target_level: B2
      target_date: "end of 2026"
      # The sentence to include, written in that language. Keep it one line.
      sentence: "Estoy aprendiendo español y espero alcanzar el nivel B2 a finales de 2026."
      # Only trigger this entry when the JD location is in one of these countries.
      countries: [Spain, Mexico, Argentina, Colombia, Chile]

  # Which rendered cover-letter format the apply layer auto-attaches per channel.
  # One approved letter renders to several formats (`generate-cover-formats.mjs`):
  # polished PDF (the human format), DOCX (the machine/ATS format), and Markdown
  # (a paste copy). At apply time `chooseCoverFormat()` picks one from the form
  # field's accepted types and the host. Researched defaults (2026): DOCX parses
  # more reliably than PDF on every major ATS (Workday, Greenhouse, Lever, iCIMS,
  # Taleo), so portal uploads default to DOCX; direct email to a human gets the
  # polished PDF. Override here only if you want different behavior. Omit the whole
  # block to use the defaults.
  format_policy:
    # What to upload when a portal field accepts both Word and PDF: docx | pdf.
    portal_default: docx
    # Channel hints that mean a human reads the file directly (no ATS parser),
    # which always get the polished PDF.
    human_channels: [email, direct, human, hiring-manager]

# ── Auto-PDF threshold ──────────────────────────────────────────────────────
#
# Auto-PDF threshold during evaluation (used by `/career-ops pipeline` and
# `bash batch/batch-runner.sh`).
#
# An offer's tailored CV PDF is auto-generated only when its score is
# >= this threshold. Generating a PDF costs ~30-60s per offer (Playwright
# launch + HTML render), and most offers in a scan score 2.x/3.x and never
# become an actual application — so the gate avoids wasted renders.
#
# Default (key absent OR commented out): 3.0 — the original gate of
# `/career-ops pipeline`. Both evaluation paths apply the same default, so
# a batch run and an interactive run treat the same offer identically.
#
# Raise it (e.g. 4.0) to auto-generate PDFs only for stronger matches and
# leave the rest report-only — those can still be produced on demand via
# `/career-ops pdf {company-slug}`. Fractional thresholds work (e.g. 3.5 —
# half-point scores like 3.5/5 occur in evaluations). Set it to 0 to
# generate a PDF for every offer.
# auto_pdf_score_threshold: 4.0
