# lower-tier-test-companies.yml
#
# Safety config for --live submission mode.
# ALL THREE locks must be active before auto-submit will click Submit:
#   (a) --allow-tier lower          CLI flag on every invocation
#   (b) enabled: true               this file, set by you
#   (c) Company slug in this list   per-card whitelist
#
# How to identify a "lower-tier" company:
#   - Fortune 1000 but NOT Fortune 100 (lower stakes if a submission goes wrong)
#   - You'd be fine if a recruiter sees an automated application there
#   - You have a genuine interest in the role (still quality > speed)
#
# How to add a company:
#   1. Find its kanban card's `company` field value (e.g. "Acme Corp")
#   2. Compute slug: lowercase, non-alphanumeric → hyphens (e.g. "acme-corp")
#   3. Add an entry below with slug + reason
#   4. Set enabled: true
#
# Hard cap: 5 live submissions per day (tracked in data/live-daily-count-{date}.json)
# --limit flag cannot override the daily cap.

# Note: "lower-tier" is a misnomer here. These are the FIRST live targets
# Rahil approved for validation. Both are Greenhouse ATS. Hand-crafted CLs
# committed 2026-06-10. Update this list before any subsequent live runs.

enabled: true  # Approved 2026-06-10 for Palantir + Zoox first-run validation

companies:
  - slug: palantir
    reason: First live submission target, CL hand-crafted 2026-06-10
    max_per_day: 1
  - slug: zoox
    reason: First live submission target, CL hand-crafted 2026-06-10
    max_per_day: 1
