# Employer Aliases — Brand Name to USCIS Legal Entity Map
#
# Maps common brand/company names to their exact legal entity names as they
# appear in the USCIS H-1B Employer Data Hub CSV files.
#
# Format: brand_name: "USCIS LEGAL ENTITY NAME (exact match in CSV)"
# Lookup: normalized brand name (lowercase, stripped suffixes) -> legal entity
#
# Used by the sponsorship detection engine to resolve brand names from job
# postings to their H-1B filing records in USCIS data.


