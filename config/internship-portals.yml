# 2027 Software Engineering Internship Scanner
# Used by .github/workflows/internship-scan.yml via CAREER_OPS_PORTALS.
#
# Add more companies under tracked_companies. Prefer supported ATS URLs when
# available: Greenhouse, Ashby, Lever, Workday, SmartRecruiters, Workable,
# Recruitee, BambooHR, Breezy, Pinpoint, Rippling, Comeet.
# For custom career pages, set scan_method: playwright so scripts/internship-scan.mjs
# can use its simple browser fallback after the Career-Ops scanner runs.

scan_history:
  recheck_after_days: 365

freshness_filter:
  enabled: true
  max_age_days: 14
  keep_undated: true

playwright_search_terms: "software engineer intern"

title_filter:
  positive:
    - "Intern"
    - "Internship"
    - "Co-op"
    - "Co Op"
    - "Coop"
    - "PEY"
  negative:
    - "Senior"
    - "Staff"
    - "Principal"
    - "Manager"
    - "Director"
    - "MBA"
    - "New Grad"
    - "New Graduate"
    - "Graduate"
    - "University Graduate"
    - "Early Career"
    - "Full-time"
    - "Full Time"
    - "Product Manager"
    - "Product Design"
    - "Designer"
    - "Marketing"
    - "Sales"
    - "Legal"
    - "Finance"
    - "Accounting"
    - "Recruiting"
    - "People"
    - "HR"
    - "Hardware"
    - "Mechanical"
    - "Electrical"
    - "ASIC"
    - "FPGA"

location_filter:
  always_allow:
    - "Canada"
    - "United States"
    - "US"
    - "USA"
    - "Remote"
  allow:
    - "Canada"
    - "United States"
    - "US"
    - "USA"
    - "Remote"
    - "Toronto"
    - "Vancouver"
    - "Waterloo"
    - "Montreal"
    - "Ottawa"
    - "New York"
    - "Seattle"
    - "San Francisco"
    - "Palo Alto"
    - "Mountain View"
    - "Sunnyvale"
    - "Menlo Park"
    - "Bellevue"
    - "Redmond"
    - "Austin"
    - "Boston"
    - "Chicago"
  block:
    - "India"
    - "Bengaluru"
    - "Hyderabad"
    - "Singapore"
    - "Japan"
    - "China"
    - "Brazil"
    - "Australia"

