  # Padrão: 7-9 segmentos separados por " | " (ATS-friendly + alinha com LinkedIn pt/in/fernandoxavier02)
  # Regra: NUNCA usar "Director" / "Diretor" — sempre liderar com "Head of Accounting and Controlling"
  headline: "Head of Accounting and Controlling | Regional Controller LATAM | AI-First Finance Leader | Leader of Gen AI Ops & Automation | CRC | ACCA Certified (IFR) | FMVA | IFRS / US GAAP / BR GAAP Expert | Trilingual PT/EN/ES"
  # Your exit story — what makes you unique
  exit_story: "15+ years leading Finance & Accounting across LATAM as Head of Accounting and Regional Controller. Differentiator: bridges controllership rigor with AI-First finance transformation — automated 70% of manual tasks, cut reporting cycles by 40%, founded internal academies, and led 3 concurrent M&A integrations. CRC active, ACCA Cert IFR, FMVA. Trilingual PT/EN(C2)/ES(C1)."
  # Your top 3-5 superpowers
  superpowers:
    - "End-to-end controllership across multi-country operations (5 LATAM entities — BR, MX, CL, AR, PE)"
    - "AI-First Finance Leadership & Gen AI Ops (Microsoft + GPT — 70% manual task reduction, 40% close cycle reduction)"
    - "IFRS / US GAAP / BR GAAP multi-standard expertise — including IFRS 3, 9, 15, 16, 17, S1, S2, 18 implementations"
    - "M&A due diligence + post-merger integration (3 concurrent deals; appointed Post-Integration Director in Peru)"
    - "Brazilian Tax Reform Committee member (CBS/IBS) + Forvis Internal Academy founder"
    - "Trilingual leadership (Portuguese native, English C2 EF SET certified, Spanish C1 Advanced)"
    - "Team management at scale (~100 professionals + 7 direct managers at Forvis Mazars; 11 analysts at Capgemini)"
  # Proof points — projects, articles, case studies with measurable impact
  proof_points:
    - name: "Integrated Accounting Intelligence with Microsoft + GPT"
      hero_metric: "Automated manual accounting tasks reducing the closing cycle by 40%"
    - name: "Multi-Country Financial Operations"
      hero_metric: "Managed end-to-end finance for 5 LATAM subsidiaries (BR, MX, CL, AR, PE)"
    - name: "M&A Integration"
      hero_metric: "Led 3 due diligence + post-merger integration projects from scratch"

