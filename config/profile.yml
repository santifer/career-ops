# Career-Ops Profile Configuration
# Copy this file to config/profile.yml and fill in your details.
# This is the single source of truth for your personal data across all modes.

candidate:
  full_name: "Fernando Costa Xavier"
  email: "fernandocostaxavier@gmail.com"
  phone: "+55 11 96480-1913"
  location: "Sao Paulo, Brazil"
  linkedin: "linkedin.com/in/fernandoxavier02"
  github: "github.com/fernandoxavier02"
  # (Optional) Canva resume design ID for visual CV generation via /career-ops pdf.
  # Find it in your Canva design URL: https://www.canva.com/design/DAxxxxxxx/...
  # The ID starts with "D" and is 11 characters long.
  # canva_resume_design_id: "DAxxxxxxxxx"

target_roles:
  # PRIMARY: Accounting / Controllership / Consolidation (sempre Head, nunca Director)
  # Regra do candidato: NÃO usar "Diretor" / "Director" como cargo-alvo —
  # restringe demais a busca de vagas. Sempre "Head of Accounting and Controlling"
  # como vocabulário-líder. Ver `.claude/references/recruiter-lens.md` e cv-rules.md.
  primary:
    - "Head of Accounting and Controlling"
    - "Head of Accounting"
    - "Head of Controllership"
    - "Regional Controller LATAM"
    - "Controller"
    - "Head de Consolidacao"
    - "Gerente de Consolidacao"
    - "Business Controller"
  # SECONDARY: FP&A / Financeiro
  secondary:
    - "Head de FP&A"
    - "Gerente de FP&A"
    - "Head Financeiro"
    - "Gerente Financeiro"
    - "Finance Business Partner"
  # Archetypes help the evaluation system score fit
  archetypes:
    # -- PRIMARY: Accounting / Controllership / Consolidation --
    - name: "Head of Accounting and Controlling"
      level: "Head"
      fit: "primary"
    - name: "Regional Controller LATAM / Business Controller"
      level: "Senior/Head"
      fit: "primary"
    - name: "Head de Consolidacao / Gerente de Consolidacao"
      level: "Head/Senior"
      fit: "primary"
    - name: "Head of Statutory Accounting & IFRS Reporting LATAM"
      level: "Head"
      fit: "primary"
    # -- SECONDARY: FP&A / Financeiro --
    - name: "Head de FP&A / Gerente de FP&A"
      level: "Head/Senior"
      fit: "secondary"
    - name: "Head Financeiro / Gerente Financeiro"
      level: "Head/Senior"
      fit: "secondary"
    # -- ADJACENT --
    - name: "M&A / Due Diligence Manager"
      level: "Senior"
      fit: "adjacent"
    - name: "Finance Manager (multinational)"
      level: "Senior"
      fit: "adjacent"
  # ANTI-TARGETS: cargos a NÃO usar como vocabulário-líder
  # (mesmo que o cargo oficial seja Director, sempre apresentar como Head)
  avoid_titles:
    # PT
    - "Diretor"
    - "Diretor de Contabilidade"
    - "Diretor Financeiro"
    - "Diretor de Finanças"
    # EN
    - "Director"
    - "Finance Director"
    - "Accounting Director"
    - "Director of Finance"
    - "Director of Accounting"
    # ES
    - "Director Financiero"
    - "Director de Contabilidad"
    - "Director de Finanzas"
    # FR
    - "Directeur Financier"
    - "Directeur de la Comptabilité"
    # DE
    - "Finanzdirektor"
    - "Direktor für Finanzen"
    - "Buchhaltungsdirektor"
  # Director-allowed exceptions (cargos legítimos onde "Director" PODE aparecer):
  # - Audit Director (cargo de Big Four/consultoria, não é Finance Director)
  # - Tax Director (especialista, não Finance generalist)
  # - Post-Integration Director (M&A, cargo temporário de projeto)
  # Esses NÃO entram em avoid_titles porque são cargos especialistas distintos.
  director_allowed_exceptions:
    - "Audit Director"
    - "Tax Director"
    - "Post-Integration Director"

narrative:
