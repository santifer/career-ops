# Portal Scanner Configuration — Engineering Manager roles (London / UK / Remote)

title_filter:
  positive:
    - "Engineering Manager"
    - "Engineering Lead"
    - "Head of Engineering"
    - "Director of Engineering"
    - "VP Engineering"
    - "VP of Engineering"
    - "Software Engineering Manager"
    - "Platform Engineering Manager"
    - "EM,"
    - "EM -"
    - "Technical Lead Manager"
    - "Group Engineering Manager"
    - "Senior Engineering Manager"
  negative:
    - "Intern"
    - "Graduate"
    - "Junior"
    - "Staff Engineer"
    - "Principal Engineer"
    - "Product Manager"
    - "Sales"
    - "Account Manager"
    - "Customer Success"
    - "Marketing"
    - "Finance"
    - "Legal"
    - "Recruiting"
    - "Data Engineer"
    - "ML Engineer"
    - "Site Reliability"
    - "DevOps"
  seniority_boost:
    - "Senior"
    - "Staff"
    - "Head"
    - "Director"
    - "Group"

search_queries:
  - name: LinkedIn — EM London
    query: '"Engineering Manager" London site:linkedin.com/jobs'
    enabled: true

  - name: Greenhouse — EM UK/Remote
    query: 'site:job-boards.greenhouse.io "Engineering Manager" London OR remote UK'
    enabled: true

  - name: Ashby — EM UK/Remote
    query: 'site:jobs.ashbyhq.com "Engineering Manager" OR "Head of Engineering" London OR remote UK'
    enabled: true

  - name: Lever — EM UK/Remote
    query: 'site:jobs.lever.co "Engineering Manager" London OR remote UK'
    enabled: true

  - name: Greenhouse — Director Engineering
    query: 'site:job-boards.greenhouse.io "Director of Engineering" OR "VP Engineering" London OR remote UK'
    enabled: true

  - name: Ashby — Director/Head Engineering
    query: 'site:jobs.ashbyhq.com "Director of Engineering" OR "Head of Engineering" London OR remote UK'
    enabled: true

  - name: TechLondon Jobs — EM
    query: '"Engineering Manager" OR "Head of Engineering" London site:jobs.techcrunch.com OR site:workatastartup.com'
    enabled: true

  - name: Himalayas — Remote EM
    query: 'site:himalayas.app "Engineering Manager" OR "Head of Engineering" remote UK OR Europe'
    enabled: true

  - name: WeWorkRemotely — EM
    query: 'site:weworkremotely.com "Engineering Manager" OR "Director of Engineering"'
    enabled: true

  - name: Remote.co — EM
    query: 'site:remote.co "Engineering Manager" OR "Head of Engineering"'
    enabled: true

