# Portal Scanner Configuration — Real Estate & Property Management (US Remote)
# Targeting data professionals with 14+ years of experience.
# Companies: PropTech, REITs, property management SaaS, commercial RE, residential platforms, mortgage tech.
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)

# -- Title filter --
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # -- Data Engineering --
    - "Data Engineer"
    - "Senior Data Engineer"
    - "Staff Data Engineer"
    - "Principal Data Engineer"
    - "Lead Data Engineer"
    - "Analytics Engineer"
    - "Data Platform Engineer"
    - "Data Infrastructure"
    - "Data Architect"
    - "Data Warehouse"
    - "ETL"
    - "ELT"
    - "dbt"
    - "Databricks"
    - "Snowflake"
    # -- Data Science & ML --
    - "Data Scientist"
    - "Machine Learning Engineer"
    - "ML Engineer"
    - "Applied Scientist"
    - "Research Scientist"
    - "Quantitative Analyst"
    - "MLOps"
    - "AI Engineer"
    # -- Analytics & BI --
    - "Data Analyst"
    - "Business Intelligence"
    - "BI Engineer"
    - "BI Developer"
    - "Analytics"
    - "Reporting Engineer"
    - "Insights Engineer"
    - "Product Analyst"
    # -- Full Stack / Platform (data-adjacent) --
    - "Full Stack Engineer"
    - "Full-Stack Engineer"
    - "Platform Engineer"
    - "Backend Engineer"
    - "Software Engineer"
  negative:
    # -- Leadership / people-manager roles (IC only) --
    - "Head of Data"
    - "Head of Analytics"
    - "Director of Data"
    - "Director of Analytics"
    - "VP of Data"
    - "VP Analytics"
    - "Chief Data Officer"
    - "CDO"
    - "VP, Data"
    - "VP of Analytics"
    - "Data Manager"
    - "Analytics Manager"
    - "Engineering Manager"
    # -- Seniority / experience filters --
    - "Junior"
    - "Intern"
    - "Entry Level"
    - "Entry-Level"
    - "iOS"
    - "Android"
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "Mainframe"
    - "COBOL"
    - "SAP "
    - "Salesforce Admin"
    - "Oracle EBS"
  seniority_boost:
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"

# -- Search queries --
# Focused on real estate + data professional roles, US remote.

search_queries:
  # -- Greenhouse: real estate data roles --
  - name: Greenhouse — RE Data Engineer remote
    query: 'site:job-boards.greenhouse.io "data engineer" OR "analytics engineer" "real estate" OR "property" remote'
    enabled: true

  - name: Greenhouse — RE Data Scientist remote
    query: 'site:job-boards.greenhouse.io "data scientist" OR "machine learning" "real estate" OR "proptech" remote'
    enabled: true

  - name: Greenhouse — RE BI & Analytics remote
    query: 'site:job-boards.greenhouse.io "business intelligence" OR "BI engineer" OR "data analyst" "real estate" OR "property management" remote'
    enabled: true

  # -- Lever: real estate data roles --
  - name: Lever — RE Data roles remote
    query: 'site:jobs.lever.co "data engineer" OR "data scientist" OR "analytics engineer" "real estate" OR "property" OR "proptech" remote'
    enabled: true

  # -- Ashby: real estate data roles --
  - name: Ashby — RE Data roles remote
    query: 'site:jobs.ashbyhq.com "data engineer" OR "analytics engineer" OR "data scientist" "real estate" OR "property" remote'
    enabled: true

  # -- LinkedIn / broad aggregators --
  - name: LinkedIn — PropTech Data Engineer remote US
    query: '"data engineer" OR "analytics engineer" "real estate" OR "proptech" OR "property management" remote site:linkedin.com/jobs'
    enabled: true

  - name: LinkedIn — PropTech Data Scientist remote US
    query: '"data scientist" OR "machine learning engineer" "real estate" OR "proptech" remote site:linkedin.com/jobs'
    enabled: true

  # -- Indeed --
  - name: Indeed — RE Data Engineer remote
    query: 'site:indeed.com "data engineer" "real estate" OR "property management" remote'
    enabled: true

  - name: Indeed — RE Data Scientist remote
    query: 'site:indeed.com "data scientist" OR "ML engineer" "real estate" OR "proptech" remote'
    enabled: true

  # -- Remote job boards --
  - name: Himalayas — RE Data remote
    query: 'site:himalayas.app "data engineer" OR "data scientist" OR "analytics" "real estate" OR "property"'
    enabled: true

  - name: WeWorkRemotely — Data roles RE
    query: 'site:weworkremotely.com "data" "real estate" OR "property management" OR "proptech"'
    enabled: true

  - name: RemoteOK — Data roles RE
    query: 'site:remoteok.com "data engineer" OR "data scientist" "real estate" OR "proptech"'
    enabled: true

  # -- HN Who's Hiring --
  - name: HN Who's Hiring — RE Data remote
    query: 'site:news.ycombinator.com "data engineer" OR "data scientist" "real estate" OR "proptech" remote'
    enabled: true

