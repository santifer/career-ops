    - "Europe"
    - "Europa"
    - "Austria"
    - "Österreich"
    - "Switzerland"
    - "Schweiz"
    - "Berlin"
    - "München"
    - "Munich"
    - "Hamburg"
    - "Frankfurt"
    - "Köln"
    - "Cologne"
    - "Düsseldorf"
    - "Stuttgart"
    - "Heidelberg"
    - "Freiburg"
