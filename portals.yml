# Portal Scanner Configuration — Tier 1: Accounting/Controller Leadership
# Customized for: Fernando Costa Xavier
# Target: Multinational companies in Brazil requiring English
# Focus: Head/Gerente de Contabilidade, Controller, Gerente de Controladoria e correlatas
# Excluded: Big Four (Deloitte, PwC, EY, KPMG) and Mazars
#
# Strategy (3 levels):
#   1. Playwright -> careers_url of each company (real-time, reliable)
#   2. Greenhouse API -> structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)

# -- Title filter --
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # -- PRIMARY: Accounting / Controllership Leadership --
    - "Head of Accounting"
    - "Head of Controllership"
    - "Accounting Director"
    - "Accounting Manager"
    - "Controller"
    - "Controllership"
    - "Financial Controller"
    - "Regional Controller"
    - "LATAM Controller"
    - "Country Controller"
    - "Plant Controller"
    - "Site Controller"
    - "Corporate Controller"
    - "Group Controller"
    # -- PRIMARY: Portuguese equivalents --
    - "Diretor de Contabilidade"
    - "Head de Contabilidade"
    - "Gerente de Contabilidade"
    - "Gerente de Controladoria"
    - "Head de Controladoria"
    - "Diretor Financeiro"
    # -- PRIMARY: Consolidation --
    - "Consolidation Manager"
    - "Consolidation Director"
    - "Head of Consolidation"
    - "Head de Consolidacao"
    - "Gerente de Consolidacao"
    - "Financial Reporting Manager"
    - "Reporting Manager"
    - "IFRS Manager"
    # -- SECONDARY: FP&A --
    - "FP&A Manager"
    - "FP&A Controller"
    - "Head of FP&A"
    - "Head de FP&A"
    - "Gerente de FP&A"
    - "Planning Manager"
    # -- SECONDARY: Financeiro / Finance Manager --
    - "Finance Manager"
    - "Finance Controller"
    - "Head Financeiro"
    - "Gerente Financeiro"
    - "GERENTE"
    # -- Related (same level) --
    - "Treasury Manager"
    - "Tax Manager"
    - "Tax Director"
    - "Transfer Pricing"
  negative:
    # Exclude junior/entry level
    - "Junior"
    - "Intern"
    - "Estagio"
    - "Trainee"
    - "Analyst"
    - "Analista"
    - "Assistente"
    - "Auxiliar"
    # Exclude C-level / exec above Tier 1
    - "CFO"
    - "Chief Financial Officer"
    - "VP Finance"
    - "Vice President Finance"
    - "Finance Director"
    - "Director of Finance"
    - "Finance Lead"
    # Exclude unrelated
    - "Sales"
    - "Marketing"
    - "Developer"
    - "Engineer"
    - "Designer"
    - "Nurse"
    - "Physician"
    - "HR"
    - "Human Resources"
    - "Recruiter"
  seniority_boost:
    - "Senior"
    - "Lead"
    - "Head"
    - "Director"
    - "Manager"
    - "GERENTE"
    - "Regional"
    - "LATAM"
    - "Country"
    - "Plant"
    - "Site"
    - "Corporate"
    - "Group"

# -- Search queries --
# PRIORITY ORDER:
#   Tier 0 (Nível 0): Brazilian portals with auth — scanned via Playwright, NOT WebSearch
#     LinkedIn, Indeed Brazil, Vagas.com.br, Robert Half
#     These are handled directly by the scan mode with browser_navigate + browser_snapshot
#   Tier 1 (Nível 1): WebSearch queries below — discover jobs across company career pages
#   Tier 2 (Nível 2): ATS APIs — handled by scan.mjs or scan mode API detection
#   Tier 3 (Nível 3): Individual company career pages — tracked_companies below

# ═══════════════════════════════════════════════════════
# TIER 0: Playwright-authenticated portals (NOT WebSearch)
# These are scanned with browser_navigate after Auth Gate
# Terms used for search within each portal:
# ═══════════════════════════════════════════════════════

auth_portals:
  - name: LinkedIn
    url: "https://www.linkedin.com/jobs/"
    search_terms:
      - "Controller Sao Paulo"
      - "Head of Accounting Brazil"
      - "Accounting Director Sao Paulo"
      - "Consolidation Manager Brazil"
      - "FP&A Manager Sao Paulo"
      - "Gerente de Controladoria"
      - "Diretor de Contabilidade"
      - "Gerente Financeiro Sao Paulo"
    requires_auth: true
    max_pages: 3

  - name: Indeed Brazil
    url: "https://br.indeed.com/"
    search_terms:
      - "Controller Sao Paulo"
      - "Head of Accounting Brazil"
      - "Accounting Director"
      - "Consolidation Manager"
      - "FP&A Manager"
      - "Gerente de Controladoria"
      - "Gerente Financeiro"
    requires_auth: true
    max_pages: 3

  - name: Vagas.com.br
    url: "https://www.vagas.com.br/"
    search_terms:
      - "Controller Sao Paulo"
      - "Gerente de Contabilidade"
      - "Head of Accounting"
      - "Gerente de Controladoria"
      - "Gerente de Consolidacao"
      - "Gerente Financeiro"
      - "FP&A"
    requires_auth: true
    max_pages: 3

  - name: Robert Half
    url: "https://www.roberthalf.com.br/vagas"
    search_terms:
      - "Controller"
      - "Accounting Manager"
      - "Finance Manager"
      - "Head of Accounting"
      - "FP&A"
      - "Consolidation"
    requires_auth: true
    max_pages: 3

# ═══════════════════════════════════════════════════════
# TIER 1: WebSearch queries (Google discovery)
# ═══════════════════════════════════════════════════════

search_queries:
  # -- Greenhouse --
  - name: Greenhouse — Accounting Leadership Brazil
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Accounting Manager" OR "Controller" OR "Head of Accounting" OR "Controllership" Brazil'
    enabled: true

  - name: Greenhouse — Finance Manager Brazil
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Finance Manager" OR "Finance Controller" Brazil "Sao Paulo"'
    enabled: true

  # -- Lever --
  - name: Lever — Accounting/Controller Brazil
    query: 'site:jobs.lever.co "Accounting Manager" OR "Controller" OR "Head of Accounting" Brazil "Sao Paulo"'
    enabled: true

  # -- Ashby --
  - name: Ashby — Accounting Leadership
    query: 'site:jobs.ashbyhq.com "Accounting" OR "Controller" OR "Controllership" Brazil OR "Sao Paulo" OR LATAM'
    enabled: true

  # -- Workable --
  - name: Workable — Accounting Controller Brazil
    query: 'site:apply.workable.com "Accounting Manager" OR "Controller" OR "Head of Accounting" Brazil'
    enabled: true

  # -- Glassdoor --
  - name: Glassdoor — Controller Brazil
    query: 'site:glassdoor.com.br "Controller" OR "Head of Accounting" OR "Accounting Manager" "Sao Paulo" Brazil'
    enabled: true

  # -- Specific searches --
  - name: IFRS/Consolidation Manager Brazil
    query: '"IFRS" OR "US GAAP" "Controller" OR "Manager" OR "Consolidation" Brazil "Sao Paulo" English multinational'
    enabled: true

  - name: FP&A Manager Brazil
    query: '"FP&A Manager" OR "FP&A Controller" OR "Financial Planning" Brazil "Sao Paulo" site:linkedin.com/jobs'
    enabled: true

  - name: Plant/Site Controller Brazil
    query: '"Plant Controller" OR "Site Controller" OR "Manufacturing Controller" Brazil'
    enabled: true

  # -- Google broad search across company career pages --
  - name: Google — Controller multinational Brazil
    query: '"Controller" OR "Head of Accounting" OR "Accounting Director" Brazil "Sao Paulo" "careers" OR "jobs" English multinational -site:linkedin.com -site:indeed.com -site:vagas.com.br'
    enabled: true

  - name: Google — Consolidation Head Brazil
    query: '"Consolidation Manager" OR "Consolidation Director" OR "Head of Consolidation" Brazil "Sao Paulo" -site:linkedin.com -site:indeed.com -site:vagas.com.br'
    enabled: true

