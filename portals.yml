# Mitchell's Career-Ops Portal Configuration
# Customized 2026-04-25 for A1/A2/B archetype targeting per modes/_profile.md.
#
# Strategy:
#   1. Greenhouse / Ashby / Lever → zero-token API scan via scan.mjs (no LLM cost)
#   2. Custom careers pages (Workday, in-house) → WebSearch fallback (LLM cost per query)
#
# Excluded companies: Google (current employer per modes/_profile.md Section 8).
#
# Per modes/_profile.md Section 7: companies with files in corpus/companies/{slug}.md
# get auto-flagged at evaluation time (e.g., Anthropic = ANTHROPIC-POSTING flag).

# -- Title filter --
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # Tier A2 — AI Solutions Architect / Forward Deployed / Applied AI / Enablement
    - "Solutions Architect"
    - "Forward Deployed"
    - "Deployed Engineer"
    - "Applied AI"
    - "AI Engineer"
    - "AI Enablement"
    - "AI Productivity"
    - "AI Solutions"
    - "Technical Deployment"
    - "Technical Enablement"
    - "Technical Program Manager"
    - "AI Program Manager"
    - "AI Product Manager"
    - "AI Product Operations"
    - "Product Operations"
    - "Customer Engineer"
    - "Field Engineer"
    - "AI Architect"
    # Tier B — Communications / Editorial at AI-native
    - "Developer Education"
    - "Developer Advocate"
    - "Developer Relations"
    - "DevRel"
    - "Communications Lead"
    - "Communications Manager"
    - "Engineering Editorial"
    - "Editorial Lead"
    - "Technical Writer"
    - "Content Strategy"
    - "Content Lead"
    # Tier A1 — Residency / Fellowship signals
    - "Residency"
    - "Resident"
    - "Fellowship"
    - "Fellow"
    # Media / editorial vertical — highest-probability A2b archetype signals
    - "Voice AI"
    - "Content Strategist"
    - "Media Partnerships"
    - "Newsroom"
    - "Broadcast"
    # Generic AI signals (broad net for catch-all)
    - "AI"
    - "Generative AI"
    - "GenAI"
    - "LLM"
    - "Agentic"
  negative:
    # Seniority filters (Mitchell is senior+, no junior or new-grad)
    - "Junior"
    - "Intern"
    - "Internship"
    - "Apprentice"
    - "New Grad"
    - "Entry Level"
    # Pure marketing / social roles excluded (modes/_profile.md Section 8)
    - "Product Marketing Manager"
    - "Growth Marketing"
    - "Demand Generation"
    - "Performance Marketing"
    - "Social Media Manager"
    - "Influencer Marketing"
    - "Brand Manager"
    - "Field Marketing"
    # Non-target tech stacks
    - "iOS"
    - "Android"
    - "Mobile Engineer"
    - ".NET"
    - "Java "
    - "PHP"
    - "Ruby on Rails"
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "ASIC"
    - "Mainframe"
    - "COBOL"
    - "Salesforce Admin"
    - "SAP "
    - "Oracle EBS"
    - "Hardware Engineer"
    # Non-target role types — content labeling / training data noise
    - "Tutor"
    - "Annotator"
    - "Labeler"
    - "Data Labeling"
    - "Content Reviewer"
    - "Trust & Safety Reviewer"
    # Non-AI-native sectors (per AI-nativity filter)
    - "Crypto"
    - "Blockchain"
    - "Web3"
  seniority_boost:
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Manager"
    - "Head of"
    - "Director"

# -- Search queries --
# WebSearch fallback (LLM cost per call). Mitchell prefers tracked_companies-driven scanning,
# so this list is intentionally short and high-signal.

search_queries:
  - name: Ashby — A2 Solutions Architect / Applied AI
    query: 'site:jobs.ashbyhq.com "Solutions Architect" OR "Forward Deployed" OR "Applied AI" OR "AI Engineer" Seattle OR remote'
    enabled: true

  - name: Ashby — Tier B Comms / DevRel
    query: 'site:jobs.ashbyhq.com "Developer Education" OR "Developer Advocate" OR "Communications Manager" Seattle OR NYC OR remote'
    enabled: true

  - name: Greenhouse — A2 + Tier B
    query: 'site:job-boards.greenhouse.io "Solutions Architect" OR "Forward Deployed" OR "Developer Advocate" OR "Communications Manager" AI Seattle OR remote'
    enabled: true

  - name: A1 Residencies — generic
    query: '"AI Residency" OR "AI Fellowship" 2026 OR 2027 application open Seattle OR remote OR SF'
    enabled: true

