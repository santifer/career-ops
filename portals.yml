# Portal Scanner Configuration — DACH Data Jobs (broad)
# Customized for broad "Data" role search across German/DACH market

# -- Title filter --
# Deliberately broad: any role with "Data" in the title passes,
# plus common German-language equivalents and related ML/AI/Analytics roles.

title_filter:
  positive:
    # -- Data roles (broad) --
    - "Data"
    - "Daten"
    - "Analytics"
    - "Analyst"
    - "BI "
    - "Business Intelligence"
    - "ETL"
    - "Data Engineer"
    - "Data Scientist"
    - "Data Analyst"
    - "Data Architect"
    - "Data Platform"
    - "Data Warehouse"
    - "Data Mesh"
    - "Data Governance"
    - "Data Quality"
    - "Database"
    - "Datenbank"
    # -- ML/AI (overlaps with Data) --
    - "AI"
    - "ML"
    - "Machine Learning"
    - "KI"
    - "Künstliche Intelligenz"
    - "LLM"
    - "MLOps"
    - "NLP"
    - "GenAI"
    # -- Related engineering --
    - "Platform Engineer"
    - "Solutions Architect"
    # -- Sports analytics / football --
    - "Sports Data"
    - "Sports Analyst"
    - "Sports Analytics"
    - "Performance Analyst"
    - "Match Analyst"
    - "Football Analyst"
    - "Spielanalyse"
    - "Datenscout"
    - "Datenscouting"
    - "Fußball"
  negative:
    - "Intern"
    - "Praktikant"
    - "Werkstudent"
    - ".NET"
    - "iOS"
    - "Android"
    - "PHP"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "COBOL"
    - "Mainframe"
    - "FPGA"
    - "ASIC"
    - "Embedded"
    - "Firmware"
  seniority_boost:
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"
    - "Director"
    - "Manager"

# -- Location filter (DACH) --
location_filter:
  always_allow:
    - "Germany"
    - "Deutschland"
    - "Berlin"
    - "München"
    - "Munich"
    - "Hamburg"
    - "Frankfurt"
    - "Köln"
    - "Cologne"
