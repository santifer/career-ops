    query: 'site:xing.com/jobs "Data Engineer" OR "Data Platform"'
    enabled: true

  - name: XING — Data Scientist / Analyst
    query: 'site:xing.com/jobs "Data Scientist" OR "Data Analyst" OR "Business Intelligence"'
