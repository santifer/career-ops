    query: 'site:linkedin.com/jobs "Data Engineer" Germany OR Deutschland OR Berlin OR München'
    enabled: true

  - name: LinkedIn — Data Scientist Germany
    query: 'site:linkedin.com/jobs "Data Scientist" OR "ML Engineer" Germany OR Berlin OR München'
