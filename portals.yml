# -- Search queries (DACH job portals & aggregators) --
# These require WebSearch (agent mode). The scanner lists them as
# "Agent/WebSearch handoff" — they run when you invoke the scan mode
# through the AI agent, not in zero-token mode.
search_queries:

  # ══════════════════════════════════════════════
  # StepStone (Germany's largest job board, New Work SE)
  # ══════════════════════════════════════════════
  - name: StepStone — Data Engineer
    query: 'site:stepstone.de "Data Engineer" OR "Dateningenieur" OR "Data Platform"'
    enabled: true

  - name: StepStone — Data Scientist / ML
    query: 'site:stepstone.de "Data Scientist" OR "Machine Learning" OR "Data Science" OR "ML Engineer"'
    enabled: true

  - name: StepStone — Data Analyst / BI
    query: 'site:stepstone.de "Data Analyst" OR "Business Intelligence" OR "BI Analyst" OR "Analytics Engineer"'
    enabled: true

  - name: StepStone — Data Architect / Governance
    query: 'site:stepstone.de "Data Architect" OR "Data Governance" OR "Data Warehouse" OR "Data Quality"'
    enabled: true

  # ══════════════════════════════════════════════
  # Indeed Germany
  # ══════════════════════════════════════════════
  - name: Indeed DE — Data Engineer
    query: 'site:de.indeed.com "Data Engineer" OR "Data Platform" OR "Daten Engineer"'
    enabled: true

  - name: Indeed DE — Data Scientist / ML
    query: 'site:de.indeed.com "Data Scientist" OR "Machine Learning Engineer" OR "ML Engineer"'
    enabled: true

  - name: Indeed DE — Data Analyst / BI
    query: 'site:de.indeed.com "Data Analyst" OR "Business Intelligence" OR "Analytics Engineer"'
    enabled: true

  # ══════════════════════════════════════════════
  # LinkedIn (Germany / DACH)
