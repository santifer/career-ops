  - name: Greenhouse — AU/TW startup growth product
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Growth Manager" OR "Product Manager" Australia OR Taiwan OR Taipei OR Melbourne OR Sydney'
    enabled: true

  - name: Lever — AU/TW startup growth product
