# -- Search queries --
# Each query triggers a WebSearch. Use site: to filter by portal.
# The scanner extracts title, URL, and company from results.

search_queries:
  # -- Australia startup roles --
  - name: Australia startups — Growth
    query: '"startup" "Growth Manager" OR "Growth Marketing Manager" Australia OR Melbourne OR Sydney'
    enabled: true

  - name: Australia startups — Product
    query: '"startup" "Product Manager" OR "Growth Product Manager" Australia OR Melbourne OR Sydney'
    enabled: true

  - name: Australia startups — GTM and partnerships
    query: '"startup" "GTM" OR "Product Marketing" OR "Partnerships Manager" Australia OR Melbourne OR Sydney'
    enabled: true

  - name: Australia fintech startups
    query: '"fintech startup" "Growth Manager" OR "Product Manager" Australia OR Melbourne OR Sydney'
    enabled: true

  # -- Taiwan startup roles --
  - name: Taiwan startups — Growth
    query: '"startup" "Growth Manager" OR "Growth Marketing Manager" Taiwan OR Taipei'
    enabled: true

  - name: Taiwan startups — Product
    query: '"startup" "Product Manager" OR "Growth Product Manager" Taiwan OR Taipei'
    enabled: true

  - name: Taiwan startups — GTM and partnerships
    query: '"startup" "GTM" OR "Product Marketing" OR "Partnerships Manager" Taiwan OR Taipei'
    enabled: true

  - name: Taiwan fintech startups
    query: '"fintech startup" "Growth Manager" OR "Product Manager" Taiwan OR Taipei'
    enabled: true

  # -- Startup job boards / ATS with geography constraints --
  - name: Ashby — AU/TW startup growth product
    query: 'site:jobs.ashbyhq.com "Growth Manager" OR "Product Manager" Australia OR Taiwan OR Taipei OR Melbourne OR Sydney'
