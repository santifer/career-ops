# Portal Scanner Configuration
# Profile: Sandesh Gurung — IT Support Engineer / Cybersecurity
# Location: North Bergen, NJ | Targeting: NYC metro + remote US
# Focus: IT Support, Desktop Support, Cybersecurity Analyst/Engineer, Healthcare IT, IAM Analyst, GRC Analyst
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)

# -- Title filter --
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # -- IT Support & Desktop --
    - "IT Support"
    - "Desktop Support"
    - "Help Desk"
    - "Service Desk"
    - "Technical Support"
    - "IT Support Specialist"
    - "End User Support"
    - "Deskside Support"
    - "Field Technician"
    - "IT Technician"
    - "Systems Administrator"
    - "IT Administrator"
    - "Support Engineer"

    # -- Cybersecurity --
    - "Cybersecurity"
    - "Security Engineer"
    - "Security Analyst"
    - "Information Security"
    - "SOC Analyst"
    - "Incident Response"
    - "Endpoint Security"
    - "Security Operations"
    - "Threat Analyst"
    - "Vulnerability Analyst"
    - "Blue Team"
    - "SIEM"
    - "SecOps"
    - "GRC Analyst"
    - "Compliance Analyst"

    # -- Identity & Access --
    - "Identity and Access Management"
    - "Access Management"
    - "IAM"
    - "Active Directory"
    - "Entra ID"

    # -- Healthcare IT --
    - "Healthcare IT"
    - "Clinical Informatics"
    - "EHR Support"
    - "EMR Support"
    - "Health IT"
    - "HIPAA"

    # -- Infrastructure / Network --
    - "Network Support"
    - "Network Technician"
    - "Infrastructure Support"
    - "Systems Support"
    - "IT Infrastructure"
    - "Network Deployment"

  negative:
    # Roles outside target scope
    - "Intern"
    - "Internship"
    - "Software Engineer"
    - "Software Developer"
    - "Frontend"
    - "Backend"
    - "Full Stack"
    - "DevOps"
    - "Data Scientist"
    - "Machine Learning"
    - "Data Engineer"
    - "iOS"
    - "Android"
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "ASIC"
    - "Blockchain"
    - "Crypto"
    - "COBOL"
    - "Mainframe"
    - "SAP "
    - "Oracle EBS"
    - "Salesforce Developer"
    - "VP "
    - "Chief "
    - "C-Suite"

  seniority_boost:
    - "Tier I"
    - "Tier II"
    - "Tier III"
    - "Level II"
    - "Level III"
    - "Entry-Level"
    - "Mid-Level"

# -- Search queries --

search_queries:

  # -- IT Support & Desktop --
  - name: Greenhouse — IT Support Engineer
    query: 'site:job-boards.greenhouse.io "IT Support Engineer" OR "IT Support Specialist" "New York" OR "New Jersey" OR remote'
    enabled: true

  - name: Greenhouse — Desktop Support
    query: 'site:job-boards.greenhouse.io "Desktop Support" OR "Deskside Support" "New York" OR "New Jersey" OR remote'
    enabled: true

  - name: Ashby — IT Support & Desktop
    query: 'site:jobs.ashbyhq.com "IT Support" OR "Desktop Support" OR "Help Desk" remote OR "New York"'
    enabled: true

  - name: Lever — IT Support & Desktop
    query: 'site:jobs.lever.co "IT Support" OR "Desktop Support" OR "Help Desk" "New York" OR "New Jersey" OR remote'
    enabled: true

  # -- Cybersecurity --
  - name: Greenhouse — SOC Analyst
    query: 'site:job-boards.greenhouse.io "SOC Analyst" OR "Security Analyst" OR "Security Operations" remote OR "New York"'
    enabled: true

  - name: Greenhouse — Cybersecurity Engineer
    query: 'site:job-boards.greenhouse.io "Cybersecurity Engineer" OR "Security Engineer" OR "Information Security" remote OR "New York"'
    enabled: true

  - name: Greenhouse — Incident Response
    query: 'site:job-boards.greenhouse.io "Incident Response" OR "Endpoint Security" OR "Threat Analyst" remote'
    enabled: true

  - name: Ashby — Cybersecurity Roles
    query: 'site:jobs.ashbyhq.com "Cybersecurity" OR "Security Analyst" OR "SOC" OR "SIEM" remote'
    enabled: true

  - name: Lever — Security Analyst
    query: 'site:jobs.lever.co "Security Analyst" OR "Cybersecurity" OR "SOC Analyst" "New York" OR remote'
    enabled: true

  - name: Wellfound — IT & Security
    query: 'site:wellfound.com "IT Support" OR "Security Analyst" OR "Desktop Support" "New York" OR remote'
    enabled: true

  # -- Healthcare IT --
  - name: Greenhouse — Healthcare IT Support
    query: 'site:job-boards.greenhouse.io "Healthcare IT" OR "EHR Support" OR "EMR Support" OR "Clinical Informatics" remote OR "New York"'
    enabled: true

  - name: Greenhouse — Health System IT
    query: 'site:job-boards.greenhouse.io "IT Support" OR "Desktop Support" "hospital" OR "health" OR "medical" "New York" OR "New Jersey"'
    enabled: true

  # -- IAM & Active Directory --
  - name: Greenhouse — IAM Roles
    query: 'site:job-boards.greenhouse.io "Identity and Access" OR "Active Directory" OR "Entra ID" "engineer" OR "analyst" OR "administrator" remote'
    enabled: true

  # -- GRC & Compliance --
  - name: Greenhouse — GRC & Compliance
    query: 'site:job-boards.greenhouse.io "GRC Analyst" OR "Compliance Analyst" OR "HIPAA" OR "IT Compliance" remote OR "New York"'
    enabled: true

  # -- NYC/NJ Area broad sweep --
  - name: LinkedIn-style — NYC IT Support
    query: '"IT Support" OR "Desktop Support" OR "Help Desk" "New York" OR "New Jersey" OR "NYC" -internship -"software engineer"'
    enabled: true

  - name: LinkedIn-style — NYC Cybersecurity
    query: '"Security Analyst" OR "SOC Analyst" OR "Cybersecurity Engineer" "New York" OR "New Jersey" OR remote -intern'
    enabled: true


