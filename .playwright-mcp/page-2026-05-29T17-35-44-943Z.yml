        - generic [ref=e52]:
          - generic [ref=e53]:
            - paragraph [ref=e54]: At JFrog, we’re reinventing DevOps to help the world’s greatest companies innovate — and we want you along for the ride. This is a special place with a unique combination of brilliance, spirit, and just all-around great people. Here, if you’re willing to do more, your career can take off. And since software plays a central role in everyone’s lives, you’ll be part of an important mission. Thousands of customers, including the majority of the Fortune 100, trust JFrog to manage, accelerate, and secure their software delivery from code to production — a concept we call “liquid software.”
            - paragraph [ref=e55]: This role offers high visibility, strong strategic influence, and direct collaboration with executives, Fortune 100 customers, engineering, finance, information systems, GTM, and business stakeholders.
            - heading "As a Principal Product Manager at JFrog you will…" [level=5] [ref=e56]
            - list [ref=e57]:
              - listitem [ref=e58]: "Drive Product Strategy: Identify market opportunities, define product vision, and gather customer requirements."
              - listitem [ref=e59]: "Own the Lifecycle: Lead your product from ideation to launch, ensuring alignment with customer needs and high-quality execution."
              - listitem [ref=e60]: "Leverage Data: Design, experiment, and iterate based on customer feedback, market research, and usage metrics."
              - listitem [ref=e61]: "Collaborate Cross-Functionally: Partner with Information Systems, Finance, Sales, Support, Marketing, and Engineering to deliver scalable and efficient platform solutions."
              - listitem [ref=e62]: "Build Relationships: Foster trust and alignment across internal and external stakeholders to bring your vision to life."
            - heading "To be a Principal Product Manager you need…" [level=5] [ref=e63]
            - list [ref=e64]:
              - listitem [ref=e65]: 7+ years of product management experience, with significant ownership over complex, business-critical systems
              - listitem [ref=e66]: Strong technical background – experience in engineering, R&D, or deep technical product leadership
              - listitem [ref=e67]: Experience building and scaling internal-facing platform or financial products
              - listitem [ref=e68]: Understanding of monetization services, billing systems, financial workflows, entitlements, provisioning, and cross-system integrations
              - listitem [ref=e69]: Proven experience delivering cross-functional, multi-system solutions involving platforms such as Salesforce, Zuora, NetSuite, or equivalent ERP/CRM/financial systems
              - listitem [ref=e70]: Ability to work with numerous stakeholders, manage dependencies, and drive execution under pressure
              - listitem [ref=e71]: Strong interpersonal and communication skills, with the ability to influence across engineering, business, and executive levels
              - listitem [ref=e72]: Hands-on experience with project management for large, cross-functional initiatives
              - listitem [ref=e73]: Experience working in high-growth, global SaaS companies
