                          - text: 
                          - generic [ref=e53]: "Exibir ajuda, Como funciona a busca por palavras-chave? Insira uma lista de palavras e nós buscaremos por elas no cargo, ou você pode escolher buscar por elas também através da descrição do cargo. Dicas: Encontraremos resultados para qualquer palavra listada na pesquisa Os resultados que começarem com as palavras pesquisadas também serão retornados. Ex: uma pesquisa por \"Gerenciar\" retornaria \"gerenciar, gerente, gerenciamento\" etc. Para localizar uma frase exata, coloque a frase da pesquisa entre aspas duplas (\" \"). Ex: \"gerente sênior\", ou selecione \"Correspondência exata\". Pesquisa avançada: Use AND (E), OR (OU), NOT (NÃO) e () para combinar os termos de pesquisa. Ex: Vendas AND engenheiro localiza somente vagas que tenham ambos os termos. Vendas OR engenheiro localiza todas as vagas que tenham um ou outro. (Vendas AND Engenheiro) NOT Gerente localiza vagas que contêm \"Vendas\" e \"Engenheiro\", mas não \"Gerente\". Use ponto de interrogação (?) para letras desconhecidas. Ex: Thomps?n localiza Thompson, Thompsen, Thompsan etc. Use til (~) para localizar ortografias similares. Ex: roam~ localiza roam, roams, room, road, roads etc. Não use as opções de pesquisa avançada se você tiver selecionado \"Correspondência exata\"."
