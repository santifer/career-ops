                          - list [ref=e2198]:
                            - listitem [ref=e2199]: Reportando-se diretamente ao Controller local;
                            - listitem [ref=e2200]: Conduzir o fechamento contábil mensal, garantindo acurácia dos resultados e cumprimento rigoroso dos prazos globais;
                            - listitem [ref=e2201]: Elaborar, revisar e analisar DRE, margens, custos e indicadores financeiros estratégicos;
