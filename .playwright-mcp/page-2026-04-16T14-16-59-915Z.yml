                            - listitem [ref=e2203]: Atuar nas rotinas de forecast, budget e reports gerenciais conforme padrões internacionais (IFRS);
                            - listitem [ref=e2204]: Liderar processos fiscais envolvendo ICMS, PIS, COFINS e IPI, garantindo compliance e consistência das apurações;
                            - listitem [ref=e2205]: Acompanhar impactos da reforma tributária e apoiar ajustes sistêmicos e procedimentais;
                            - listitem [ref=e2206]: Gerenciar o fluxo de informações entre contabilidade terceirizada e áreas internas, assegurando qualidade, prazos e governança;
                            - listitem [ref=e2207]: Revisar e propor melhorias contínuas em processos, controles internos e operações financeiras;
                            - listitem [ref=e2208]: Desenvolver, organizar e delegar atividades do time, elevando a maturidade operacional da área;
                            - listitem [ref=e2209]: Atuar de forma estratégica, com postura hands-on para lidar com demandas operacionais quando necessário;
