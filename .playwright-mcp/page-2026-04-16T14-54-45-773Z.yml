                  - generic [ref=e1171]:
                    - paragraph [ref=e1172]: "Innovativ, dynamisch und nachhaltig: Als eines der weltweit führenden Unternehmen der forschenden Arzneimittelindustrie bieten wir bei AstraZeneca die besten Möglichkeiten für Ihre persönliche und berufliche Entwicklung. Denn für uns steht fest: wir glauben an das Potenzial unserer Mitarbeitenden und haben das Ziel, Sie über Ihre Grenzen hinaus zu entwickeln. Wir maximieren Ihr Potenzial und Ihre Passion, indem wir Sie aktiv dabei unterstützen, damit Sie bei uns alles erreichen können – egal wo Sie anfangen. Denn wir limitieren Ihre Kompetenzen nicht auf das, was Sie jetzt können, sondern erweitern, wozu Sie zukünftig in der Lage sein werden."
                    - paragraph [ref=e1173]:
                      - text: Die Abteilung Oncology Finance treibt AstraZenecas Ambitionen voran, indem sie als true value add Finance Business Partner strategischen Prioritäten richtig setzen und und die Weiterenticklung zusammen mit dem Business aktiv mitgestaltet. Durch die Bereitstellung wertvoller Daten, Analysen und Erkenntnisse werden nicht nur das Wachstum unterstützen, sondern es der Wissenschaft ermöglichen, wirksame Entscheidungen zu treffen und Marktchancen zu erkennen. Unsere Vision ‘to redefine cancer care and eliminate cancer as a cause of death’ ist ehrgeizig und es bedarf der Fähigkeiten eines Teams, um wirklich das zu erreichen, was die Wissenschaft leisten kann und PatientInnen immer an erster Stelle zu setzen.
                      - text: Ab sofort suchen wir einen Lead Finance Business Partner (m/w/d) mit direkter Berichtslinie an OBU Finance Director.
                    - paragraph
                    - paragraph [ref=e1174]: "Einfluss nehmen:"
                    - list [ref=e1175]:
                      - listitem [ref=e1176]: Unterstützung bei strategischen Entscheidungen und Trusted Advisor für den Franchise Head und sein Leitungsteam Breast Cancer/GYN OR Lung Cancer sowie weitere Franchises mit einem gesamt Jahresumsatz von über $700m
                      - listitem [ref=e1177]: "Verantwortung für die P&L: Sicherstellung der Priorisierung (Long-term und short-term), Verantwortung für die Planung, Ressourcen Allokation und das Monitoring der P&L der Franchises"
                      - listitem [ref=e1178]: Erstellung des Long-Term Plan sowie des Short-term Forecast für die Franchises sowie die jeweiligen Brands in Abstimmung mit dem crossfunktionalen Team
                      - listitem [ref=e1179]: Mitverantwortung für die Business Strategie und den Performance Zyklus der jeweiligen Brands im crossfunktionalen Team
                      - listitem [ref=e1180]: Präsentation des Forecasts und des Performance Update an die Leadership Teams sowie regionalen und globalen Stakeholder
                      - listitem [ref=e1181]: Identifizierung von Wachstumschancen und Effizienzverbesserungen, Erarbeitung von handlungsorientierten Vorschlägen zur Erreichung der Ziele
                      - listitem [ref=e1182]: Bewertung der Marketingstrategien des crossfunktionalen Teams im Hinblick auf den größtmöglichen wirtschaftlichen Erfolg
                      - listitem [ref=e1183]: Entscheidung über / und Bereitstellung von Marktanalysen und ad-hoc Analysen mit Hilfe von Marktforschung und Marktdaten
                      - listitem [ref=e1184]: Übernahme von Verantwortung für komplexe fachliche und systemorientierte (Finanz-) Projekte jeglicher Art (global, regional und/oder lokal), auch über die Business Unit hinaus
                      - listitem [ref=e1185]: Verantwortung für den Wissenstransfer von Best Practice Beispielen innerhalb des deutschen und der regionalen/globalen Teams
                      - listitem [ref=e1186]: Aktive Teilnahme bei S&OP Sitzungen mit Fokus auf die Sicherstellung des Wachstums und Prognosegenauigkeit
                      - listitem [ref=e1187]: Indirekte Führung von Integrated Finance Solutions (IFS) Kolleg:innen im Service Center in Warschau
