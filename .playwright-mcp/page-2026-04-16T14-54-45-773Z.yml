                      - listitem [ref=e1194]: Nachgewiesene (direkte/indirekte) Führungserfahrung im Bereich Finance
                      - listitem [ref=e1195]: Ausgeprägte analytische und strategische Fähigkeiten sowie ein sehr gutes Zahlenverständnis
                      - listitem [ref=e1196]: Spaß am Umgang mit komplexen Aufgaben und eine hohe Lösungs- und Zielorientierung
                      - listitem [ref=e1197]: Sehr gute Kommunikations- und Präsentationsfähigkeiten sowie die Fähigkeit komplexe Zusammenhänge einfach darzustellen und dem Senior Management zu präsentieren
                      - listitem [ref=e1198]: Selbstständige und eigenverantwortliche Arbeitsweise sowie die Fähigkeit Entscheidungen zu treffen
                      - listitem [ref=e1199]: Entrepreneurship und damit verbunden die Bereitschaft Risiken einzugehen und sich sowie den Status Quo in einem dynamischen Arbeitsumfeld weiterzuentwickeln
                      - listitem [ref=e1200]: Nachgewiesene, exzellente Fähigkeiten im Umgang mit Teams
                      - listitem [ref=e1201]: Verhandlungssichere Deutsch- und Englisch-Kenntnisse
                      - listitem [ref=e1202]: Guter Umgang mit SAP, Excel, Business Intelligence Software und andere analytischen Tools
                      - listitem [ref=e1203]: Internationale Mobilität für die Weiterentwicklung ist gewünscht
