                - heading "Our Philosophy" [level=1] [ref=e1417]
                - generic [ref=e1419]: "AstraZeneca is a global, science-led, patient-focused pharmaceutical company committed to excellence in the research, development and commercialisation of prescription medicines. With approximately 90,000 people in 85 countries, our aim is simple: to unlock the power of what science can do, for people, society and the planet. From Clinical Development, Regulatory and Medical Affairs to Finance, IT, Digital, Manufacturing and Supply, the opportunities to make an impact are limitless. Our workforce reflects the diversity of the patients we serve – it is embedded in everything we do. We're at our best and most creative when we seek out different perspectives, experiences and strengths. At AstraZeneca, you'll have the chance to grow your abilities, skills and knowledge constantly in a place that never stands still. Discover why we're a great place to work and see what science — and you — can do."
