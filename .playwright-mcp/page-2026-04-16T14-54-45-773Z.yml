                    - list [ref=e1189]:
                      - listitem [ref=e1190]: Abschluss eines relevanten Hochschulstudiums
                      - listitem [ref=e1191]: Mehrjährige einschlägige Erfahrung im Bereich Finanzen / Controlling - bevorzugt in einer Marketing /Sales Organisation und einem weiteren Bereich (z.B. regionale / globale Rolle, Corporate Finance)
                      - listitem [ref=e1192]: Nachgewiesene Erfahrung in einem global agierenden Unternehmen
