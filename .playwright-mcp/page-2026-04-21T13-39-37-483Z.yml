                  - paragraph [ref=e343]:
                    - strong [ref=e345]: Vaga para Controller
                    - strong [ref=e347]: na Pulsus
                    - text: Somos apaixonados por tecnologia, inovação e transformação digital, sempre buscando otimizar processos por meio de soluções inteligentes e eficientes.
                    - text: Buscamos pessoas com experiência em gestão financeira, análise de dados e controle orçamentário, que demonstrem forte perfil analítico, proatividade e habilidade para transformar desafios em oportunidades estratégicas, que compartilhem do mesmo propósito da Pulsus e queiram crescer conosco.
                    - strong [ref=e349]: "O que esperamos de você:"
                    - list [ref=e351]:
                      - listitem [ref=e352]: Trabalhe com autonomia, sem medo de errar.
                      - listitem [ref=e353]: Tenha sede por conhecimento e compartilhar isso com a equipe.
                      - listitem [ref=e354]: Seja aberto pra mudanças.
                      - listitem [ref=e355]: Tenha sentimento de dono e se engaje com o crescimento da Pulsus.
                      - listitem [ref=e356]: Seja colaborativo e respeite o espaço do outro.
                      - listitem [ref=e357]: Nos ajude a fascinar o cliente.
                    - strong [ref=e359]: Responsabilidades e atribuições
                    - list [ref=e361]:
                      - listitem [ref=e362]: Gerenciar o fluxo de caixa, realizando projeções e análises de CAR, CAP e aplicações financeiras, garantindo a saúde financeira da organização;
                      - listitem [ref=e363]: Planejar e garantir o uso adequado do sistema Omie, contribuindo para a eficiência e automação dos processos financeiros;
                      - listitem [ref=e364]: Assegurar a conformidade com as regulações contábeis e fiscais, atuando em conjunto com o escritório contábil para validar fechamentos e manter a integridade dos dados.
                      - listitem [ref=e365]: Desenvolver estratégias de otimização e planejamento tributário, identificando oportunidades para redução de custos e mitigação de riscos;
                      - listitem [ref=e366]: Auxiliar na elaboração e controle do orçamento da Pulsus, assegurando alinhamento com as metas estratégicas da empresa;
                      - listitem [ref=e367]: Definir, acompanhar e analisar KPIs financeiros e indicadores de Unit Economics (como Fluxo de Caixa, MRR, CAC, entre outros) para subsidiar decisões estratégicas;
                      - listitem [ref=e368]: Elaborar análises financeiras ad hoc, proporcionando insights valiosos para a tomada de decisão;
                      - listitem [ref=e369]: Manter uma comunicação efetiva com escritórios de contabilidade e instituições bancárias, fortalecendo parcerias estratégicas;
                      - listitem [ref=e370]: Auditar as atividades de CAR e CAP;
                      - listitem [ref=e371]: Elevar a eficiência operacional do departamento financeiro através de identificação de oportunidades de melhoria, desenvolvimento de automatizações dos processos financeiros e o uso da IA.
                    - strong [ref=e373]: Requisitos e qualificações
                    - strong [ref=e375]: "Para essa posição precisamos que você tenha as seguintes experiências/conhecimentos:"
                    - list [ref=e377]:
                      - listitem [ref=e378]: Formação superior em Administração, Economia, Finanças, Contabilidade ou áreas correlatas;
                      - listitem [ref=e379]: Experiência comprovada em planejamento financeiro, controle orçamentário e análise de fluxo de caixa;
                      - listitem [ref=e380]: Domínio avançado do Excel/Google Sheets e conhecimentos em ferramentas de BI (como Looker Studio), além de experiência com sistemas ERP, preferencialmente Omie;
                      - listitem [ref=e381]: Conhecimento das regulamentações contábeis e fiscais;
                      - listitem [ref=e382]: Disponibilidade de atuação no modelo híbrido em São Paulo-SP.
                    - strong [ref=e384]: "Para esta vaga, será diferencial:"
                    - list [ref=e386]:
                      - listitem [ref=e387]: Pós-graduação ou MBA em Finanças/Controladoria;
                      - listitem [ref=e388]: Experiência com IA para aumento de eficiência pessoal/empresarial;
                      - listitem [ref=e389]: Experiência prévia em empresas SaaS B2B;
                      - listitem [ref=e390]: Certificações e cursos na área financeira ou de controladoria (como CPA-10, CPA-20, CFP, entre outros).
                    - strong [ref=e392]: Informações adicionais
