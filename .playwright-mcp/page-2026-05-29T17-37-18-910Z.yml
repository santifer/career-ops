            - paragraph [ref=e18]:
              - strong [ref=e19]: Who is Tenable?
            - paragraph [ref=e20]: Tenable® is the Exposure Management company. 44,000 organizations around the globe rely on Tenable to understand and reduce cyber risk. Our global employees support 65 percent of the Fortune 500, 45 percent of the Global 2000, and large government agencies. Come be part of our journey!
            - paragraph [ref=e21]:
              - strong [ref=e22]: What makes Tenable such a great place to work?
            - paragraph [ref=e23]: "Ask a member of our team and they’ll answer, “Our people!” We work together to build and innovate best-in-class cybersecurity solutions for our customers; all while creating a culture of belonging, respect, and excellence where we can be our best selves. When you’re part of our #OneTenable team, you can expect to partner with some of the most talented and passionate people in the industry, and have the support and resources you need to do work that truly matters. We deliver results that exceed expectations and we win together!"
          - generic [ref=e24]:
            - paragraph [ref=e25]:
              - text: The Tenable One team is looking for a Senior Product Manager to define the future of our flagship Exposure Management product, turning complex security data into clear, actionable insights that empower CISOs to manage cyber risk.
              - text: "Your Opportunity:"
            - paragraph [ref=e26]: "As a Senior Product Manager in the Tenable One team, you will shape the strategy and product roadmap of Tenable’s flagship offering. You will serve as a relentless advocate for our customers by deeply understanding their unique challenges and workflows, to identify their most critical needs. We are looking for a product leader who thrives on ownership: someone who can unify engineering, sales, and marketing around an ambitious vision, define solutions that solve real customer needs, measure impact, and communicate back to executive leadership. You will be a key player in shaping the next generation of exposure management, delivering solutions that set the industry standard."
            - paragraph [ref=e27]: "What You'll Need:"
            - list [ref=e28]:
              - listitem [ref=e29]: 5+ years of experience as a Product Manager – a must.
              - listitem [ref=e30]: Proven experience in SaaS and B2B markets – a must.
              - listitem [ref=e31]: Bachelor's degree in Computer Science or a related field, or equivalent experience.
              - listitem [ref=e32]: Ability to drive product strategy, influence stakeholders, and deliver the product through the entire software development lifecycle.
              - listitem [ref=e33]: Deep understanding of sales and market needs, with proven experience in managing G2M relationships.
              - listitem [ref=e34]: Proven experience working closely with enterprise-level customers.
              - listitem [ref=e35]: Willingness to step into the details, and keep the team laser-focused.
              - listitem [ref=e36]: Mastery of communication and negotiation skills needed to lead with indirect authority and present effectively across the organization, from engineering to executive-level.
              - listitem [ref=e37]: Ability to make defensible, data-driven decisions and business-level prioritization calls.
              - listitem [ref=e38]: Cybersecurity experience – a significant advantage.
              - listitem [ref=e39]: Exposure management experience – a significant advantage.
              - listitem [ref=e40]: Proven development experience – an advantage.
            - paragraph
            - paragraph [ref=e41]: "#LI-NT1"
            - paragraph [ref=e42]: "#LI-Hybrid"
