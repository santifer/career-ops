          - paragraph [ref=e22]: Products & Engineering at Tomorrow.io is focused on building software and products at scale—from infrastructure that handles massive amounts of data to outstanding, customer-centric experiences in B2B, B2C, and B2D products that change billions of lives worldwide.
          - paragraph [ref=e23]:
            - strong [ref=e24]: We are looking for an
            - strong [ref=e25]: AI-First Senior Product Manager
            - text: to help us redefine how users interact with weather intelligence. You’ll lead the development of AI-native capabilities that drive insight, action, and scale - across some of the most complex industries in the world.
          - paragraph [ref=e26]:
            - strong [ref=e27]: "As a Senior Product Manager at Tomorrow.io, you’ll:"
          - list [ref=e28]:
            - listitem [ref=e29]: Lead end-to-end strategy and execution for platform capabilities that embed AI deeply into product workflows, decision-making, and user value.
            - listitem [ref=e30]: Collaborate closely with engineering to design modular, intelligent systems that scale across markets and use cases.
            - listitem [ref=e31]: Create structure, focus, and momentum within fast-moving environments - driving impact while learning deeply.
          - heading "What you bring:" [level=3] [ref=e32]:
            - strong [ref=e33]: "What you bring:"
          - list [ref=e34]:
            - listitem [ref=e35]: Impeccable product sense – you turn ambiguity or strategic goals into focused, compelling product plans and deliverables.
            - listitem [ref=e36]: Expert learning ability – you build subject matter expertise quickly and independently, asking sharp questions and digging deep.
            - listitem [ref=e37]: Thrives in fast-paced environments – you handle context-switching with grace and help teams stay focused amid change.
            - listitem [ref=e38]: Clear communicator & storyteller – you bring others along through clarity, structured thinking, and a strong sense of purpose.
            - listitem [ref=e39]: High bar for quality and results – you drive accountability and push for excellence in yourself and others.
            - listitem [ref=e40]: 5+ years of experience as a Product Manager building B2B software
            - listitem [ref=e41]: Proven track record of building or scaling platform products
            - listitem [ref=e42]: Familiarity with AI tools, workflows, and opportunities
          - paragraph [ref=e43]:
            - strong [ref=e44]: So if you're excited about using AI to change how great products are built—and want to work with a team that operates with urgency, curiosity, and craft—this is your opportunity to do the best work of your career.
          - paragraph [ref=e45]:
            - strong [ref=e46]: If your experience is close but doesn’t fulfill all requirements, please apply. Tomorrow.io is on a mission to build a special company. To achieve our goal, we are focused on hiring people with different backgrounds, perspectives, and experiences.
          - paragraph [ref=e47]
          - paragraph [ref=e48]: ___________________________________________________________________________________________
          - paragraph [ref=e49]:
            - strong [ref=e50]: "About Tomorrow.io:"
          - paragraph [ref=e51]:
            - text: Selected by
            - emphasis [ref=e52]: TIME
            - text: Magazine as one of the Top 100 Most Influential Companies in the World, Tomorrow.io is the world's leading Resilience Platform™. Combining next-generation space technology, advanced generative AI, and proprietary weather modeling, Tomorrow.io delivers unmatched forecasting and decision-making capabilities. Trusted by six of the top ten Fortune 500 companies, Tomorrow.io empowers organizations to proactively manage weather-related risks, opportunities, and enhance operational efficiency. From cutting-edge weather intelligence to real-time early warning systems, Tomorrow.io enables predictive, impact-based action for a safer, more resilient future. Learn more at Tomorrow.io.
          - paragraph [ref=e53]:
            - strong [ref=e54]: "Ethos:"
            - text: Our ethos guides us in everything we do - The people of Tomorrow are here to make an impact, they show true grit, and always put people first.
          - paragraph [ref=e55]:
            - strong [ref=e56]: "How we roll:"
            - text: We believe that magic happens when people work together. The People of Tomorrow take ownership with a bias for action. We believe in transparency and directness, putting work before ego, and empathy. The People of Tomorrow have a can-do attitude, are resilient, and curious. They are growth oriented, value people striving to be experts, and love to have fun. Here, your success is achieved by your impact and deliveries and not by the hours you put in. We have flexible hours and unlimited vacation days policy. The People of Tomorrow show empathy, mutual respect and work as one diverse team. We grow fast and move faster but we always see people first. Each person has their own career growth path for we believe that the only way for the company to grow is if you grow.
