        - generic [ref=e40]:
          - paragraph [ref=e41]: Buscamos uma liderança estratégica para comandar nossa Contabilidade, integrando áreas e transformando números em inteligência de negócio. Sua missão será gerir o time, otimizar processos e validar sistemas para garantir fechamentos ágeis e registros impecáveis. Além de assegurar a conformidade e reduzir riscos, você será peça-chave no apoio às decisões da diretoria. Se você une precisão técnica com visão de futuro e foco em inovação, venha fazer a diferença na nossa gestão financeira!
          - paragraph [ref=e42]:
            - strong [ref=e43]: "Atividades do cargo:"
          - list [ref=e44]:
            - listitem [ref=e45]: "Preparação de relatórios financeiros: elaborar e revisar as demonstrações financeiras (balanços, P&L, DFC e notas explicativas), garantindo a precisão das informações;"
            - listitem [ref=e46]: "Registros contábeis: garantir que todos os registros contábeis da empresa estejam em conformidade com os princípios contábeis e as normas aplicáveis;"
            - listitem [ref=e47]: "Conciliação de contas: garantir a reconciliação de contas contábeis para que não haja erros ou discrepâncias nos registros financeiros da empresa;"
            - listitem [ref=e48]: "Auditorias: preparar a documentação necessária e colaborar com auditores internos e externos durante auditorias financeiras;"
            - listitem [ref=e49]: "Declarações fiscais: garantir em conjunto com a Área Fiscal a apresentação das declarações fiscais obrigatórias (IRPJ, CSLL e outras acessórias), como a Escrituração Contábil Fiscal (ECF) e a Escrituração Contábil Digital (ECD);"
            - listitem [ref=e50]: "Compliance contábil: certificar-se de que a empresa esteja em conformidade com todas as obrigações contábeis, mantendo-se atualizado sobre as mudanças de legislação e garantindo que a empresa cumpra todas as exigências contábeis e fiscais;"
            - listitem [ref=e51]: "Planejamento financeiro: interagir e colaborar com o time de FP&A, fornecendo dados contábeis precisos para as análises e tomadas de decisão com base em cenários financeiros;"
            - listitem [ref=e52]: "Consultoria: Fornecer orientação contábil à alta administração da empresa, incluindo aconselhamento sobre decisões estratégicas que afetam a situação financeira da organização;"
            - listitem [ref=e53]: "Controle de custos: Monitorar e controlar em parceria com o FP&A e a Área de Custos os custos fabris e de produção, identificando áreas de melhoria e oportunidades de economia;"
            - listitem [ref=e54]: "Gestão de riscos: Identificar e avaliar os riscos contábeis e desenvolver estratégias para mitigá-los;"
            - listitem [ref=e55]: "Gerenciamento da equipe contábil: Supervisionar e liderar a equipe, treinando e garantindo que todas as atividades sejam realizadas dentro do cronograma e de forma eficiente e precisa."
          - paragraph [ref=e56]:
            - strong [ref=e57]: "Requisitos necessários para inscrição:"
          - list [ref=e58]:
            - listitem [ref=e59]: Ter CRC ativo é essencial;
            - listitem [ref=e60]: Ensino Superior em Administração, Ciências Contábeis ou Economia;
            - listitem [ref=e61]: Desejável pós-graduação e/ou MBA em Finanças ou Contabilidade;
            - listitem [ref=e62]: Profundo conhecimento dos princípios contábeis e fiscais, além da importância de entender o ambiente regulatório aplicável ao setor;
            - listitem [ref=e63]: Forte vivência com análise de balanço, FC e P&L;
            - listitem [ref=e64]: Forte habilidade de liderança, para gerir, orientar e motivar a equipe;
            - listitem [ref=e65]: Conhecimento avançado em Excel e PPT;
            - listitem [ref=e66]: Habilidade para comunicar e discutir de forma clara e acessível os temas contábeis com demais stakeholders;
            - listitem [ref=e67]: Desejável já ter tido vivência com sistema Protheus;
            - listitem [ref=e68]: Inglês será considerado um diferencial.
          - paragraph [ref=e69]:
            - strong [ref=e70]: "Informações da vaga:"
          - list [ref=e71]:
            - listitem [ref=e72]: "Local: Vila Madalena – São Paulo/SP;"
            - listitem [ref=e73]: "Regime: Híbrido – 2 dias de home-office;"
            - listitem [ref=e74]: "Escala: Segunda à sexta – 44h semanais."
          - paragraph [ref=e75]:
            - strong [ref=e76]: "Benefícios:"
          - list [ref=e77]:
            - listitem [ref=e78]: Assistência médica e odontológica;
            - listitem [ref=e79]: Seguro de vida;
            - listitem [ref=e80]: Vale-transporte;
            - listitem [ref=e81]: Vale-alimentação e vale-refeição;
            - listitem [ref=e82]: Totalpass;
            - listitem [ref=e83]: Day-off de aniversário + vale-presente;
            - listitem [ref=e84]: Desconto em produtos DUX e Eat Clean;
            - listitem [ref=e85]: Psicoterapia, coaching e mais via App Zenklub;
            - listitem [ref=e86]: Licença parental estendida.
          - paragraph [ref=e87]
          - paragraph [ref=e88]: "Nossas vagas são preferências para pessoas com deficiência (PCD). Na DUX Company, a inclusão faz parte do nosso jeito de nutrir a vida humana: respeitamos as diferenças, encorajamos a diversidade de perspectivas e acreditamos que pessoas diversas constroem soluções melhores e mais sustentáveis. Valorizamos talentos pelo que são e pelo que entregam, em um ambiente que busca promover equidade, respeito e desenvolvimento contínuo."
        - generic [ref=e89]:
