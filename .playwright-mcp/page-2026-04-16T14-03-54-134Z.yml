        - generic [ref=e45]:
          - generic [ref=e47]:
            - generic [ref=e48]:
              - heading "Description" [level=2] [ref=e49]
              - paragraph [ref=e50]:
                - text: At Amazon, we're working to be the most customer-centric company on earth. To get there, we need exceptionally talented, bright, and driven people. If you'd like to help us build the place to find and buy anything online in LatAm, this is your chance to make history.
                - text: Finance is all about the numbers…unless you work at Amazon; it’s knowing the numbers and so much more. Enthusiasm and energy help us deliver new ideas, and solutions. Do you view problems as treasures, and are you willing to dive deep to develop those solutions and deliver results? Will you seek to challenge the status quo, and accept that your ideas and mechanisms may be tested daily?
                - text: At Amazon, we move with purpose and speed, and this requires we work with a dynamic network of Retail, Operations, Marketing and Tech partners. Our analysts work across teams, help others understand financial decisions and are trusted business advisors. They employ every facet of data and communication to ensure our partners and our leaders have the most up to date and reliable information to help them make the best possible decision. Come teach us a few things, and we’ll teach you a few things as we navigate Earth's most customer-centric company!
                - text: Key job responsibilities
                - text: "- Financial modeling, providing analytical support, and validating financial and operational results of Operating Expenses and Sales productivity."
                - text: "- Ensure a high level of financial controls are followed, maintaining data integrity."
                - text: "- Support on forecasting and P&L reviews"
                - text: "- Controllership of Marketplace International Sales for Latam, understanding actuals, challenging variances and tracking action plans to bring financial results back to plan when necessary and possible"
                - text: "- Drive the decisions on Operating Expenses and Sales productivity, driving efficiencies together with an aligned business growth strategy"
                - text: "- Drive the implementation and best use of global best practices"
                - text: "- Orchestrate the whole planning process, from aligning assumptions and providing analysis to system load and data integrity checks"
                - text: "- Provide accurate and insightful financial reports"
                - text: "- Find opportunities to use global standards and transfer repetitive tasks to global teams"
                - text: "- Develop financial skills across the organization"
                - text: "- Build great talent inside and outside Finance"
                - text: About the team
                - text: At Amazon we embrace our differences and we are committed to furthering our culture of inclusion. We host annual and ongoing learning experiences. Amazon’s culture of inclusion is reinforced within our 16 Leadership Principles, which remind team members to seek diverse perspectives, learn and be curious, and earn trust.
                - text: We believe striking the right balance between your personal and professional life is critical to life-long happiness and fulfillment. We offer flexibility in working hours and encourage you to find your own balance between your work and personal lives.
                - text: Our team is dedicated to supporting new members. We have a broad mix of experience levels and tenures, and we’re building an environment that celebrates knowledge sharing and mentorship. We care about your career growth and strive to assign projects based on what will help each team member develop into a better-rounded professional.
            - generic [ref=e51]:
