                - text: "- Bachelor's degree in engineering, statistics or business, or Bachelor's degree"
                - text: "- Quantitative role (engineering, process re-engineering, quality assurance) experience"
                - text: "- Experience with advanced use of SQL for data mining and business intelligence"
                - text: "- Experience in tax, finance or a related analytical field"
                - text: "- Experience applying key financial performance indicators (KPIs) to analyse Experience in creating process improvements with automation and analysis"
                - text: "- Experience in identifying, leading, and executing opportunities to improve, automate, standardize or simplify finance or business tools and processes"
            - generic [ref=e54]:
              - heading "Preferred Qualifications" [level=2] [ref=e55]
              - paragraph [ref=e56]:
                - text: "- Knowledge of Tableau"
                - text: "- Experience working with large-scale data mining and reporting tools (examples: SQL, MS Access, Essbase, Cognos) and other financial systems (examples: Oracle, SAP, Lawson, JD Edwards)"
                - text: "- Experience participating in continuous improvement projects in your team to scale and improve controllership with measurable results"
                - text: Our inclusive culture empowers Amazonians to deliver the best results for our customers. If you have a disability and need a workplace accommodation or adjustment during the application and hiring process, including support for the interview or onboarding process, please visit
