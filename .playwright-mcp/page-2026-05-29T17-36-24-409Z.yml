    - generic [ref=e53]:
      - generic [ref=e55]: Tel Aviv, Israel
      - generic [ref=e57]:
        - heading "Head of Product" [level=1] [ref=e58]
        - generic [ref=e59] [cursor=pointer]: Apply
      - separator [ref=e60]
      - generic [ref=e61]:
        - generic [ref=e63]:
          - heading "Realize your potential by joining the leading performance-driven advertising company!" [level=4] [ref=e64]:
            - strong [ref=e65]: Realize your potential by joining the leading performance-driven advertising company!
          - paragraph [ref=e66]: We’re looking for a Head of Product for Taboola News to join our Tel Aviv office and take ownership of one of the most impactful products in mobile content discovery. You’ll shape the strategy and roadmap for a platform that reaches hundreds of millions of monthly users worldwide – driving the balance between a great user experience, meaningful publisher traffic, and sustainable monetization.
          - heading "To thrive in this role, you’ll need:" [level=4] [ref=e67]:
            - strong [ref=e68]: "To thrive in this role, you’ll need:"
          - list [ref=e69]:
            - listitem [ref=e70]: "• 10+ Years of Product Leadership: Proven track record of scaling PM teams and launching high-impact products within digital publishing, ad tech, or media."
            - listitem [ref=e71]: "• Strategic Monetization Expertise: Deep experience in app/on-device revenue optimization (native ads, content engines, eCPM) for platforms serving 100M+ users."
            - listitem [ref=e72]: "• User-Centric Growth: Demonstrated ability to balance aggressive revenue goals with high-quality user experiences, leveraging A/B testing and personalization to drive session value. B2C experience is a big advantage."
            - listitem [ref=e73]: "• AI-Driven Innovation: Visionary approach to integrating AI/GenAI and advanced recommendation systems to create differentiated content and advertising solutions."
            - listitem [ref=e74]: "• Cross-Functional Influence: Exceptional ability to work with engineering, data science, and sales teams to deliver complex products in a fast-paced, multi-sided marketplace (OEMs, publishers, and advertisers)."
          - heading "How you’ll make an impact:" [level=4] [ref=e75]:
            - strong [ref=e76]: "How you’ll make an impact:"
          - list [ref=e77]:
            - listitem [ref=e78]: "• Define the Global Roadmap: Own the end-to-end product strategy for Taboola News, translating long-term business goals into a high-growth execution plan."
            - listitem [ref=e79]: "• Drive Executive Alignment: Serve as a strategic partner to the Senior Executive Team, providing data-driven insights that shape Taboola News market vision."
            - listitem [ref=e80]: "• Lead High-Performing Teams: Mentor and scale a world-class team of PMs and analysts, fostering a culture of critical thinking, innovation, and continuous delivery."
            - listitem [ref=e81]: "• Enable Cross-Functional Success: Bridge the gap between Engineering, Sales, and Marketing to launch products that solve our partners needs and exceed revenue targets."
          - heading "Why Taboola?" [level=4] [ref=e82]:
            - strong [ref=e83]: Why Taboola?
          - paragraph [ref=e84]: "If you ask Taboolars what they love about working here, they’ll tell you that they’ve been empowered to realize their full potential while growing and learning from and with smart and talented people. They’ll also share more about:"
          - list [ref=e85]:
            - listitem [ref=e86]: • Adam Singolda, Taboola Founder and CEO says; “You can copy anything from another business but you can’t copy a company’s culture”.
            - listitem [ref=e87]: "• Well-being: Competitive benefits and well-being programs tailored to the region."
            - listitem [ref=e88]: "• Flexibility: We offer a hybrid work schedule with 3 days in-office with an option to come in more often if desired."
            - listitem [ref=e89]: "• Work with some of the biggest names: We work with some of the biggest names in the business. Our publisher partners include Microsoft, Apple, Yahoo, Fox Sports, NBCU, ESPN, CBS, and E! Online. Our advertiser clients include Wells Fargo, Honda, Pinterest, Expedia and Honda. Our OEM partners include Xiaomi, Motorola and Samsung."
          - heading "Ready to realize your potential?" [level=4] [ref=e90]:
            - strong [ref=e91]: Ready to realize your potential?
          - paragraph [ref=e92]: Taboola is an equal opportunity employer and we value diversity in all forms. We are committed to creating an inclusive environment for all employees and believe such an environment is critical for success. Employment is decided on the basis of qualifications, merit, and business need.
