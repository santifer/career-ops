            - heading "Sr Financial Specialist, Operations Finance" [level=1] [ref=e38]
            - paragraph [ref=e40]: "Job ID: 10371473 | Amazon Logistica do Brasil"
          - link "Apply now for Sr Financial Specialist, Operations Finance" [ref=e43] [cursor=pointer]:
