        - generic [ref=e45]:
          - generic [ref=e47]:
            - generic [ref=e48]:
              - heading "Description" [level=2] [ref=e49]
              - paragraph [ref=e50]:
                - text: At Amazon, we are working to be the most customer-centric company in the world. Operations are at the heart of what we do, delivering hundreds of thousands of packages every day and fulfilling customer orders from around the world.
                - text: Amazon is looking for a Senior Finance Analyst to help lead and oversee critical functions within this fast-growing organization, focused on fixed costs for Brazil Fulfillment Centers.
                - text: This Financial Analyst will be primarily responsible for partnering with the business, supporting decision-making, financial modeling, controllership, and operational cost controls. This role requires extensive cross-functional partnership with various retail teams, Fulfillment Centers, and finance to identify best practices across the network and lead cost improvement efforts for operations. The Financial Analyst will lead the planning process, conduct variance analysis for monthly/quarterly business reviews, as well as execute ad hoc projects and analyses as needed.
                - text: Key job responsibilities
                - text: Lead fixed cost planning and controllership processes;
                - text: Conduct monthly, quarterly, and annual financial reviews focused on fixed costs, planning, and forecasting;
                - text: Drive continuous standardization and simplification of planning processes;
                - text: Develop tools for better understanding of Brazil's financial performance;
                - text: Collect, analyze, and manage quantitative data to lead improvements and cost reduction;
                - text: Build financial models and present analyses and recommendations to senior leadership;
                - text: Establish partnerships within the finance organization to drive continuous improvement in financial and operational performance.
            - generic [ref=e51]:
              - heading "Basic Qualifications" [level=2] [ref=e52]
              - paragraph [ref=e53]:
                - text: "- Bachelor's degree"
                - text: "- Experience in tax, finance or a related analytical field"
                - text: "- Knowledge of Excel at an advanced level"
                - text: "- Experience interpreting and applying financial KPIs;"
                - text: "- Experience identifying, leading, and executing fixed and/or variable cost improvements;"
                - text: "- Experience with automation, standardization, or simplification of financial tools and processes;"
                - text: "- Experience creating process improvements through automation and analysis;"
                - text: "- Fluent English;"
            - generic [ref=e54]:
              - heading "Preferred Qualifications" [level=2] [ref=e55]
