              - strong [ref=e95]: Nutrir a vida humana.
            - paragraph [ref=e96]: Desde 2015, somos uma empresa de nutrição humana, que atualmente é detentora das marcas DUX Human Health e Eat Clean. Com o compromisso de impactar positivamente a vida das pessoas e do planeta, atuando com integridade, excelência e responsabilidade ambiental.
            - paragraph [ref=e97]: Sob a marca DUX Human Health, combinamos precisão científica, fórmulas limpas e ingredientes naturais em um portfólio de mais de 300 produtos, focados em garantir uma saúde poderosa e uma vida melhor. Com a marca Eat Clean, oferecemos um portfólio de produtos naturais e veganos, desenvolvidos com atenção a cada detalhe, oferecendo muito sabor e alta qualidade.
