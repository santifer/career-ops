        - paragraph [ref=e76]:
          - strong [ref=e77]: Recruitment Fraud Notice
        - paragraph [ref=e78]: Please be aware of internet job posting fraud as you apply for jobs. Fraudulent parties posing as Dover employees, recruiters, or other agents, may seek to engage with job seekers to steal personal information. These unauthorized parties may use Dover and our affiliated companies’ name and logo to post jobs, engage with job seekers via email, instant messaging, or text, and may even extend job offers electronically.
        - paragraph [ref=e79]: At Dover, we do not ask for personal financial information during phone, in-person, or video interviews, nor do we make offers of employment without first undergoing a thorough recruiting process. We will not ask candidates or new hires to purchase computer equipment for their work requirements. We also will not request a fee to be considered for a job, including any immigration fees.
        - paragraph [ref=e80]: "The Federal Trade Commission and the United States consumer protection agency have published resources for detecting job scams. If you have concerns related to these issues, please consider the following actions: 1) file a report with your local police department; 2) File a complaint with the Internet Crime Complaint Center; and/or 3) file a complaint with the U.S. Federal Trade Commission."
