            - paragraph [ref=e22]: Skeletons, lasers, tattoo buses — the Torq brand grabs attention like nothing else in cybersecurity. And we're growing like crazy, backed by Series D funding, 200% employee growth, and 300% revenue growth. Fueling Torq's momentum is our game-changing AI SOC platform, backed by a team and culture that makes Torq one of Forbes' Best Startup Employers in America, and a Business Insider 'startup to bet your career on'.
            - paragraph [ref=e23]: Life at Torq is all gas, no brakes. We're a team of relentless, collaborative go-getters pushing the boundaries of what's possible for security automation. Every role is an essential driver of Torq's success as the AI-native autonomous SecOps platform of choice for security teams across the Fortune 500.
          - generic [ref=e28]:
            - heading "About the Role" [level=3] [ref=e29]:
              - strong [ref=e30]: About the Role
            - paragraph [ref=e31]: "We are looking for an AI-savvy Product Manager to join Torq as we continue expanding and exploring the hottest intersection in the security market: agentic AI and SecOps. The ideal candidate will have both experience in at least one SOC-adjacent domain (threat intelligence, SecOps, hunting, incident response…) and strong understanding of agentic AI."
            - paragraph [ref=e32]: "You’ll own parts of Torq’s agentic platform: where agents are managed, how they interact with users, and how they can help SOCs to reduce system-critical metrics and overall threat exposure."
            - paragraph [ref=e33]:
              - strong [ref=e34]: What You’ll Be Doing
            - list [ref=e35]:
              - listitem [ref=e36]: Lead critical parts of Torq’s agentic platform to help drive forward adoption and innovation across the full lifecycle - from UX to prompt engineering
              - listitem [ref=e37]: Become an expert in Torq’s AI SOC offering and in Torq’s Platform as a whole
              - listitem [ref=e38]: Represent the customer’s voice inside Torq to ensure we’re staying on the critical path
              - listitem [ref=e39]: Work closely with Torq’s top-notch engineering teams to deliver product capabilities and stay on top of state-of-the-art AI trends
              - listitem [ref=e40]: Analyze product data - from classic product analytics to AI evaluations of usage patterns - to proactively bubble up user needs or issues
            - heading "The Ideal Candidate" [level=3] [ref=e41]:
              - strong [ref=e42]: The Ideal Candidate
            - list [ref=e43]:
              - listitem [ref=e44]: Has 3-5 years of product management experience
              - listitem [ref=e45]: Possesses a strong understanding of agentic / LLM products - from UX to the technical LLM engineering stack
              - listitem [ref=e46]: Spent at least 2 years working in the cybersecurity market, ideally in a SOC-adjacent space (SecOps, incident response, threat intelligence, threat hunting)
              - listitem [ref=e47]: Extensively worked with automation products and APIs - can look under the hood and understand systems and architecture
              - listitem [ref=e48]: Data-driven, with the ability to ask the right questions
              - listitem [ref=e49]: Superb English speaking and writing skills
            - paragraph [ref=e50]: As an equal-opportunity employer, we are committed to a team defined and empowered by diversity. We consider qualified applicants without regard to race, religion, color, national origin, gender, sexual orientation, age, marital status, veteran status, or disability status.
            - paragraph [ref=e51]: We are waiting for you!
