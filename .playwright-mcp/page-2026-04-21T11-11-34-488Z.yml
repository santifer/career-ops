                  - heading "Sobre a vaga" [level=2] [ref=e198]
                  - paragraph [ref=e200]:
                    - strong [ref=e202]: CONTROLLER
                    - text: "📍 Local: Arujá - SP"
                    - text: Cargo Financeiro Corporativo | Controladoria
                    - strong [ref=e204]: Contexto Da Posição
                    - text: Empresa brasileira de médio-grande porte especializada em soluções integradas de valorização e destinação sustentável de resíduos, com múltiplas unidades operacionais, presença em diversos estados e operações diversificadas (coprocessamento, gerenciamento total de resíduos, logística).
                    - text: O Controller atua como business partner das áreas de negócio — fornecendo informação qualificada, análise e visão crítica para que os gestores tomem melhores decisões.
                    - strong [ref=e206]: Responsabilidades
                    - emphasis [ref=e208]:
                      - strong [ref=e210]: Planejamento Orçamentário e Forecast
                    - list [ref=e212]:
                      - listitem [ref=e213]: Conduzir o ciclo orçamentário anual (budget), incluindo definição de premissas, consolidação e aprovação, com ênfase em controle de custos e alinhamento com a estratégia de negócios.
                      - listitem [ref=e214]: Realizar forecast periódico (mensal ou trimestral), com análise de variações (real vs. orçado vs. forecast anterior).
                      - listitem [ref=e215]: Garantir que cada gestor de área participe ativamente da construção e revisão do orçamento de sua responsabilidade.
                    - emphasis [ref=e217]:
                      - strong [ref=e219]: Gestão Gerencial e Análise de Resultados
                    - list [ref=e221]:
                      - listitem [ref=e222]: Elaborar e analisar DRE gerencial consolidado e por contrato/unidade, identificando variações, riscos e oportunidades.
                      - listitem [ref=e223]: Acompanhar rentabilidade por contrato e por operação, sinalizando desvios aos gestores responsáveis.
                      - listitem [ref=e224]: Monitorar indicadores de custos e identificar oportunidades de redução, subsidiando os gestores de área com dados para tomada de decisão.
                      - listitem [ref=e225]: Preparar relatórios gerenciais, análises financeiras e apresentações de resultados para o CFO e liderança, com foco em ações corretivas.
                    - emphasis [ref=e227]:
                      - strong [ref=e229]: Controles Internos e Compliance
                    - list [ref=e231]:
                      - listitem [ref=e232]: Manter e aprimorar práticas de controles internos e compliance financeiro, compatíveis com o estágio atual da organização.
                      - listitem [ref=e233]: Validar consistência entre informações do ERP, contabilidade terceirizada e relatórios gerenciais.
                      - listitem [ref=e234]: Atuar como interlocutor técnico com o escritório contábil externo, assegurando qualidade e tempestividade das entregas.
                    - emphasis [ref=e236]:
                      - strong [ref=e238]: Interface com Áreas de Negócio (Business Partner)
                    - list [ref=e240]:
                      - listitem [ref=e241]: Atuar como parceiro analítico dos gerentes operacionais, comerciais e administrativos, fornecendo visão financeira para suporte à decisão.
                      - listitem [ref=e242]: Participar de reuniões de resultado com gestores, provocando discussão sobre desempenho e planos de ação.
                      - listitem [ref=e243]: Apoiar análises específicas sob demanda (viabilidade de novos contratos, simulações de preço, análise de investimentos).
                    - emphasis [ref=e245]:
                      - strong [ref=e247]: Melhoria Contínua
                    - list [ref=e249]:
                      - listitem [ref=e250]: Aperfeiçoar processos, rotinas e indicadores de desempenho da Controladoria e FP&A, promovendo maior eficiência e integração com as operações.
                    - strong [ref=e252]: Requisitos
                    - emphasis [ref=e254]:
                      - strong [ref=e256]: "Formação e Experiência:"
                    - list [ref=e258]:
                      - listitem [ref=e259]: Formação superior completa em Contabilidade, Administração, Economia ou áreas afins.
                      - listitem [ref=e260]: Experiência sólida (mínimo 5 anos) em Controladoria, Custos ou FP&A, preferencialmente em empresas de porte médio com múltiplas unidades.
                      - listitem [ref=e261]: Vivência prática em planejamento orçamentário, análise de DRE por centro de custo/contrato e gestão gerencial.
                      - listitem [ref=e262]: Conhecimento em controles internos e compliance financeiro.
                    - strong [ref=e264]: Competências Técnicas
                    - list [ref=e266]:
                      - listitem [ref=e267]: Domínio avançado de Excel (modelagem, tabelas dinâmicas, Power Query).
                      - listitem [ref=e268]: Capacidade de trabalhar com dados extraídos de ERP próprio e construir visões gerenciais a partir de bases de dados diversas.
                      - listitem [ref=e269]: "Desejável: experiência com Power BI ou ferramentas equivalentes de BI."
                      - listitem [ref=e270]: "Desejável: experiência em ambiente industrial ou empresas com múltiplas unidades operacionais."
                      - listitem [ref=e271]: "Diferencial: experiência no setor de gestão de resíduos ou serviços ambientais."
                    - strong [ref=e273]: Competências Comportamentais
                    - list [ref=e275]:
                      - listitem [ref=e276]: Capacidade analítica e visão estratégica — saber transformar dados em recomendações.
                      - listitem [ref=e277]: Comunicação direta e objetiva — capacidade de interagir com todos os níveis, do operacional à Presidência, sem dependência de jargões.
                      - listitem [ref=e278]: Postura de parceiro, não de fiscal — capacidade de gerar confiança e colaboração com os gestores de área, atuando como business partner.
                      - listitem [ref=e279]: Organização e atenção a prazos — rigor no calendário de entregas gerenciais.
                      - listitem [ref=e280]: Autonomia e proatividade — perfil construtor, capaz de liderar iniciativas e trabalhar de forma colaborativa.
                      - listitem [ref=e281]: Postura ética, responsável e orientada a resultados, com foco em integridade e accountability.
                    - strong [ref=e283]: Informações Adicionais
