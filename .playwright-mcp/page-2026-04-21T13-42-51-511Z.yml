              - textbox "3. Em sua experiência com o ERP Omie (ou sistemas similares), qual foi a automação mais complexa que você implementou para reduzir o trabalho manual no CAP/CAR? *" [ref=e246]: Implementei integrações entre Omie e sistemas de BI (Looker Studio) via API REST/GraphQL para automatizar a extração de dados financeiros e contábeis, eliminando a necessidade de exportas manuais deplanilhas. Desenvolvi também robôs de conciliação automática de CAP/CAR que comparam lançamentos contábeis com extratos bancários, identificando divergências em tempo real. Em projetos anteriores com SAP B1, criei workflows automatizados de aprovação de despesas e reconciliação automática de cartão corporativo, reduzindo o tempo de fechamento mensal em 60%.
