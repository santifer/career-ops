  - main [ref=e269]:
    - generic [ref=e271]:
      - img "Beijing_new" [ref=e274]
      - generic [ref=e275]:
        - generic [ref=e276]:
          - text: Herzliya
          - heading "Senior Product Manager - Analytics - Herzliya" [level=2] [ref=e277]
          - paragraph [ref=e278]: AppsFlyer is the global leader in mobile attribution and marketing analytics, empowering thousands of the world’s leading apps and brands to make smarter growth decisions. Our Analytics products sit at the core of our Measurement offering - transforming complex attribution, revenue, and performance data into trusted, actionable insights that drive marketing strategy at scale.
          - paragraph [ref=e279]: We are looking for a Senior Product Manager to join our Analytics team within the Measurement group. In this role, you will own a core analytics domain used daily by global advertisers to measure, interpret, and optimize their marketing performance. You will work at the intersection of large-scale data, attribution complexity, privacy-driven measurement changes, and AI-powered capabilities - shaping how customers understand and rely on their marketing data.
          - paragraph [ref=e280]: This is a high-impact, highly visible role with direct influence on customer trust, product strategy, and the evolution of AppsFlyer’s analytics platform.
          - heading "What you’ll do" [level=2] [ref=e281]:
            - strong [ref=e282]: What you’ll do
          - list [ref=e283]:
            - listitem [ref=e284]: · Own a core Analytics domain end-to-end - from discovery and strategy definition to execution, launch, and continuous improvement.
            - listitem [ref=e285]: · Define and drive the roadmap for dashboards, metrics, and data experiences serving enterprise marketing teams.
            - listitem [ref=e286]: · Balance stability, scalability, and innovation in a complex, data-intensive environment.
            - listitem [ref=e287]: · Lead initiatives that modernize and consolidate analytics capabilities across multiple attribution sources.
            - listitem [ref=e288]: · Shape the integration of AI-powered capabilities into analytics experiences, enhancing how customers interpret performance data.
            - listitem [ref=e289]: · Work closely with R&D (Backend, Frontend, Data Engineering) to build scalable, high-performance analytics products.
            - listitem [ref=e290]: · Partner with Sales and Customer Success to understand customer needs, support adoption, and strengthen trust in our measurement solutions.
            - listitem [ref=e291]: · Engage directly with customers to validate product direction and identify opportunities to improve clarity, usability, and performance insights.
            - listitem [ref=e292]: · Drive prioritization in a high-demand environment with multiple stakeholders and competing initiatives.
          - heading "What you have" [level=2] [ref=e293]:
            - strong [ref=e294]: What you have
          - list [ref=e295]:
            - listitem [ref=e296]: · 5+ years of product management experience, ideally in data-heavy B2B SaaS environments.
            - listitem [ref=e297]: · Proven experience building and scaling analytics, BI, or data-driven products.
            - listitem [ref=e298]: · Strong analytical mindset with the ability to define KPIs, interpret data, and use data to guide product decisions.
            - listitem [ref=e299]: · Experience working closely with engineering and data teams on complex, scalable systems.
            - listitem [ref=e300]: · Ability to operate in ambiguity and structure complex problem spaces.
            - listitem [ref=e301]: · Strong stakeholder management skills and experience working cross-functionally in large organizations.
            - listitem [ref=e302]: · Excellent communication skills, with the ability to explain complex analytical concepts clearly to technical and non-technical audiences.
            - listitem [ref=e303]: · Experience in AdTech, marketing analytics, attribution, or mobile measurement - strong advantage.
          - heading "Bonus points" [level=2] [ref=e304]:
            - strong [ref=e305]: Bonus points
          - list [ref=e306]:
            - listitem [ref=e307]: · Familiarity with attribution models, SKAN, privacy-related measurement challenges.
            - listitem [ref=e308]: · Experience consolidating legacy systems or leading platform modernization efforts.
            - listitem [ref=e309]: · Experience integrating AI or automation into analytics workflows.
            - listitem [ref=e310]: · Technical background in analytics, data science, or engineering.
          - heading "Why join us?" [level=2] [ref=e311]:
            - strong [ref=e312]: Why join us?
          - list [ref=e313]:
            - listitem [ref=e314]: · Shape how leading global brands measure and optimize their marketing performance.
            - listitem [ref=e315]: · Own a core measurement product that directly impacts customer trust and retention.
            - listitem [ref=e316]: · Work with massive-scale datasets in one of the most complex ecosystems in digital marketing.
            - listitem [ref=e317]: · Play a central role in modernizing AppsFlyer’s analytics platform for a privacy-first world.
            - listitem [ref=e318]: · Collaborate across R&D, data, and customer-facing teams in a highly visible, strategic position.
          - paragraph [ref=e319]: As a global company operating from 25 offices across 19 countries, we reflect the human mosaic of the diverse and multicultural world in which we live. We ensure equal opportunities for all of our employees and promote the recruitment of diverse talents to our global teams without consideration of race, gender, culture, or sexual orientation. We value and encourage curiosity, diversity, and innovation from all our employees, customers, and partners.
          - paragraph [ref=e320]:
            - link "“As a Customer Obsessed company, we must first be Employee Obsessed. We need to make sure that we provide the team with the tools and resources they need to go All-In.”" [ref=e321] [cursor=pointer]:
              - /url: https://www.appsflyer.com/blog/how-all-in-shaped-our-story-and-could-define-your-career/
            - text: Oren Kaniel, CEO
          - paragraph [ref=e322]
