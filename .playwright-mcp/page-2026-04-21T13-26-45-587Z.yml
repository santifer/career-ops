                - paragraph [ref=e1343]: A Solventum está comprometida em construir uma força de trabalho diversificada e cultura inclusiva que capacita seu pessoal a ser o verdadeiro eu no trabalho. Para construir continuamente novos programas que atendam às necessidades de seus funcionários, a Solventum busca ter uma visão precisa e atualizada da diversidade de sua força de trabalho global. É por isso que a Solventum convida seus candidatos a fornecerem informações no Workday.
