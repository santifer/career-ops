        - paragraph [ref=e150]:
          - text: At Trivium Packaging, diversity, equity, inclusion, and belonging are embedded in who we are and essential to how we operate. We are building a workplace where every voice matters, every experience strengthens us, and every person has the opportunity to thrive. We foster a culture of respect, transparency, and accountability where our employees, clients, partners, and stakeholders feel represented and empowered. We believe every individual should have equitable access to opportunities in a fair and integral environment and feel safe bringing their authentic selves to work. We value and celebrate the unique perspectives that drive innovation and strengthen our global community.
          - text: DEIB is foundational and integrated into our culture and business practices. We continuously embed equitable and inclusive principles throughout the employee lifecycle from recruitment and onboarding to development, advancement, and retention. Our commitment is ongoing and intentional.
          - text: Innovation thrives when people feel seen, valued, and supported. That’s why we hold ourselves to high standards and maintain a zero tolerance for discrimination or harassment of any kinds. We proudly welcome applicants from all backgrounds and experiences. Employment decisions are made without regard to race, ethnicity, color, religion, sex, sexual orientation, gender identity or expression, age, national origin, disability, veteran status, or any other protected characteristic in accordance with applicable laws.
          - text: Together, we are shaping a workplace and a future where everyone belongs.
