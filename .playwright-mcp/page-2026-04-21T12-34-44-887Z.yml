          - generic [ref=e89]:
            - paragraph [ref=e90]: Trivium Packaging is a global sustainability leader in metal packaging with more than 60 locations worldwide, nearly 8,000 employees, and an annual revenue of approximately €3.0 billion. Trivium serves a diverse range of customers in a variety of end markets such as food, seafood, pet food, nutrition, beauty and personal care, household care, and premium beverages.
            - paragraph [ref=e91]: Trivium wants to shape the industry and has embarked on an ambitious transformation journey. In the near term, focus is on building & upskilling the team, deciding where to play & how to win, and increasing financial performance by executing the Trivium Business System (commercial, operational, and supply chain excellence). Sustainability is embedded in our materials and in our actions. Trivium has ambitious sustainability targets and focuses exclusively on products that are infinitely recyclable. Our company Sustainability Journey has been awarded a Platinum medal by EcoVadis, the world’s leading rating agent who allocated this award only to the top 1% of the >75000 companies reviewed. Sustainability is embedded in each and every function at Trivium, it‘s in our DNA. The global head office is at Amsterdam Airport; however, many people work in virtual teams from different countries. Our culture is results-driven, entrepreneurial, informal, and highly multicultural. Our people have a high degree of responsibility.
            - paragraph [ref=e92]:
              - strong [ref=e93]: Job Summary
            - list [ref=e94]:
              - listitem [ref=e95]: Deliver reliable, timely and accurate month end reporting.
              - listitem [ref=e96]: Ensure accurate and up to date costing is applied in the plant. Develop plan to implement standard costing.
              - listitem [ref=e97]: Timely deliver, review and comment reporting on a monthly basis to senior management (OCF, EBITDA, Conversion Costs, etc.).
              - listitem [ref=e98]: Assist in making and challenging Capex Projects in terms of comments, quotations, IRR and payback calculations. Follow up on approved Capex Projects.
              - listitem [ref=e99]: Actively support continuous business improvement request at plant level and BU level.
              - listitem [ref=e100]: Have full ownership on plant figures, both P&L and relevant Balance Sheet items.
              - listitem [ref=e101]: Lead Internal Controls process.
              - listitem [ref=e102]: Ensure full local tax compliance.
            - paragraph [ref=e103]
            - paragraph [ref=e104]:
              - strong [ref=e105]: Qualifications
            - list [ref=e106]:
              - listitem [ref=e107]: Bachelor’s degree in Business/Finance or related field;
              - listitem [ref=e108]: Proficiency in Microsoft Office and ERP system;
              - listitem [ref=e109]: Advanced English language skills;
              - listitem [ref=e110]: Desirable basic Spanish language skills;
              - listitem [ref=e111]: Understanding of local tax legislation.
              - listitem [ref=e112]: Project management experience;
              - listitem [ref=e113]: Experience with SOX requirements.
            - paragraph [ref=e114]
            - paragraph [ref=e115]:
              - strong [ref=e116]: Skills
            - list [ref=e117]:
              - listitem [ref=e118]: Demonstrate strong analytical skills, with a keen eye for detail and the ability to derive actionable insights from complex data.
              - listitem [ref=e119]: Take initiative in driving change and managing challenges, maintaining composure under pressure.
              - listitem [ref=e120]: Communicate effectively across all levels of the organization, influencing stakeholders and fostering collaboration.
              - listitem [ref=e121]: Exhibit a drive to continuously improve and achieve results, challenging the status quo and working collaboratively to drive success.
              - listitem [ref=e122]: Collaborate effectively within work groups and cross-functional teams, fostering a culture of teamwork and mutual support.
              - listitem [ref=e123]: Maintain a strong awareness of safety and responsibility, prioritizing the well-being of our team members and the community.
            - paragraph [ref=e124]
            - paragraph [ref=e125]:
              - generic [ref=e126]:
                - strong [ref=e127]: BRINGING YOUR TRUE SELF TO WORK
                - text: At Trivium, we believe that people perform at their best when they can bring their true selves to work. That’s why we hire diverse talent at every level and are proud to be an equal opportunity employer. We welcome colleagues of every background, identity and perspective, because our people like our customers come from all over the world. Creating an environment where everyone feels respected, supported and able to thrive isn’t just the right thing to do; it’s business critical. When our people belong, they deliver their best work, and together we achieve more.
