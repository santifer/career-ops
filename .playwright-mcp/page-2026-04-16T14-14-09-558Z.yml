                  - heading [level=2] [ref=e503]: Full job description
                  - generic [ref=e505]:
                    - paragraph [ref=e506]: You belong at Union!
                    - paragraph [ref=e507]: Why Union?
                    - paragraph [ref=e508]:
                      - text: Union Health is an award-winning integrated health system and the Wabash Valley's largest employer. Union Health is an independent and not-for-profit health system. Union Health consists of Union Hospital, Union Hospital Regional, Union Hospital Clinton, and Union Medical Group. Union Health offers a full spectrum of healthcare career opportunities across the continuum of care. The organizations that make up Union Health have a long tradition of serving the health care needs of West Central Indiana and East Central Illinois residents, stretching back more than 125 years. The System Director of Finance / Controller
                      - text: "serves as the organization’s senior accounting officer and is directly accountable to the Chief Financial Officer (CFO) for the integrity, accuracy, and timeliness of all financial records and reporting. This role owns enterprise accounting, financial reporting, reimbursement and cost reporting, audits, and internal controls, ensuring compliance with GAAP, Medicare regulations, and all applicable federal and state requirements. The Controller ensures the financial statements are accurate, auditable, and reliable for executive leadership and external stakeholders. This role reports to the Chief Financial Officer (CFO). Core Responsibilities: Accounting and Financial Reporting"
                    - list [ref=e510]:
                      - listitem [ref=e511]: Serve as the enterprise Controller with full accountability for the general ledger, monthly close, and financial statements.
                      - listitem [ref=e512]: Direct all accounting operations including general accounting, accounts payable, reimbursement accounting, cost reporting, and accounting-related charge master governance.
                      - listitem [ref=e513]: Ensure timely and accurate preparation of internal and external financial statements.
                      - listitem [ref=e514]: Establish and maintain accounting policies, procedures, and internal controls in accordance with GAAP and healthcare regulatory standards.
                    - paragraph [ref=e515]: Audit, Compliance & Regulatory Oversight
                    - list [ref=e516]:
                      - listitem [ref=e517]: Lead preparation and coordination of annual financial audits, tax filings, Medicare and Medicaid cost reports, and regulatory submissions.
                      - listitem [ref=e518]: Ensure compliance with all federal and state regulations impacting financial reporting and reimbursement.
                      - listitem [ref=e519]: Monitor changes in accounting standards and reimbursement rules and advise the CFO on accounting and reporting implications.
                      - text: Ensure adherence to corporate compliance, confidentiality, and internal control requirements.
                    - paragraph [ref=e520]: Systems, Controls & Process Improvement
                    - list [ref=e521]:
                      - listitem [ref=e522]: Own the design, implementation, and continuous improvement of accounting systems and close processes.
                      - listitem [ref=e523]: Strengthen reconciliations, documentation standards, and audit trails across the organization.
                      - listitem [ref=e524]: Develop scalable accounting processes to support growth, acquisitions, and system integrations.
                    - paragraph [ref=e525]: Team Leadership
                    - list [ref=e526]:
                      - listitem [ref=e527]: Lead, develop, and retain a high-performing accounting team with clear roles, accountability, and succession planning.
                      - listitem [ref=e528]: Promote a culture of accuracy, discipline, and continuous improvement within the accounting function.
                    - paragraph [ref=e529]: "Scope of Oversight:"
                    - list [ref=e530]:
                      - listitem [ref=e531]: Accounting
                      - listitem [ref=e532]: Accounts Payable
                      - listitem [ref=e533]: Financial Reporting & Internal Controls
                      - listitem [ref=e534]: Reimbursement & Cost Reporting
                      - listitem [ref=e535]: Accounting-related Charge Master governance
                    - paragraph [ref=e536]: "Qualifications:"
                    - list [ref=e537]:
                      - listitem [ref=e538]: Bachelor’s degree in Accounting required; CPA strongly preferred.
                      - listitem [ref=e539]: 5+ years of progressive healthcare accounting leadership experience.
                      - listitem [ref=e540]: Strong knowledge of GAAP, audits, internal controls, and healthcare reimbursement reporting.
                      - listitem [ref=e541]: Demonstrated ability to build disciplined close processes and produce accurate, auditable financial statements.
                    - paragraph [ref=e542]: "In addition to competitive pay, Union co-workers enjoy:"
                    - list [ref=e543]:
                      - listitem [ref=e544]: Part-time and Full-time schedules
                      - listitem [ref=e545]: Comprehensive Benefits
                      - listitem [ref=e546]: Paid Time Off starting day one.
                      - listitem [ref=e547]: Tuition reimbursement up to $5,250 each year.
                      - listitem [ref=e548]: Career Paths
                      - listitem [ref=e549]: Success Sharing
                      - listitem [ref=e550]: 403b Retirement Employer Match.
                      - text: Much More!
                    - paragraph [ref=e551]: Be part of an organization that is dedicated to your work-life balance, career, growth, and development. Union Health, U Matter and U Belong.
                    - paragraph [ref=e552]: How can we help? Call us at 812-238-7827 or email us at recruiting@union.health
                    - paragraph [ref=e553]: Please note that the salary information provided on the career site for this position opening may not necessarily reflect the accurate compensation associated with the role. We encourage candidates to inquire further and engage in direct communication with Union Health for comprehensive salary details.
                    - paragraph [ref=e554]: As an EOE/AA employer, Union Hospital, Inc. will not discriminate in its employment practices due to an applicant's age, race, color, religion, sex, sexual orientation, gender identity, national origin, protected veteran or disability status.
                    - text: "Location: Union Hospital · FINANCE(85005) Schedule: 07 - FULLTIME, DAY, 8-5"
