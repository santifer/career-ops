        - heading "Opportunity at scale" [level=2] [ref=e48]
        - paragraph [ref=e49]: A career at Unilever offers opportunity at scale. A chance to apply your unique experience to some of the world’s biggest brands. You’ll work with the best, always three steps ahead, making markets and shaping the future – ours and yours. We’ll give you space to shine and to pioneer change through your ideas. Make a real difference.
        - paragraph [ref=e50]: You may be launching a new product, developing a campaign in a emerging market, or helping to ensure our iconic brands stay front of mind for our consumers. You might be sourcing sustainable ingredients, engineering smarter solutions or leading the people who make it all happen. No matter your role, you will be pivotal to our continued success.
        - paragraph [ref=e51]: Innovation drives our ambition to create desire for our brands on a global scale. Your big thinking and expertise will fuel our purpose, inspire your colleagues and drive our business forward. Bring it on.
