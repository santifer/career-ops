                  - heading [level=2] [ref=e441]: Full job description
                  - generic [ref=e442]:
                    - paragraph [ref=e443]: Company Description
                    - paragraph [ref=e444]: Established in 1915, Curry Auto Center is a locally owned and operated automotive dealership based in Bloomington, Indiana. As the oldest Buick dealership in the United States, Curry Auto Center has proudly served the community for over a century. Specializing in Chevrolet, Buick, and GMC vehicles, the company is recognized for its commitment to exceptional customer service and automotive excellence. Curry Auto Center remains a 5th-generation family-owned business, fostering a strong community presence and dedication to its customers.
                    - paragraph [ref=e445]: Role Description
                    - paragraph [ref=e446]: The Controller role at Curry Auto Center is a full-time, on-site position located in Bloomington, IN. The Controller assists in the fair representation of the financial condition of the company through the oversight of financial activities, ensuring accuracy of financial records, and preparing reports on financial performance. This role will also include analyzing financial trends, overseeing accounting operations, and implementing controls to ensure compliance with regulatory requirements. The Controller position will provide sales and expense analyses for all departments and will collaborate with leadership to develop financial strategies and provide guidance to the accounting team to drive the organization's financial success.
                    - paragraph [ref=e447]: Duties and Responsibilities
                    - list [ref=e448]:
                      - listitem [ref=e449]: Attend key employee meetings as requested.
                      - listitem [ref=e450]: Post manual journal entries and any other posting as required.
                      - listitem [ref=e451]: Maintain control of posted documents.
                      - listitem [ref=e452]: Set up fixed assets and prepaid asset accounts.
                      - listitem [ref=e453]: Manage office staff to ensure timely completion of assigned tasks.
                      - listitem [ref=e454]: Prepare W2's, year-end tax reports and tax returns in a timely fashion.
                      - listitem [ref=e455]: Approve adjustments to inventory accounts.
                      - listitem [ref=e456]: Post additions and modifications to inventory accounts.
                      - listitem [ref=e457]: Reconcile select accounts monthly, prior to month end.
                      - listitem [ref=e458]: Assist in completion of annual review/audit.
                      - listitem [ref=e459]: Complete end-of-month accounting reports.
                      - listitem [ref=e460]: Reconcile flooring interest statement.
                      - listitem [ref=e461]: Prepare a complete financial statement and submit it to the manufacturer by the 10th day of each month. Interpret and analyze the financial statement continually.
                      - listitem [ref=e462]: Keep the General Manager and dealer informed about the trends and the cash needs of the business.
                      - listitem [ref=e463]: Maintain loss reserves for contingent liabilities and trade receivables.
                      - listitem [ref=e464]: Automate all possible systems and establish controls.
                      - listitem [ref=e465]: Coordinate with outside computer companies on computer performance and utilization.
                      - listitem [ref=e466]: Administer Empower 401K employee benefit program, including quarterly and annual reports.
                      - listitem [ref=e467]: Additional tasks and responsibilities as needed.
                    - paragraph [ref=e468]: Required Qualifications
                    - list [ref=e469]:
                      - listitem [ref=e470]: Degree in Accounting or equivalent
                      - listitem [ref=e471]: One year of experience in a dealership position
                      - listitem [ref=e472]: Ability to read and comprehend instructions and information
                      - listitem [ref=e473]: Working knowledge of dealership documents and dealership financial statements
                      - listitem [ref=e474]: Ability to explain technical financial information in an understandable manner
                      - listitem [ref=e475]: Demonstrated ability in problem-solving, data interpretation, and decision-making
                      - listitem [ref=e476]: Excellent verbal and written communication skills
                      - listitem [ref=e477]: High attention to detail, organizational skills, and ability to meet deadlines.
                      - listitem [ref=e478]: Professional Personal Appearance
                      - listitem [ref=e479]: Trainable on dealership computer system
                      - listitem [ref=e480]: Ability to work well with customers and co-workers
                    - paragraph [ref=e481]: Working Conditions
                    - list [ref=e482]:
                      - listitem [ref=e483]: Working at a desk on a computer and in an office setting for most the day
                      - listitem [ref=e484]: Most of the day will be spent analyzing dealership records, posting accounts and performing other types of paperwork.
                      - listitem [ref=e485]: Some walking between departments will be necessary to connect with staff on office related items
                    - paragraph [ref=e486]: Statement of Understanding
                    - paragraph [ref=e487]: The dealership reserves the right to revise the functions and duties of the job or to require that additional or different tasks be performed when circumstances change (i.e., emergencies, changes in personnel, workload, rush jobs, or technological developments).
