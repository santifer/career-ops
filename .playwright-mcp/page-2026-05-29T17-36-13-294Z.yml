        - heading "Senior Product Manager – Scan Infrastructure & Orchestration" [level=1] [ref=e51]
        - generic [ref=e53]: Tel Aviv
        - link "Apply for this position" [ref=e54] [cursor=pointer]:
          - /url: "#apply-form"
      - generic [ref=e57]:
        - generic [ref=e58]:
          - heading "Big Ideas. Real People." [level=3] [ref=e59]:
            - strong [ref=e60]: Big Ideas. Real People.
          - paragraph [ref=e61]: At Orca, in the right environment and with the right team, talent has no boundaries. This team spirit, together with our drive to always aim high, has quickly earned us unicorn status and turned us into a global cloud security innovation leader. So, if you’re ready to join an amazing team of people who inspire each other every day, now is the time to find your place in our pod.
          - heading "Highlights" [level=3] [ref=e62]:
            - strong [ref=e63]: Highlights
          - list [ref=e64]:
            - listitem [ref=e65]:
              - strong [ref=e66]: "High growth:"
              - text: In just seven years, we’ve reached milestones that take other companies a decade or more. We’ve doubled our employee count, tripled our customer count, and rapidly expanded our product capabilities.
            - listitem [ref=e67]:
              - strong [ref=e68]: "Disruptive innovation:"
              - text: Our founders saw that traditional security didn’t work for the cloud so they set out to carve a new path. We’re relentless pioneers who invented agentless technology and continue to be the most comprehensive and innovative cloud security company.
            - listitem [ref=e69]:
              - strong [ref=e70]: "Well-capitalized:"
              - text: With a valuation of $1.8 billion, Orca is a cybersecurity unicorn dominating the cloud security space. We’re backed by an impressive team of investors such as Capital G, ICONIQ, GGV, and SVCI, a syndicate of CISOs who invest their own money after conducting their due diligence.
            - listitem [ref=e71]:
              - strong [ref=e72]: "Respectful and transparent culture:"
              - text: Our executives pride themselves on being accessible to everyone and believe in sharing knowledge with the employees. Each employee has a place in shaping the future of our industry.
          - heading "About the role" [level=3] [ref=e73]:
            - strong [ref=e74]: About the role
          - paragraph [ref=e75]:
            - text: We are looking for a
            - strong [ref=e76]: Senior Product Manager
            - text: to lead our
            - strong [ref=e77]: Scan Infrastructure & Orchestration (SIO) domain
            - text: . This is one of the most centralized domains at Orca, responsible for the base technology that scans the underlying cloud environments of our entire global customer base.
            - text: As the owner of SIO, you will architect complex data processes and collaborate across the entire organization to ensure Orca leads the industry in scan scale, efficiency, and multi-cloud coverage.
          - heading "On a typical day you’ll" [level=3] [ref=e78]:
            - strong [ref=e79]: On a typical day you’ll
          - list [ref=e80]:
            - listitem [ref=e81]:
              - strong [ref=e82]: "Define the Foundation:"
              - text: Lead the strategy for cloud vendor integrations (AWS, GCP, Azure, etc.), defining the data requirements and ingestion logic that power the entire Orca platform.
            - listitem [ref=e83]:
              - strong [ref=e84]: "Own the Scan User Experience:"
              - text: Architect all user touchpoints within the scan process—from initial configurations and visualization to real-time monitoring and reporting.
            - listitem [ref=e85]:
              - strong [ref=e86]: "Scale & Efficiency:"
              - text: Define the performance requirements and orchestration logic needed to meet the scale of the world’s largest cloud estates, ensuring high efficiency and cost-effectiveness.
            - listitem [ref=e87]:
              - strong [ref=e88]: "Cross-Domain Orchestration:"
              - text: Act as the central hub for Orca’s R&D, collaborating with neighboring domains to integrate new services and ensure seamless scan coverage for all new features.
            - listitem [ref=e89]:
              - strong [ref=e90]: "Forward-Looking Strategic Mindset:"
              - text: Build the vision for our scan products. Stay ahead of the market by identifying new services and opportunities across all cloud vendors worldwide.
          - heading "About you" [level=3] [ref=e91]:
            - strong [ref=e92]: About you
          - list [ref=e93]:
            - listitem [ref=e94]:
              - text: You have
              - strong [ref=e95]: 5+ years
              - text: of Product Management experience in B2B SaaS — a must.
            - listitem [ref=e96]: You bring a background in Software Development or Engineering — a must.
            - listitem [ref=e97]: Proven experience in building complex data products or high-scale backend systems — a must.
            - listitem [ref=e98]: Background in cloud products development — a big plus.
