        - generic [ref=e476]:
          - heading "DECLARAÇÃO DE CONSENTIMENTO DE PRIVACIDADE DE DADOS" [level=3] [ref=e477]
          - generic [ref=e478]:
            - paragraph [ref=e479]: Você deve ler atentamente nosso Aviso de Privacidade de Dados de Recrutamento ("Aviso") abaixo. Ao clicar em "concordo", você confirma que leu, entendeu e concorda explicitamente com o Aviso, que descreve como usamos seus dados. Você concorda expressamente com o armazenamento de seus Dados de Recrutamento (conforme definido no Aviso) por um período de 12 meses (36 meses se você residir nos Estados Unidos da América, de acordo com as leis de proteção de dados aplicáveis) após o final do processo de recrutamento para avaliar sua adequação para outras vagas de emprego e consentir que nossas equipes de recrutamento em todo o mundo tenham acesso e processamento de seus Dados de Recrutamento de acordo com o Aviso. Você pode retirar seu consentimento a qualquer momento no futuro através da exclusão do seu perfil on-line. Você está ciente de que a retirada de seu consentimento pode afetar quaisquer candidaturas em andamento em que você esteja envolvido.
            - paragraph [ref=e482]: AVISO DE PRIVACIDADE DE DADOS DE RECRUTAMENTO
            - paragraph [ref=e484]: 1 Introdução
            - paragraph [ref=e486]: No presente Aviso, descrevemos como a Trivium Packaging B.V. e suas afiliadas (“Trivium” ou “nós”) tratamos os dados pessoais de pessoas que se candidatam a vagas na nossa empresa por intermédio dos canais que postam o presente Aviso (“Candidatos” ou “ você”).
            - paragraph [ref=e488]: O Aviso descreve as informações que coletamos, o que fazemos com elas, com quem as compartilhamos, como garantimos sua segurança, por quanto tempo as armazenamos e quais direitos e obrigações você tem como candidato.
            - paragraph [ref=e490]: Após a conclusão de seu perfil de candidato, as informações que você carregou em seu perfil serão disponibilizadas para nossas equipes de recrutamento em todo o mundo, conforme o caso, para os fins descritos abaixo.
            - paragraph [ref=e492]: 2 Dados de Recrutamento que coletamos e utilizamos
            - paragraph [ref=e494]: "Poderemos coletar e utilizar os seguintes dados pessoais, conforme fornecidos por você: informações de contato (como, por exemplo, nome, nome de usuário, endereço, e-mail e telefone); certificados de escolaridade; informações sobre experiência (como escolaridade, habilidades, experiência profissional e/ou CVs), informações demográficas (como, por exemplo, idade, data de nascimento, gênero); resultados de testes psicotécnicos e de habilidades; outras informações de identificação (como, por exemplo, número da seguridade social dos Estados Unidos da América) e quaisquer outras informações necessárias para tomar uma decisão de recrutamento (todos esses dados são doravante denominados em conjunto “Dados de Recrutamento”)."
            - paragraph [ref=e496]: 3 Finalidade da coleta e uso dos Dados de Recrutamento
            - paragraph [ref=e498]: "A Trivium coleta e utiliza os Dados de Recrutamento para os seguintes fins:"
            - paragraph [ref=e499]:
              - generic [ref=e500]: i.
              - text: determinar suas qualificações de emprego e tomar uma decisão sobre o recrutamento;
            - paragraph [ref=e502]:
              - generic [ref=e503]: ii.
              - text: avaliar sua adequação a outras vagas de emprego;
            - paragraph [ref=e505]:
              - generic [ref=e506]: iii.
              - text: informar por e-mail, telefone ou carta sobre o andamento do seu recrutamento conosco;
            - paragraph [ref=e508]:
              - generic [ref=e509]: iv.
              - text: proteger nossos direitos e cumprir nossas obrigações legais; e
            - paragraph [ref=e511]:
              - generic [ref=e512]: v.
              - text: informar por e-mail sobre outras vagas locais ou mundiais na Trivium que possamos considerar apropriadas para você se candidatar.
            - paragraph [ref=e514]: Se sua candidatura para a vaga for bem-sucedida, seus Dados de Recrutamento podem ser processados para os fins de emprego necessários e incluídos em seu arquivo laboral. Se você precisar de mais informações sobre o processamento de seus Dados de Recrutamento para os fins de emprego, entre em contato com legalandcompliance@triviumpackaging.com
            - paragraph [ref=e516]: Não coletamos ou utilizamos os Dados de Recrutamento que você nos enviar para fins que não sejam os indicados acima.
            - paragraph [ref=e518]: 4 Divulgação e transferência de Dados de Recrutamento
            - paragraph [ref=e520]: "Podemos compartilhar os Dados de Recrutamento:"
            - paragraph [ref=e521]: • Somente com funcionários da Trivium que precisem conhecê-las para os fins descritos na seção 3 acima.
            - paragraph [ref=e523]: • Com nossos prestadores de serviço terceirizados contratados para os fins descritos na seção 3 acima.
            - paragraph [ref=e525]: • Para fins de proteger nossos direitos e cumprir nossas obrigações legais.
            - paragraph [ref=e527]: Nossas entidades e prestadores de serviço terceirizados que utilizam os Dados de Recrutamento podem ser nomeados em territórios onde as leis não ofereçam proteção para Dados de Recrutamento equivalentes às leis aplicáveis em sua jurisdição. A Trivium garantirá que essas transferências internacionais de dados cumpram as leis aplicáveis sobre proteção de dados.
            - paragraph [ref=e529]: 5 Período de retenção
            - paragraph [ref=e531]: Durante o período em que seu perfil de candidato estiver ativo, você será informado por nós sobre as vagas de emprego que consideremos apropriadas a você, e seus Dados de Recrutamento permanecerão armazenados em nossos bancos de dados até que você apague seu perfil de candidato ou por 12 (seis) meses após o final do processo de recrutamento para os fins descritos na seção 3 acima (36 meses se residir nos Estados Unidos da América), a menos que sejamos obrigados por lei a armazenar esses dados por um período maior.
            - paragraph [ref=e533]: Caso sua candidatura à vaga seja aprovada, seus Dados de Recrutamento poderão, no entanto, ser processados e incluídos em seu arquivo de emprego.
            - generic [ref=e535]: 6 Segurança
            - paragraph [ref=e537]: A Trivium toma medidas técnicas, físicas e organizacionais para proteger os Dados de Recrutamento de sua posse ou controle de perda, roubo, uso indevido, acesso não autorizado, divulgação, alteração, cópia, destruição acidental ou ilegal e qualquer outra forma ilegal de uso.
            - paragraph [ref=e539]: 7 Seus direitos
            - paragraph [ref=e541]: Você terá o direito, segundo as leis aplicáveis de proteção de dados, de acessar, corrigir ou alterar e, em alguns casos, apagar ou contestar o processamento dos seus Dados de Recrutamento.
            - paragraph [ref=e543]: Você poderá exercer seus direitos, enviando um e-mail para legalandcompliance@triviumpackaging.com
            - paragraph [ref=e545]: 8 Outras informações
            - paragraph [ref=e547]: Os controladores de dados com relação aos seus Dados de Recrutamento são a Trivium Packaging B.V, Schipol Boulevard 127, WTC Schipol, Torre G, 1118 BG Schipol, Holanda e a entidade Trivium local onde você efetuou a candidatura. Os detalhes completos dessa entidade local e de outras entidades relevantes que podem processar seus Dados de Recrutamento de acordo com este Aviso são disponibilizados mediante solicitação.
