            - paragraph [ref=e90]:
              - text: "Dover Fueling Solutions (\"DFS\"), uma empresa Dover (NYSE: DOV) composta pelos negócios ClearView, Fairbanks, ProGauge, Tokheim, Wayne Fueling Systems e OPW's Fuel Management Systems, oferece equipamentos avançados de abastecimento de combustíveis, sistemas eletrônicos e pagamento, medição automática de tanques e soluções de gerenciamento de estoque de líquidos para clientes em todo o mundo. Sediada em Austin, Texas, a DFS tem uma presença global significativa, incluindo instalações nos EUA, Reino Unido, Suécia, Itália França, Índia, China e Brasil. Para obter mais informações e conhecer nossa política de privacidade, visite"
              - link "www.doverfuelingsolutions.com" [ref=e91] [cursor=pointer]:
                - /url: http://www.doverfuelingsolutions.com/
            - paragraph [ref=e92]
            - paragraph [ref=e93]:
              - strong [ref=e94]: "Sumário:"
            - paragraph [ref=e95]: Liderar as atividades de Controladoria, incluindo Contabilidade, Fiscal/Tributário e Controles Internos, assegurando a integridade das informações financeiras, conformidade com IFRS, US GAAP, SOX e legislações aplicáveis. Atuar como parceiro do negócio, apoiando a tomada de decisão por meio de análises financeiras, gestão de riscos e melhoria contínua dos processos, contribuindo para a eficiência operacional e geração de valor da companhia. Reporte ao Diretor de Finanças LATAM .
            - paragraph [ref=e96]
            - list [ref=e97]:
              - listitem [ref=e98]: Liderar Contabilidade, Fiscal/Tributário (com parceiros externos) e Controles Internos, garantindo conformidade e qualidade das informações;
              - listitem [ref=e99]: Garantir a qualidade, acurácia e tempestividade dos fechamentos contábeis, declarações e reports gerenciais e corporativos;
              - listitem [ref=e100]: Atuar como guardião da governança financeira, assegurando aderência às políticas corporativas e fortalecendo o ambiente de controles internos;
              - listitem [ref=e101]: Responsável pelos processos de auditorias internas e externas;
              - listitem [ref=e102]: Ser um parceiro das áreas de negócio, suportando decisões com análises e visão financeira;
              - listitem [ref=e103]: Gerenciar a atuação de parceiros externos de compliance fiscal e consultoria tributária, garantindo qualidade técnica, alinhamento e captura de oportunidades fiscais;
              - listitem [ref=e104]: Apoiar as áreas operacionais na melhoria de dados, eficiência e disciplina de processos;
              - listitem [ref=e105]: Identificar e capturar oportunidades de planejamento tributário e eficiência fiscal, em conjunto com advisors externos;
              - listitem [ref=e106]: Garantir o cumprimento de todas as obrigações fiscais e regulatórias (federais, estaduais e municipais);
              - listitem [ref=e107]: Acompanhar as mudanças nas legislações e os impactos que podem causar para o negócio, principalmente no que tange as mudanças e aplicações relacionadas a Reforma Tributária;
              - listitem [ref=e108]: Liderar iniciativas de melhoria contínua, automação e simplificação de processos, elevando o nível de eficiência da área;
              - listitem [ref=e109]: Acompanhar temas-chave como inventário/E&O, custos, margens e receita;
              - listitem [ref=e110]: Desenvolver a equipe com foco em performance, accountability e formação de talentos;
              - listitem [ref=e111]: Manter interface com times globais, assegurando alinhamento e consistência;
