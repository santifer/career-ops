          - heading "Cargo Financeiro Corporativo | Controladoria" [level=3] [ref=e43]
          - paragraph [ref=e44]
          - heading "CONTEXTO DA POSIÇÃO:" [level=2] [ref=e45]:
            - strong [ref=e46]: "CONTEXTO DA POSIÇÃO:"
          - heading "Empresa brasileira de médio-grande porte especializada em soluções integradas de valorização e destinação sustentável de resíduos, com múltiplas unidades operacionais, presença em diversos estados e operações diversificadas (coprocessamento, gerenciamento total de resíduos, logística)." [level=3] [ref=e47]
          - heading "O Controller atua como business partner das áreas de negócio — fornecendo informação qualificada, análise e visão crítica para que os gestores tomem melhores decisões." [level=3] [ref=e48]
          - heading "RESPONSABILIDADES:" [level=2] [ref=e49]:
            - strong [ref=e50]: "RESPONSABILIDADES:"
          - heading "Planejamento Orçamentário e Forecast" [level=3] [ref=e51]:
            - strong [ref=e52]:
              - emphasis [ref=e53]: Planejamento Orçamentário e Forecast
          - heading "• Conduzir o ciclo orçamentário anual (budget), incluindo definição de premissas, consolidação e aprovação, com ênfase em controle de custos e alinhamento com a estratégia de negócios." [level=3] [ref=e54]
          - heading "• Realizar forecast periódico (mensal ou trimestral), com análise de variações (real vs. orçado vs. forecast anterior)." [level=3] [ref=e55]
          - heading "• Garantir que cada gestor de área participe ativamente da construção e revisão do orçamento de sua responsabilidade." [level=3] [ref=e56]
          - heading "Gestão Gerencial e Análise de Resultados" [level=3] [ref=e57]:
            - strong [ref=e58]:
              - emphasis [ref=e59]: Gestão Gerencial e Análise de Resultados
          - heading "• Elaborar e analisar DRE gerencial consolidado e por contrato/unidade, identificando variações, riscos e oportunidades." [level=3] [ref=e60]
          - heading "• Acompanhar rentabilidade por contrato e por operação, sinalizando desvios aos gestores responsáveis." [level=3] [ref=e61]
          - heading "• Monitorar indicadores de custos e identificar oportunidades de redução, subsidiando os gestores de área com dados para tomada de decisão." [level=3] [ref=e62]
          - heading "• Preparar relatórios gerenciais, análises financeiras e apresentações de resultados para o CFO e liderança, com foco em ações corretivas." [level=3] [ref=e63]
          - heading "Controles Internos e Compliance" [level=3] [ref=e64]:
            - strong [ref=e65]:
              - emphasis [ref=e66]: Controles Internos e Compliance
          - heading "• Manter e aprimorar práticas de controles internos e compliance financeiro, compatíveis com o estágio atual da organização." [level=3] [ref=e67]
          - heading "• Validar consistência entre informações do ERP, contabilidade terceirizada e relatórios gerenciais." [level=3] [ref=e68]
          - heading "• Atuar como interlocutor técnico com o escritório contábil externo, assegurando qualidade e tempestividade das entregas." [level=3] [ref=e69]
          - heading "Interface com Áreas de Negócio (Business Partner)" [level=3] [ref=e70]:
            - strong [ref=e71]:
              - emphasis [ref=e72]: Interface com Áreas de Negócio (Business Partner)
          - heading "• Atuar como parceiro analítico dos gerentes operacionais, comerciais e administrativos, fornecendo visão financeira para suporte à decisão." [level=3] [ref=e73]
          - heading "• Participar de reuniões de resultado com gestores, provocando discussão sobre desempenho e planos de ação." [level=3] [ref=e74]
          - heading "• Apoiar análises específicas sob demanda (viabilidade de novos contratos, simulações de preço, análise de investimentos)." [level=3] [ref=e75]
          - heading "Melhoria Contínua" [level=3] [ref=e76]:
            - strong [ref=e77]:
              - emphasis [ref=e78]: Melhoria Contínua
          - heading "• Aperfeiçoar processos, rotinas e indicadores de desempenho da Controladoria e FP&A, promovendo maior eficiência e integração com as operações." [level=3] [ref=e79]
          - heading "REQUISITOS:" [level=2] [ref=e80]:
            - strong [ref=e81]: "REQUISITOS:"
          - heading "Formação e Experiência:" [level=3] [ref=e82]:
            - strong [ref=e83]:
              - emphasis [ref=e84]: "Formação e Experiência:"
          - heading "• Formação superior completa em Contabilidade, Administração, Economia ou áreas afins." [level=3] [ref=e85]
          - heading "• Experiência sólida (mínimo 5 anos) em Controladoria, Custos ou FP&A, preferencialmente em empresas de porte médio com múltiplas unidades." [level=3] [ref=e86]
          - heading "• Vivência prática em planejamento orçamentário, análise de DRE por centro de custo/contrato e gestão gerencial." [level=3] [ref=e87]
          - heading "• Conhecimento em controles internos e compliance financeiro." [level=3] [ref=e88]
          - heading "Competências Técnicas:" [level=3] [ref=e89]:
            - strong [ref=e90]:
              - emphasis [ref=e91]: "Competências Técnicas:"
          - heading "• Domínio avançado de Excel (modelagem, tabelas dinâmicas, Power Query)." [level=3] [ref=e92]
          - heading "• Capacidade de trabalhar com dados extraídos de ERP próprio e construir visões gerenciais a partir de bases de dados diversas." [level=3] [ref=e93]
          - 'heading "• Desejável: experiência com Power BI ou ferramentas equivalentes de BI." [level=3] [ref=e94]'
          - 'heading "• Desejável: experiência em ambiente industrial ou empresas com múltiplas unidades operacionais." [level=3] [ref=e95]'
          - 'heading "• Diferencial: experiência no setor de gestão de resíduos ou serviços ambientais." [level=3] [ref=e96]'
          - heading "Competências Comportamentais:" [level=3] [ref=e97]:
            - strong [ref=e98]: "Competências Comportamentais:"
          - heading "• Capacidade analítica e visão estratégica — saber transformar dados em recomendações." [level=3] [ref=e99]
          - heading "• Comunicação direta e objetiva — capacidade de interagir com todos os níveis, do operacional à Presidência, sem dependência de jargões." [level=3] [ref=e100]
          - heading "• Postura de parceiro, não de fiscal — capacidade de gerar confiança e colaboração com os gestores de área, atuando como business partner." [level=3] [ref=e101]
          - heading "• Organização e atenção a prazos — rigor no calendário de entregas gerenciais." [level=3] [ref=e102]
          - heading "• Autonomia e proatividade — perfil construtor, capaz de liderar iniciativas e trabalhar de forma colaborativa." [level=3] [ref=e103]
          - heading "• Postura ética, responsável e orientada a resultados, com foco em integridade e accountability." [level=3] [ref=e104]:
