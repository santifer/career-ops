            - paragraph [ref=e18]:
              - strong [ref=e19]: Who is Tenable?
            - paragraph [ref=e20]: Tenable® is the Exposure Management company. 44,000 organizations around the globe rely on Tenable to understand and reduce cyber risk. Our global employees support 65 percent of the Fortune 500, 45 percent of the Global 2000, and large government agencies. Come be part of our journey!
            - paragraph [ref=e21]:
              - strong [ref=e22]: What makes Tenable such a great place to work?
            - paragraph [ref=e23]: "Ask a member of our team and they’ll answer, “Our people!” We work together to build and innovate best-in-class cybersecurity solutions for our customers; all while creating a culture of belonging, respect, and excellence where we can be our best selves. When you’re part of our #OneTenable team, you can expect to partner with some of the most talented and passionate people in the industry, and have the support and resources you need to do work that truly matters. We deliver results that exceed expectations and we win together!"
          - generic [ref=e24]:
            - paragraph [ref=e25]: "Your Role:"
            - paragraph [ref=e26]: The Senior Product Manager will play a key role in the product life cycle with an emphasis on customer requirements, as well as generating and defining the product vision. The Senior Product Manager will work closely with multiple departments, including product management, engineering, UX/UI, sales, customer support, finance, and marketing, to ensure customer requirements are met.
            - paragraph [ref=e27]: This is an exciting opportunity to join a fast-growing, innovative company, be part of a strong team, and lead a product that solves a high-profile problem in the Cloud Security space. You will be joining the company’s product team and leading a significant domain.
            - paragraph [ref=e28]: "Your Opportunity:"
            - list [ref=e29]:
              - listitem [ref=e30]: Own and lead the vision, strategy, and execution for the Cloud Threat Detection domain, driving end-to-end product development of threat detections and stories, AI risk assessment, eBPF agent, container runtime protection and more. to help customers reduce risk and achieve continuous cloud compliance
              - listitem [ref=e31]: Engage directly with customers and prospects to gather insights, validate assumptions, and ensure product decisions align with real-world security challenges.
              - listitem [ref=e32]: Collaborate cross-functionally with engineering, design, and research teams to deliver high-impact features and platform capabilities
              - listitem [ref=e33]: Drive both inbound and outbound product efforts
              - listitem [ref=e34]: Define product strategy and roadmap
            - paragraph [ref=e35]: "What You'll Need:"
            - list [ref=e36]:
              - listitem [ref=e37]: 8+ years of proven experience in product management, focused on cloud-native security domains such as threat detection and stories, AI risk assessment, eBPF agent, and container runtime protection.
              - listitem [ref=e38]: Deep understanding of threat hunting, security orchestration, and public cloud environments (AWS, Azure, GCP, etc.), including security frameworks, key services, IAM concepts, and runtime protection.
              - listitem [ref=e39]: Proven ability to define and execute product strategy—from customer discovery to roadmap planning and successful release.
              - listitem [ref=e40]: Excellent English, both written and verbal, including great presentation skills
              - listitem [ref=e41]: Bachelor’s degree in a technical field or equivalent practical experience
