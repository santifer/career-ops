                    - text: Desde 1986, o Grupo Renova é referência nacional no gerenciamento e tratamento de resíduos industriais, unindo tecnologia, inovação e compromisso ambiental. Com quase quatro décadas de história, seguimos firmes em nosso propósito de transformar resíduos em valor, atuando com excelência, responsabilidade e foco em soluções sustentáveis para a indústria.
                    - text: "🌱 Nossa missão é clara: Transformar resíduos em valor. Contribuindo para a descarbonização e para a construção de um futuro mais sustentável."
                    - text: "🔭 Temos também uma visão de longo prazo: Ser a empresa mais eficiente e lucrativa do setor de resíduos através da constante busca pela excelência do nosso time e nossos processos."
                    - text: "💡 E nos guiamos por valores sólidos, que fazem parte da nossa cultura e do nosso dia a dia:"
                    - text: • Cuidamos das pessoas e valorizamos as relações
                    - text: • Entregamos resultados duradouros
                    - text: • Somos um time que faz acontecer
                    - text: • Geramos impactos positivos e de qualidade
                    - text: • Priorizamos segurança todos os dias
                    - text: Ao longo dos anos, ampliamos nossa atuação e consolidamos nosso posicionamento como uma empresa de energia renovável. Atuamos diretamente na descarbonização da indústria e somos agentes ativos da economia circular, oferecendo soluções que reduzem impactos ambientais e promovem o uso inteligente de recursos.
                    - text: 🚀 Com orgulho, somos o maior fabricante e expedidor de CDR (Combustível Derivado de Resíduos) do Brasil, liderando a transformação de resíduos em energia renovável e contribuindo para uma matriz energética mais sustentável.
                    - text: No Grupo Renova, cada processo é pensado para gerar valor ambiental, econômico e social. Porque para nós, sustentabilidade não é um diferencial — é a base de tudo que fazemos. ♻️
