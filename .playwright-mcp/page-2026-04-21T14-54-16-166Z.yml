                  - paragraph [ref=e343]:
                    - strong [ref=e345]: CONTROLLER
                    - text: "📍 Local: Arujá - SP"
                    - text: Cargo Financeiro Corporativo | Controladoria
                    - strong [ref=e347]: Contexto Da Posição
                    - text: Empresa brasileira de médio-grande porte especializada em soluções integradas de valorização e destinação sustentável de resíduos, com múltiplas unidades operacionais, presença em diversos estados e operações diversificadas (coprocessamento, gerenciamento total de resíduos, logística).
                    - text: O Controller atua como business partner das áreas de negócio — fornecendo informação qualificada, análise e visão crítica para que os gestores tomem melhores decisões.
                    - strong [ref=e349]: Responsabilidades
                    - emphasis [ref=e351]:
                      - strong [ref=e353]: Planejamento Orçamentário e Forecast
                    - list [ref=e355]:
                      - listitem [ref=e356]: Conduzir o ciclo orçamentário anual (budget), incluindo definição de premissas, consolidação e aprovação, com ênfase em controle de custos e alinhamento com a estratégia de negócios.
                      - listitem [ref=e357]: Realizar forecast periódico (mensal ou trimestral), com análise de variações (real vs. orçado vs. forecast anterior).
                      - listitem [ref=e358]: Garantir que cada gestor de área participe ativamente da construção e revisão do orçamento de sua responsabilidade.
                    - emphasis [ref=e360]:
                      - strong [ref=e362]: Gestão Gerencial e Análise de Resultados
                    - list [ref=e364]:
                      - listitem [ref=e365]: Elaborar e analisar DRE gerencial consolidado e por contrato/unidade, identificando variações, riscos e oportunidades.
                      - listitem [ref=e366]: Acompanhar rentabilidade por contrato e por operação, sinalizando desvios aos gestores responsáveis.
                      - listitem [ref=e367]: Monitorar indicadores de custos e identificar oportunidades de redução, subsidiando os gestores de área com dados para tomada de decisão.
                      - listitem [ref=e368]: Preparar relatórios gerenciais, análises financeiras e apresentações de resultados para o CFO e liderança, com foco em ações corretivas.
                    - emphasis [ref=e370]:
                      - strong [ref=e372]: Controles Internos e Compliance
                    - list [ref=e374]:
                      - listitem [ref=e375]: Manter e aprimorar práticas de controles internos e compliance financeiro, compatíveis com o estágio atual da organização.
                      - listitem [ref=e376]: Validar consistência entre informações do ERP, contabilidade terceirizada e relatórios gerenciais.
                      - listitem [ref=e377]: Atuar como interlocutor técnico com o escritório contábil externo, assegurando qualidade e tempestividade das entregas.
                    - emphasis [ref=e379]:
                      - strong [ref=e381]: Interface com Áreas de Negócio (Business Partner)
                    - list [ref=e383]:
                      - listitem [ref=e384]: Atuar como parceiro analítico dos gerentes operacionais, comerciais e administrativos, fornecendo visão financeira para suporte à decisão.
                      - listitem [ref=e385]: Participar de reuniões de resultado com gestores, provocando discussão sobre desempenho e planos de ação.
                      - listitem [ref=e386]: Apoiar análises específicas sob demanda (viabilidade de novos contratos, simulações de preço, análise de investimentos).
                    - emphasis [ref=e388]:
                      - strong [ref=e390]: Melhoria Contínua
                    - list [ref=e392]:
                      - listitem [ref=e393]: Aperfeiçoar processos, rotinas e indicadores de desempenho da Controladoria e FP&A, promovendo maior eficiência e integração com as operações.
                    - strong [ref=e395]: Requisitos
                    - emphasis [ref=e397]:
                      - strong [ref=e399]: "Formação e Experiência:"
                    - list [ref=e401]:
                      - listitem [ref=e402]: Formação superior completa em Contabilidade, Administração, Economia ou áreas afins.
                      - listitem [ref=e403]: Experiência sólida (mínimo 5 anos) em Controladoria, Custos ou FP&A, preferencialmente em empresas de porte médio com múltiplas unidades.
                      - listitem [ref=e404]: Vivência prática em planejamento orçamentário, análise de DRE por centro de custo/contrato e gestão gerencial.
                      - listitem [ref=e405]: Conhecimento em controles internos e compliance financeiro.
                    - strong [ref=e407]: Competências Técnicas
                    - list [ref=e409]:
                      - listitem [ref=e410]: Domínio avançado de Excel (modelagem, tabelas dinâmicas, Power Query).
                      - listitem [ref=e411]: Capacidade de trabalhar com dados extraídos de ERP próprio e construir visões gerenciais a partir de bases de dados diversas.
                      - listitem [ref=e412]: "Desejável: experiência com Power BI ou ferramentas equivalentes de BI."
                      - listitem [ref=e413]: "Desejável: experiência em ambiente industrial ou empresas com múltiplas unidades operacionais."
                      - listitem [ref=e414]: "Diferencial: experiência no setor de gestão de resíduos ou serviços ambientais."
                    - strong [ref=e416]: Competências Comportamentais
                    - list [ref=e418]:
                      - listitem [ref=e419]: Capacidade analítica e visão estratégica — saber transformar dados em recomendações.
                      - listitem [ref=e420]: Comunicação direta e objetiva — capacidade de interagir com todos os níveis, do operacional à Presidência, sem dependência de jargões.
                      - listitem [ref=e421]: Postura de parceiro, não de fiscal — capacidade de gerar confiança e colaboração com os gestores de área, atuando como business partner.
                      - listitem [ref=e422]: Organização e atenção a prazos — rigor no calendário de entregas gerenciais.
                      - listitem [ref=e423]: Autonomia e proatividade — perfil construtor, capaz de liderar iniciativas e trabalhar de forma colaborativa.
                      - listitem [ref=e424]: Postura ética, responsável e orientada a resultados, com foco em integridade e accountability.
                    - strong [ref=e426]: Informações Adicionais
                    - strong [ref=e428]: "Regime:"
                    - text: 100% presencial — Segunda a Sexta, 08h00 às 17h30.
                    - strong [ref=e430]: "Remuneração:"
