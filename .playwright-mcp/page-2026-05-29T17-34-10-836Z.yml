              - listitem [ref=e36]: Design and ship scalable in-product guidance and enablement experiences that help users understand what to do next- and why.
              - listitem [ref=e37]: Define what knowledge belongs in-product vs Academy vs Docs, and ensure consistency across surfaces.
              - listitem [ref=e38]: "Build measurable systems for improving adoption: instrumentation, funnel analysis, experimentation, and iteration."
              - listitem [ref=e39]: Partner with GTM (Sales, CS, Support) to reduce friction, align rollout expectations, and improve customer success outcomes.
