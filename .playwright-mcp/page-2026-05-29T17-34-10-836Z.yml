              - text: to lead product activation and adoption, with a strong focus on in-product enablement- designing guidance, onboarding, and embedded learning experiences that help customers realize value faster.
            - paragraph [ref=e31]: As Torq’s platform continues to expand in depth and capability, ensuring customers can easily discover, adopt, and continuously engage with our features is critical to retention and long-term growth.
