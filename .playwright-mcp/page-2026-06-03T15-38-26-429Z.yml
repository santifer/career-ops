      - generic [ref=e31]:
        - heading "About the Role" [level=3] [ref=e32]:
          - strong [ref=e33]: About the Role
        - paragraph [ref=e34]: "We are seeking a high-caliber Product Manager to lead the Documents Track, the financial engine of the Houzz Pro platform. This role is responsible for the mission-critical lifecycle of project financials: from Bid Management and Estimates to Purchase Orders, Change Orders, and Invoicing."
        - paragraph [ref=e35]: The ideal candidate is not just a product builder, but someone with a deep functional understanding of the US accounting and financial system. You will ensure that our Pros can manage their cash flow, job costing, and profitability with precision. This role is highly collaborative, requiring tight alignment with the Accounting, Reports & Payments teams, and synchronization with PMs across the organization to ensure a unified financial data model.
      - generic [ref=e37]:
        - heading "What You’ll Do" [level=3] [ref=e38]
        - list [ref=e41]:
          - listitem [ref=e42]:
            - emphasis [ref=e43]: Financial Product Strategy
            - text: ": Own the \"big picture\" for the document journey, defining the logic of how we move from lead to paid invoice. You will ensure the roadmap is a direct response to the high-stakes workflow needs of our professionals, translating their business challenges into a seamless, growth-oriented product strategy."
            - text: "Job Costing & Profitability: Build features that allow Pros to see the real-time impact of Change Orders and Purchase Orders on their project’s bottom-line profitability."
          - listitem [ref=e44]:
            - emphasis [ref=e45]: Accounting Accuracy
            - text: ": Ensure all financial documents (Invoices, Credits, etc.) maintain a strict audit trail, meet US accounting standards, and reconcile perfectly with the Pro’s general ledger."
          - listitem [ref=e46]:
            - emphasis [ref=e47]: Cross-Functional Leadership
            - text: ": Partner with the Accounting and Reports team to define how document data powers financial insights. Collaborate with PMs across Houzz Pro to automate document generation across the project lifecycle."
          - listitem [ref=e48]:
            - emphasis [ref=e49]: Tax & Compliance
            - text: ": Navigate the complexities of US Sales Tax application within invoicing and ensure digital payment workflows comply with financial regulations."
          - listitem [ref=e50]:
            - emphasis [ref=e51]: Execution Excellence
            - text: ": Write crisp PRDs, manage the backlog, and lead sprint planning to deliver high-visibility features that directly impact Houzz Pro’s revenue and Pro retention."
          - listitem [ref=e52]:
            - emphasis [ref=e53]: Data-Driven Growth
            - text: ": Define and track \"North Star\" KPIs such as payment adoption, time-to-invoice, and financial data accuracy."
          - listitem [ref=e54]:
            - emphasis [ref=e55]: Customer & Market Insight
            - text: ": Engage directly with Pros and collaborate with the Product Marketing team to deeply understand their needs. You will synthesize these insights to define the best fit solutions that drive value and long term success for our pros."
          - listitem [ref=e56]:
            - emphasis [ref=e57]: Design & UX
            - text: ": Partner with Design to transform complex financial workflows into intuitive experiences. You’ll co-create solutions that balance rigorous accounting logic with a frictionless interface Pros love to use."
      - generic [ref=e59]:
        - heading "At a Minimum, We'd Like You To Have" [level=3] [ref=e60]
        - list [ref=e63]:
          - listitem [ref=e64]:
            - emphasis [ref=e65]: "Financial Domain Expertise:"
            - text: Strong competency in the requirements of the US accounting system is required. Previous experience in Fintech, Construction Finance, or B2B Financial SaaS (e.g., Invoicing, AP/AR, Payroll) is strongly desired.
          - listitem [ref=e66]:
            - emphasis [ref=e67]: Experience
            - text: ": 3 - 5 years of Product Management experience with significant ownership of complex B2B SaaS workflows."
          - listitem [ref=e68]:
            - emphasis [ref=e69]: Technical Literacy
            - text: ": Deep understanding of data modeling, identity resolution, and conflict handling to ensure financial data remains the \"single source of truth.\""
          - listitem [ref=e70]:
            - emphasis [ref=e71]: Collaborative Power
            - text: ": Proven track record of influencing heavily matrixed teams (Engineering, Design, Data, Sales, and Support) to align on complex product strategies."
          - listitem [ref=e72]:
            - emphasis [ref=e73]: Global Collaboration
            - text: ": Willingness to work flexible evening hours to collaborate effectively with global teams and meet directly with US and international customers."
          - listitem [ref=e74]:
            - emphasis [ref=e75]: Analytical Mindset
            - text: ": Proficiency in product analytics to optimize financial workflows and conversion funnels."
