        - heading "Senior Product Manager" [level=1] [ref=e51]
        - generic [ref=e53]: Tel Aviv
        - link "Apply for this position" [ref=e54] [cursor=pointer]:
          - /url: "#apply-form"
      - generic [ref=e57]:
        - generic [ref=e58]:
          - heading "Big Ideas. Real People." [level=3] [ref=e59]:
            - strong [ref=e60]: Big Ideas. Real People.
          - paragraph [ref=e61]: At Orca, in the right environment and with the right team, talent has no boundaries. This team spirit, together with our drive to always aim high, has quickly earned us unicorn status and turned us into a global cloud security innovation leader. So, if you’re ready to join an amazing team of people who inspire each other every day, now is the time to find your place in our pod.
          - heading "Highlights" [level=3] [ref=e62]:
            - strong [ref=e63]: Highlights
          - list [ref=e64]:
            - listitem [ref=e65]:
              - strong [ref=e66]: "High growth:"
              - text: In just seven years, we’ve reached milestones that take other companies a decade or more. We’ve doubled our employee count, tripled our customer count, and rapidly expanded our product capabilities.
            - listitem [ref=e67]:
              - strong [ref=e68]: "Disruptive innovation:"
              - text: Our founders saw that traditional security didn’t work for the cloud so they set out to carve a new path. We’re relentless pioneers who invented agentless technology and continue to be the most comprehensive and innovative cloud security company.
            - listitem [ref=e69]:
              - strong [ref=e70]: "Well-capitalized:"
              - text: With a valuation of $1.8 billion, Orca is a cybersecurity unicorn dominating the cloud security space. We’re backed by an impressive team of investors such as Capital G, ICONIQ, GGV, and SVCI, a syndicate of CISOs who invest their own money after conducting their due diligence.
            - listitem [ref=e71]:
              - strong [ref=e72]: "Respectful and transparent culture:"
              - text: Our executives pride themselves on being accessible to everyone and believe in sharing knowledge with the employees. Each employee has a place in shaping the future of our industry.
          - heading "About the role" [level=3] [ref=e73]:
            - strong [ref=e74]: About the role
          - paragraph [ref=e75]:
            - text: We’re looking for a Product Manager to lead Orca’s Attack Surface Management (ASM) product offerings – covering asset exposure, attack path analysis, and a dedicated API Security portfolio (API discovery, posture, and risk prevention/detection).
            - text: This is a high-impact role spanning cloud security, network exposure, identity and access, and application/API security. You’ll define the strategy for how Orca discovers internet-exposed and cloud-connected assets, prioritizes critical exposures, and maps attack paths to crown-jewel assets – so teams can focus on what’s actually exploitable and cut noise.
            - text: You’ll collaborate with engineering, design, research/analyst teams, sales engineering, and customer success to turn complex, noisy security signals into simple, actionable, and measurable outcomes for enterprise security teams.
          - paragraph [ref=e76]:
            - text: The role is based in Israel, working closely with a remote engineering team in the UK and reporting to an Israeli manager based in the US.
            - strong [ref=e77]: It requires a high level of independence, ownership, and initiative.
          - heading "On a typical day you’ll" [level=3] [ref=e78]:
            - strong [ref=e79]: On a typical day you’ll
          - heading "Product Strategy & Execution" [level=4] [ref=e80]:
            - strong [ref=e81]: Product Strategy & Execution
          - list [ref=e82]:
            - listitem [ref=e83]: Own the vision, strategy, and roadmap for Orca’s ASM, Exposure Management, and Attack Paths products – including continuous discovery and inventory across external and cloud attack surface
            - listitem [ref=e84]: Drive attack path analysis that connects exposure → lateral movement → crown-jewel impact, with “break-the-path” remediation guidance
            - listitem [ref=e85]: Own the API Security strategy – API discovery and inventory/ownership, auth posture (authn/authz), sensitive exposure signals, and risk prevention/detection
            - listitem [ref=e86]: "Establish and track success metrics: coverage, precision, adoption, time-to-triage/remediate, and measurable risk reduction"
            - listitem [ref=e87]: Identify and prioritize key initiatives across detection accuracy, automation, integrations, and enterprise readiness
          - heading "Collaboration & Delivery" [level=4] [ref=e88]:
            - strong [ref=e89]: Collaboration & Delivery
          - list [ref=e90]:
            - listitem [ref=e91]: Lead cross-functional execution with engineering (UK), security research and analyst, sales engineering, customer success, design, and marketing teams – to deliver best-in-class features on time.
            - listitem [ref=e92]: Translate technical and regulatory requirements into clear product specifications.
            - listitem [ref=e93]: Collaborate on go-to-market strategies, enablement materials, and field feedback loops to drive awareness and adoption of Attack Surface Management offerings.
          - heading "Customer & Market Engagement" [level=4] [ref=e94]:
            - strong [ref=e95]: Customer & Market Engagement
          - list [ref=e96]:
            - listitem [ref=e97]: Engage with CISOs, security architects, and exposure management owners to understand their biggest ASM challenges around exposure, attack paths and API Security.
            - listitem [ref=e98]: Stay ahead of trends in ASM, Exposure Management, CAASM/EASM, attack graph technologies, API security, and CNAPP ecosystems.
            - listitem [ref=e99]: Represent Orca as a thought leader in Exposure Management and Attack Path prioritization, working with customers, partners, and industry analysts.
          - heading "About you" [level=3] [ref=e100]:
            - strong [ref=e101]: About you
          - list [ref=e102]:
            - listitem [ref=e103]: 3+ years of relevant cybersecurity background, including security research, threat intelligence, offensive security or closely related roles
            - listitem [ref=e104]: 2+ years of product management experience in B2B SaaS (preferably cybersecurity) building products for enterprise customers
            - listitem [ref=e105]: Strong cloud security knowledge in at least one major cloud platform (AWS, Azure, or GCP), including networking, IAM, compute, and Kubernetes/serverless concepts
            - listitem [ref=e106]: Technical depth to partner with engineering and customer-facing teams and translate complex problems into clear requirements
            - listitem [ref=e107]: Ability to think with an attacker mindset and prioritize exposure and risk; offensive security experience is a strong advantage
            - listitem [ref=e108]: Experience working with large-scale security data, signal quality, false positives, and prioritization tradeoffs is a strong advantage
            - listitem [ref=e109]: Strong communication skills and comfort working cross-functionally across distributed teams
            - listitem [ref=e110]: Highly independent, proactive, and execution driven
            - listitem [ref=e111]: Fluent English (written and spoken)
