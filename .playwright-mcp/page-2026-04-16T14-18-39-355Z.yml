      - generic: "A EmpresaMultinacional no segmento industrial.Descrição da vaga Liderar a função financeira da América do Sul, assegurando governança, controles, conformidade e alinhamento com Finanças Globais;Responsável pelo fechamento mensal sob US GAAP e normas locais, garantindo qualidade, acuracidade e cumprimento de prazos;Assegurar a integridade dos books e a confiabilidade das demonstrações financeiras;Supervisionar obrigações fiscais, regulatórias e estatutárias da região;Coordenar auditorias internas e externas e manter a estrutura de controles internos (incluindo SOX, se aplicável);Implementar novas normas contábeis e políticas globais, assegurando conformidade técnica;Atuar como referência técnica em temas contábeis complexos;Garantir gestão financeira de Operações, Comercial e Supply Chain, com foco em controle de custos, rentabilidade e eficiência;Apoiar a liderança por meio de análises financeiras, identificando riscos e oportunidades;Conduzir revisões mensais e trimestrais de resultados;Atuar em integração com FP&A, Tax, RH e Global Finance Business Services, apoiando iniciativas de transformação e modelo de serviços compartilhados;Liderar melhorias de processos financeiros e otimização do ciclo de fechamento;Apoiar iniciativas de M&A (due diligence e integração contábil), quando aplicável;Desenvolver e estruturar a equipe financeira regional, garantindo alta performance;Atuar como principal interface entre América do Sul e Finanças Globais e participar do time global de Controladoria;Modelo de trabalho: Híbrido.Perfil desejado Graduação em Ciências Contábeis (obrigatório);Experiência consolidada como Controller ou líder sênior de Finanças;Vivência com governança, controles internos e auditoria;Experiência relevante em liderança de equipes estruturadas;Inglês avançado/ fluente (mandatório);Experiência em ambientes industriais, manufatura ou processos;Experiência com ERP."
