                    - heading "Senior Product Manager - Mass Payments" [level=2] [ref=f156e18]:
                      - strong [ref=f156e19]: Senior Product Manager - Mass Payments
                    - paragraph [ref=f156e20]: If you’re looking for a fast-paced, dynamic, get-stuff-done environment and want to lead a strategic product domain with real impact on millions of users, this is the role for you.
                    - paragraph [ref=f156e21]:
                      - text: We are looking for a
                      - strong [ref=f156e22]: Senior Product Manager to lead our Mass Payments domain
                      - text: ", owning key flows that help global businesses"
                      - strong [ref=f156e23]: pay at scale
                      - text: .
                    - heading "In this role, you will be responsible for:" [level=3] [ref=f156e24]:
                      - strong [ref=f156e25]: "In this role, you will be responsible for:"
                    - list [ref=f156e26]:
                      - listitem [ref=f156e27]: Leading the product strategy and roadmap for the Mass Payments domain.
                      - listitem [ref=f156e28]: Owning and evolving our supplier onboarding platform, which is used by millions of users every year.
                      - listitem [ref=f156e29]: Working directly with customers, Sales, CSMs, and Support teams to deeply understand needs, pain points, and business opportunities.
                      - listitem [ref=f156e30]: Translating complex customer and business requirements into clear product requirements, user flows, and execution plans.
                      - listitem [ref=f156e31]: Partnering closely with Engineering, Data, UX and other stakeholders to deliver high-quality solutions.
                      - listitem [ref=f156e32]: Leading major cross-functional initiatives from discovery through launch, adoption, and ongoing optimization.
                      - listitem [ref=f156e33]: Using data, customer feedback, and business insights to prioritize work and measure product success.
                    - heading "About you" [level=3] [ref=f156e34]:
                      - strong [ref=f156e35]: About you
                    - list [ref=f156e36]:
                      - listitem [ref=f156e37]: 5+ years of hands-on Product Management experience in B2B SaaS.
                      - listitem [ref=f156e38]: Proven track record of leading major product initiatives from concept to launch and measurable business impact.
                      - listitem [ref=f156e39]: Strong ability to work with customers, Sales, CSMs, Support, and other stakeholders to identify problems and drive alignment.
                      - listitem [ref=f156e40]: Experience working closely with Engineering with multiple dependencies and moving parts.
                      - listitem [ref=f156e41]: Strong product thinking, with the ability to simplify complex workflows and create intuitive, scalable user experiences.
                      - listitem [ref=f156e42]: Excellent communication, presentation, and stakeholder management skills.
                      - listitem [ref=f156e43]: High ownership, independence, and ability to execute under tight deadlines.
                      - listitem [ref=f156e44]: Fluent English, both written and verbal.
                    - paragraph [ref=f156e45]
                    - paragraph [ref=f156e46]:
                      - strong [ref=f156e47]: Why join Tipalti?
                    - paragraph [ref=f156e48]: Tipalti is the AI-powered platform for finance automation, elevating how finance teams operate in the global economy. We empower our customers to scale faster and smarter by removing the complexities of doing global business and accelerating their finance operations efficiency. Our platform provides a comprehensive suite of finance automation solutions designed for mid-market businesses across accounts payable, global payouts, procurement, employee expenses, corporate cards, supplier management, tax compliance, and treasury. Tipalti partners with leading financial institutions such as Citi, Wells Fargo, J.P. Morgan, and Visa, enabling over 5,000 global companies to efficiently and securely pay millions of suppliers and payees across 200+ countries and territories, in 120 currencies.
                    - paragraph [ref=f156e49]: At Tipalti, we pride ourselves on our collaborative culture, the quality of our product and the capabilities of our people. Tipaltians are passionate about the work they do, and keen to get the job done. Tipalti oﬀers competitive benefits, a flexible workplace, career coaching, and an environment where diverse individuals can thrive and make an impact. Our culture ensures everyone checks their egos at the door and stands ready to reach for success together.
                    - paragraph [ref=f156e50]: Founded in Israel in 2010, Tipalti is a global business headquartered in the San Francisco Bay Area (Foster City) with offices in Tel Aviv, Plano, Toronto, Vancouver, London, Amsterdam, Tbilisi and Medellin.
                    - paragraph [ref=f156e51]:
                      - strong [ref=f156e52]: "About Our Tel Aviv Offices:"
                    - paragraph [ref=f156e53]:
                      - strong [ref=f156e54]: Hybrid Work Model
                      - text: "- Tipalti offers a hybrid work model, with two days per week working from home and three days per week from our beautiful offices in North Tel Aviv."
                    - paragraph [ref=f156e55]:
                      - strong [ref=f156e56]: Shuttle Services
                      - text: "- Shuttle services are available from the nearest train station and across Tel Aviv to the office."
                    - paragraph [ref=f156e57]:
                      - strong [ref=f156e58]: Parking
                      - text: "- Parking is available for all employees."
                    - paragraph [ref=f156e59]:
                      - strong [ref=f156e60]: Snacks & Treats
                      - text: "- Enjoy a selection of snacks and treats available on every floor."
                    - paragraph [ref=f156e61]
                    - paragraph [ref=f156e62]: "#IL-hybrid"
                    - paragraph [ref=f156e63]
                  - generic [ref=f156e64]:
                    - paragraph [ref=f156e65]:
                      - strong [ref=f156e66]: Our Mission
                    - paragraph [ref=f156e67]: Our mission is to elevate how finance teams operate in the global economy. We empower our customers to scale faster and smarter by removing the complexities of doing global business and accelerating their finance operations efficiency. We are the AI-powered platform that automates finance.
                    - paragraph [ref=f156e68]: Tipalti is fueled by a commitment to our customers and a desire to build lasting connections. Our client portfolio includes high-velocity businesses such as Amazon Twitch, GoDaddy, Roku, WordPress.com, and ZipRecruiter. We work hard for our 99% customer retention rate which is built on trust, reliability and innovation. Tipalti means we handled it" - a mission to which we are constantly committed.
                    - paragraph [ref=f156e69]:
                      - strong [ref=f156e70]: Accommodations
                      - text: Tipalti champions inclusive teams, in which every voice counts. We are committed to recruiting diverse candidates with varied personal experiences and abilities. We welcome applications from candidates belonging to historically underrepresented or disadvantaged groups, and maintain an equitable Talent Acquisition process that is free from discrimination.
                    - paragraph [ref=f156e71]:
                      - text: As an equal opportunities employer, Tipalti complies with employment and human rights laws across the various jurisdictions in which we operate. Should you require reasonable adjustments or accommodations during the recruitment process, including access to alternate formats of materials, meeting spaces, or other accommodations that could better enable your full participation, please reach out to
                      - link "hr@tipalti.com" [ref=f156e72] [cursor=pointer]:
                        - /url: mailto:hr@tipalti.com
                      - text: for assistance.
                    - paragraph [ref=f156e73]:
                      - strong [ref=f156e74]: AI Use
                      - text: We may use artificial intelligence and automated systems (collectively "AI") to screen, assess, and select candidates during our recruitment process. This includes resume screening, skills assessment, and candidate matching. You have the right to request human review of any automated decision. For more information about how we collect and use personal data and information during recruitment, please refer to our
                      - link "Job Candidate Privacy Notice" [ref=f156e75] [cursor=pointer]:
                        - /url: https://tipalti.com/privacy/job-candidate-privacy-notice
                      - text: . For additional questions about our use of AI during our recruitment process, you can contact
                      - link "hr@tipalti.com" [ref=f156e76] [cursor=pointer]:
