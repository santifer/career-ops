              - paragraph [ref=e181]
              - paragraph [ref=e182]: EDUCACIÓN
              - paragraph [ref=e183]
              - list [ref=e184]:
                - listitem [ref=e185]: Licenciatura universitaria en Finanzas, Economía, Contabilidad, Administración de empresas, Ingeniería Industrial con énfasis en Finanzas, deseable Maestría
                - listitem [ref=e186]: Inglés avanzado, deseable portugués
              - paragraph [ref=e187]
              - paragraph [ref=e188]: EXPERIENCIA
              - paragraph [ref=e189]
              - list [ref=e190]:
                - listitem [ref=e191]: +5 años de experiencia como contralor en empresas de tamaño mediano a grande, con responsabilidad integral sobre procesos contables, financieros y de control.
                - listitem [ref=e192]: En principios contables y reporte financiero bajo US GAAP, IFRS e IAS, con capacidad para cumplir simultáneamente con requerimientos de reportes corporativos y normativas estatutarias locales en múltiples jurisdicciones.
                - listitem [ref=e193]: En controles internos, incluyendo su diseño, implementación y mejora continua, así como en entornos de manufactura y empresas comerciales.
                - listitem [ref=e194]: En costeo estándar, costeo promedio, materia fiscal y precios de transferencia, y gestión de transacciones intercompañía (materiales, servicios, regalías, honorarios de gestión), asegurando correcta contabilización y cumplimiento normativo.
                - listitem [ref=e195]: Asimismo, demuestra un buen entendimiento de los procesos de importación y exportación y su impacto financiero, contable y fiscal.
                - listitem [ref=e196]: Experiencia previa en gestión y liderazgo de equipos.
              - paragraph [ref=e197]
              - paragraph [ref=e198]: Conocimientos Adicionales
              - paragraph [ref=e199]
              - list [ref=e200]:
                - listitem [ref=e201]: Dominio de herramientas financieras y del paquete Microsoft Office, especialmente Excel y PowerPoint, aplicadas al análisis, presentación y toma de decisiones financieras.
                - listitem [ref=e202]: Experiencia en sistemas ERP, preferentemente Microsoft Dynamics D365, así como en herramientas de análisis financiero.
              - paragraph [ref=e203]: Contamos con paquete de compensación competitivo con el mercado.
