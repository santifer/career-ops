            - generic [ref=e135]:
              - paragraph [ref=e136]:
                - text: A Griffith Foods é a parceira cuidadosa e criativa de desenvolvimento de produtos, ajudando as empresas do setor alimentício a atender às necessidades dos consumidores em constante evolução, ao mesmo tempo em que preserva o planeta. Como uma empresa familiar fundada em 1919 e sediada em Alsip, Illinois, EUA, a Griffith Foods é conhecida pela verdadeira inovação colaborativa guiada pelo propósito de “Misturamos cuidado e criatividade para nutrir o mundo”. As capacidades de produtos da empresa variam desde temperos e marinadas até sistemas de empanamento e molhos, todos desenvolvidos para serem melhores para as pessoas e para o planeta. Para obter mais informações, acesse
                - link [ref=e296] [cursor=pointer]:
                  - /url: https://www.griffithfoods.com
                  - generic [ref=e140]: www.griffithfoods.com
                - text: .
              - paragraph [ref=e141]
              - paragraph [ref=e142]:
                - generic [ref=e143]: OBJETIVO GENERAL DEL PUESTO
              - paragraph [ref=e144]
              - paragraph [ref=e145]: Salvaguardar los activos y la liquidez del negocio, garantizando la correcta ejecución de las actividades contables en estricto cumplimiento de los requisitos legales y las políticas del grupo. Esto implica la gestión integral del ciclo de caja para asegurar la disponibilidad oportuna de fondos, el fortalecimiento continuo del entorno de control interno y el cumplimiento riguroso de todas las obligaciones legales, fiscales y de auditoría, así como de los plazos establecidos, en todas las entidades de la región.
              - paragraph [ref=e146]
              - paragraph [ref=e147]: Asimismo, el rol lidera y coordina los procesos contables regionales, la presentación de impuestos y estados financieros estatutarios, la supervisión de reportes financieros y la gestión de la auditoría externa. La posición interactúa estrechamente con Finanzas Corporativas y el Equipo de Liderazgo Regional, actuando como socio estratégico de las áreas de Recursos Humanos y Tecnología de la Información para apoyar la toma de decisiones, la gobernanza y la sostenibilidad financiera del negocio.
              - paragraph [ref=e148]
              - paragraph [ref=e149]:
                - generic [ref=e150]: RESPONSABILIDADES Y DEBERES
              - paragraph [ref=e151]
              - list [ref=e152]:
                - listitem [ref=e153]: Actuar como principal punto de contacto con el equipo de contraloría global.
                - listitem [ref=e154]: Asumir la responsabilidad total de los cierres mensuales y de fin de año, incluyendo la preparación y mantenimiento de la documentación de soporte correspondiente.
                - listitem [ref=e155]: Supervisar los estados financieros consolidados y estatutarios, así como los cálculos de impuestos corporativos de todas las entidades de la región.
                - listitem [ref=e156]: Ser dueño del balance general de todas las entidades regionales, asegurando su integridad y razonabilidad.
                - listitem [ref=e157]: Garantizar el cumplimiento de todos los requisitos legales, fiscales, regulatorios y estatutarios aplicables.
                - listitem [ref=e158]: Asegurar que las políticas de precios de transferencia estén correctamente implementadas y revisadas de forma periódica.
                - listitem [ref=e159]: Liderar y coordinar las auditorías externas a nivel regional.
                - listitem [ref=e160]: Asesorar a la compañía en temas legales y fiscales, en coordinación con asesoría externa cuando sea necesario.
                - listitem [ref=e161]: Mantener un entorno sólido y eficiente de control interno, soportado por constantes revisiones, segregación de funciones y principios de trazabilidad (audit trail). Garantizar el cumplimiento de GAAP, IFRS, políticas corporativas, así como la implementación, seguimiento y mejora continua de los controles internos.
                - listitem [ref=e162]: Supervisar y asegurar la correcta carga y reporte mensual de información financiera en la herramienta global de consolidación financiera (BPC).
                - listitem [ref=e163]: Proveer asesoría técnica contable y acompañamiento al equipo de Finanzas y Contabilidad, así como al negocio en general.
                - listitem [ref=e164]: "Establecer, gestionar y supervisar las operaciones financieras de los siguientes equipos:"
                - listitem [ref=e165]: Contabilidad General (GL), asegurando que los registros contables se mantengan de manera precisa, oportuna y eficiente, y que todas las cuentas de control estén correctamente conciliadas.
                - listitem [ref=e166]: Cuentas por Pagar, garantizando la aplicación de las políticas operativas acordadas y el cumplimiento de los plazos de pago.
                - listitem [ref=e167]: Cuentas por Cobrar, asegurando un control de crédito riguroso (procesos de cobranza, límites de crédito y condiciones de pago).
                - listitem [ref=e168]: Nómina, garantizando que todos los empleados reciban su pago de forma oportuna y precisa.
                - listitem [ref=e169]: Motivar, desarrollar y acompañar a los reportes directos, fomentando un alto desempeño y desarrollo profesional.
                - listitem [ref=e170]: Actuar como asesor financiero del equipo de liderazgo regional, proporcionando guía y recomendaciones para impulsar el desempeño financiero del negocio.
                - listitem [ref=e171]: Apoyar iniciativas estratégicas, tales como fusiones y adquisiciones, inversiones de capital y expansiones del negocio, aportando análisis financiero y asegurando una adecuada gobernanza.
              - paragraph [ref=e172]
              - paragraph [ref=e173]:
                - generic [ref=e174]: ALCANCE
              - paragraph [ref=e175]
