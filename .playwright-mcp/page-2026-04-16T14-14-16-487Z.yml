                  - heading [level=2] [ref=e781]: Full job description
                  - generic [ref=e783]:
                    - paragraph [ref=e784]: Driven by integrity and united by the people-and-pet bond, we find strong purpose in the work we do and an even greater joy in those we get to work alongside. Together, we harness the expertise of our long-standing tradition of excellence to embrace possibility and continuously push to do what's never been done before in pet care. Discover your purpose and fuel your passions when you bring your love of pets to a team that prides itself on the power of togetherness—We are Proudly Connected. Purely Driven.
                    - paragraph [ref=e785]:
                      - generic [ref=e786]: Position Summary
                    - paragraph [ref=e787]: As the Factory Controller for our Allentown (PA) site, you will serve as a strategic financial partner to the factory leadership team, ensuring robust internal controls and cost performance. You will lead all aspects of financial governance, including period-end close, compliance audits, and safeguarding of assets. This role drives performance management through cost analysis, variance reporting, and continuous improvement initiatives. You will oversee budgeting and forecasting processes, collaborate across departments to identify savings opportunities, and maintain accurate inventory and material data. As a leader, you will coach and develop the accounting team, champion digitalization of financial processes, and promote a culture of accountability and operational excellence.
                    - list [ref=e788]:
                      - listitem [ref=e789]: Coordinate with factory departments to complete all period-end close activities in a timely fashion based on factory and corporate deadlines
                      - listitem [ref=e790]: Ensure adherence to all required internal controls including policies, procedures, reporting and safeguarding of assets in accordance with Nestlé Continuous Excellence and accounting standards
                    - list [ref=e791]:
                      - listitem [ref=e792]: Lead timely, accurate and strategic development and oversight of the annual budget
                      - listitem [ref=e793]: Collaborate with department managers and corporate partners to manage budgets, track and analyze costs, and identify savings initiatives
                      - listitem [ref=e794]: Support factory leadership in driving operational efficiency and optimizing resource allocation
                      - listitem [ref=e795]: Deliver direction to the factory accounting team to achieve department objectives and provide ongoing coaching and training opportunities for professional growth and development
                    - paragraph [ref=e796]:
                      - generic [ref=e797]: REQUIREMENTS
                    - list [ref=e798]:
                      - listitem [ref=e799]: Bachelor’s degree in Accounting, Finance, Business or related field
                      - listitem [ref=e800]: 4+ years of experience working with general accounting, cost accounting, internal controls, compliance management, budgeting and variance analysis in a manufacturing, industrial, warehouse, military or related environment
                      - listitem [ref=e801]: 2+ years of people leadership experience
                    - paragraph [ref=e802]: The approximate pay range for this position is $120,000 - $154,000 per year. Please note that the pay range provided is a good faith estimate for the position at the time of posting. Final compensation may vary based on factors including but not limited to background, knowledge, skills, and abilities as well as geographic location of the position.
                    - paragraph [ref=e803]: Nestlé offers performance-based incentives and a competitive total rewards package, which includes a 401k with Company match, healthcare coverage and a broad range of other benefits. Incentives and/or benefit packages may vary depending on the position. Learn more at About Us | Nestlé Careers (nestlejobs.com).
                    - paragraph [ref=e804]: It is our business imperative to remain a very inclusive workplace. To our veterans and separated service members, you're at the forefront of our minds as we recruit top talent to join Nestlé. The skills you've gained while serving our country, such as flexibility, agility, and leadership, are much like the skills that will make you successful in this role. In addition, with our commitment to an inclusive work environment, we recognize the exceptional engagement and innovation displayed by individuals with disabilities. Nestlé seeks such skilled and qualified individuals to share our mission where you’ll join a cohort of others who have chosen to call Nestlé home.
                    - paragraph [ref=e805]: "The Nestlé Companies are equal employment opportunity employers. All applicants will receive consideration for employment without regard to race, color, religion, sex, sexual orientation, gender identity, national origin, disability, or veteran status or any other characteristic protected by applicable law. Prior to the next step in the recruiting process, we welcome you to inform us confidentially if you may require any special accommodations in order to participate fully in our recruitment experience. Contact us at accommodations@nestle.com or please dial 711 and provide this number to the operator: 1-800-321-6467."
                    - paragraph [ref=e806]: This position is not eligible for Visa Sponsorship.
                    - paragraph [ref=e807]: Review our applicant privacy notice before applying at https://www.nestlejobs.com/privacy.
                    - paragraph [ref=e808]: "Job Requisition: 383151"
