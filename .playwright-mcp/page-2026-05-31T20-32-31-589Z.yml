            - listitem [ref=e26]: Work closely with engineering and algorithm developers to fulfill product goals
            - listitem [ref=e27]: Turn strategic goals into focused, compelling product plans
            - listitem [ref=e28]: Create structure, focus, and momentum within fast-moving environments
            - listitem [ref=e29]: Actively engage with customers and internal stakeholders throughout the product development lifecycle
