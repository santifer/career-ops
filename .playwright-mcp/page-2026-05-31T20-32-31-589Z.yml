            - listitem [ref=e35]: Ownership mindset that drives accountability and empowers cross‑functional teams
            - listitem [ref=e36]: Hands-on experience collaborating with engineering and data-science teams on product development
            - listitem [ref=e37]: Familiarity with AI tools, workflows, and opportunities
            - listitem [ref=e38]: Comfortable with statistics, able to engage meaningfully with data‑science counterparts (advantage)
          - heading "About Us" [level=2] [ref=e39]
          - paragraph [ref=e40]: PhaseV (HQ in Boston, R&D in Tel Aviv) is a fast-moving startup redefining clinical trial design with a cloud-native, AI-first platform. Founded in 2023, we combine causal machine learning, adaptive trial design, and real-world data to deliver smarter, faster, and more efficient drug development.
          - paragraph [ref=e41]: Backed by a $50 million Series A, we’re enabling sponsors, biotechs, and CROs to uncover hidden insights, optimize trial scenarios in real time, and accelerate the path from molecule to medicine.
