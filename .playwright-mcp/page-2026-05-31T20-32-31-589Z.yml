            - strong [ref=e21]: Product Manager
            - text: to join our Tel Aviv team. In this role, you'll tackle the thrilling challenge of building an intuitive, efficient platform that redefines how clinical trials are designed and conducted, leveraging AI and innovation to transform drug development. You'll collaborate closely with our engineering, data science, algorithm research, and clinical teams to create and refine a state‑of‑the‑art trials platform. This is a rare opportunity to make a tangible impact on how new therapies reach patients and to revolutionize healthcare delivery.
