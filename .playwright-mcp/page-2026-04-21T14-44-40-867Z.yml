                  - heading "Sobre a vaga" [level=2] [ref=e198]
                  - paragraph [ref=e365]:
                    - text: Griffith Foods is the caring, creative product development partner helping food companies meet the evolving needs of consumers while sustaining the planet. As a family business founded in 1919 and headquartered in Alsip, Illinois USA, Griffith Foods is known for true, collaborative innovation guided by their Purpose of “We Blend Care and Creativity to Nourish the World”. The company’s product capabilities range from seasonings and marinades to coating systems and sauces that are better for people and better for the planet. For more information, visit
                    - link "www.griffithfoods.com" [ref=e366] [cursor=pointer]:
                      - /url: https://www.griffithfoods.com
                    - text: .
                    - strong [ref=e368]: OBJETIVO GENERAL DEL PUESTO
                    - text: Salvaguardar los activos y la liquidez del negocio, garantizando la correcta ejecución de las actividades contables en estricto cumplimiento de los requisitos legales y las políticas del grupo. Esto implica la gestión integral del ciclo de caja para asegurar la disponibilidad oportuna de fondos, el fortalecimiento continuo del entorno de control interno y el cumplimiento riguroso de todas las obligaciones legales, fiscales y de auditoría, así como de los plazos establecidos, en todas las entidades de la región.
                    - text: Asimismo, el rol lidera y coordina los procesos contables regionales, la presentación de impuestos y estados financieros estatutarios, la supervisión de reportes financieros y la gestión de la auditoría externa. La posición interactúa estrechamente con Finanzas Corporativas y el Equipo de Liderazgo Regional, actuando como socio estratégico de las áreas de Recursos Humanos y Tecnología de la Información para apoyar la toma de decisiones, la gobernanza y la sostenibilidad financiera del negocio.
                    - strong [ref=e370]: RESPONSABILIDADES Y DEBERES
                    - list [ref=e372]:
                      - listitem [ref=e373]: Actuar como principal punto de contacto con el equipo de contraloría global.
                      - listitem [ref=e374]: Asumir la responsabilidad total de los cierres mensuales y de fin de año, incluyendo la preparación y mantenimiento de la documentación de soporte correspondiente.
                      - listitem [ref=e375]: Supervisar los estados financieros consolidados y estatutarios, así como los cálculos de impuestos corporativos de todas las entidades de la región.
                      - listitem [ref=e376]: Ser dueño del balance general de todas las entidades regionales, asegurando su integridad y razonabilidad.
                      - listitem [ref=e377]: Garantizar el cumplimiento de todos los requisitos legales, fiscales, regulatorios y estatutarios aplicables.
                      - listitem [ref=e378]: Asegurar que las políticas de precios de transferencia estén correctamente implementadas y revisadas de forma periódica.
                      - listitem [ref=e379]: Liderar y coordinar las auditorías externas a nivel regional.
                      - listitem [ref=e380]: Asesorar a la compañía en temas legales y fiscales, en coordinación con asesoría externa cuando sea necesario.
                      - listitem [ref=e381]: Mantener un entorno sólido y eficiente de control interno, soportado por constantes revisiones, segregación de funciones y principios de trazabilidad (audit trail). Garantizar el cumplimiento de GAAP, IFRS, políticas corporativas, así como la implementación, seguimiento y mejora continua de los controles internos.
                      - listitem [ref=e382]: Supervisar y asegurar la correcta carga y reporte mensual de información financiera en la herramienta global de consolidación financiera (BPC).
                      - listitem [ref=e383]: Proveer asesoría técnica contable y acompañamiento al equipo de Finanzas y Contabilidad, así como al negocio en general.
                      - listitem [ref=e384]: "Establecer, gestionar y supervisar las operaciones financieras de los siguientes equipos:"
                      - listitem [ref=e385]: Contabilidad General (GL), asegurando que los registros contables se mantengan de manera precisa, oportuna y eficiente, y que todas las cuentas de control estén correctamente conciliadas.
                      - listitem [ref=e386]: Cuentas por Pagar, garantizando la aplicación de las políticas operativas acordadas y el cumplimiento de los plazos de pago.
                      - listitem [ref=e387]: Cuentas por Cobrar, asegurando un control de crédito riguroso (procesos de cobranza, límites de crédito y condiciones de pago).
                      - listitem [ref=e388]: Nómina, garantizando que todos los empleados reciban su pago de forma oportuna y precisa.
                      - listitem [ref=e389]: Motivar, desarrollar y acompañar a los reportes directos, fomentando un alto desempeño y desarrollo profesional.
                      - listitem [ref=e390]: Actuar como asesor financiero del equipo de liderazgo regional, proporcionando guía y recomendaciones para impulsar el desempeño financiero del negocio.
                      - listitem [ref=e391]: Apoyar iniciativas estratégicas, tales como fusiones y adquisiciones, inversiones de capital y expansiones del negocio, aportando análisis financiero y asegurando una adecuada gobernanza.
                    - strong [ref=e393]: ALCANCE
                    - list [ref=e395]:
                      - listitem [ref=e396]: Responsable de la contabilidad, cuentas por cobrar, cuentas por pagar, impuestos, nómina de Centro y Sur America.
                    - strong [ref=e398]: CONOCIMIENTO Y EXPERIENCIA
                    - strong [ref=e400]: EDUCACIÓN
                    - list [ref=e402]:
                      - listitem [ref=e403]: Licenciatura universitaria en Finanzas, Economía, Contabilidad, Administración de empresas, Ingeniería Industrial con énfasis en Finanzas, deseable Maestría
                      - listitem [ref=e404]: Inglés avanzado, deseable portugués
                    - strong [ref=e406]: EXPERIENCIA
                    - list [ref=e408]:
                      - listitem [ref=e409]: +5 años de experiencia como contralor en empresas de tamaño mediano a grande, con responsabilidad integral sobre procesos contables, financieros y de control.
                      - listitem [ref=e410]: En principios contables y reporte financiero bajo US GAAP, IFRS e IAS, con capacidad para cumplir simultáneamente con requerimientos de reportes corporativos y normativas estatutarias locales en múltiples jurisdicciones.
                      - listitem [ref=e411]: En controles internos, incluyendo su diseño, implementación y mejora continua, así como en entornos de manufactura y empresas comerciales.
                      - listitem [ref=e412]: En costeo estándar, costeo promedio, materia fiscal y precios de transferencia, y gestión de transacciones intercompañía (materiales, servicios, regalías, honorarios de gestión), asegurando correcta contabilización y cumplimiento normativo.
                      - listitem [ref=e413]: Asimismo, demuestra un buen entendimiento de los procesos de importación y exportación y su impacto financiero, contable y fiscal.
                      - listitem [ref=e414]: Experiencia previa en gestión y liderazgo de equipos.
                    - strong [ref=e416]: Conocimientos Adicionales
                    - list [ref=e418]:
                      - listitem [ref=e419]: Dominio de herramientas financieras y del paquete Microsoft Office, especialmente Excel y PowerPoint, aplicadas al análisis, presentación y toma de decisiones financieras.
                      - listitem [ref=e420]: Experiencia en sistemas ERP, preferentemente Microsoft Dynamics D365, así como en herramientas de análisis financiero.
                    - text: Contamos con paquete de compensación competitivo con el mercado.
