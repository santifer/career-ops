                  - generic [ref=e773]:
                    - text: OT-Morpho é agora IDEMIA, líder mundial em Identidade Aumentada, com a ambição de capacitar os cidadãos e consumidores a interagir, pagar, conectar, comutar, viajar e até mesmo votar de maneiras que agora são possíveis em um mundo conectado.
                    - text: Proteger nossa identidade se tornou uma missão essencial no mundo em que vivemos atualmente. Ao defender a Identidade Aumentada, reinventamos a forma como pensamos, produzimos, usamos e protegemos esse ativo, seja para pessoas ou para objetos. Garantimos a privacidade e confiança, além de transações seguras, autenticadas e verificáveis para clientes internacionais dos setores financeiros, de telecomunicações, de identidade, de segurança pública e de IOT.
                    - text: A OT (Oberthur Technologies) e a Safran Identity & Security (Morpho) uniram forças para formar a IDEMIA. Com cerca de US$ 3 bilhões em receitas e 13 mil funcionários no mundo inteiro, a IDEMIA serve a clientes em 180 países.
