                      - listitem [ref=e1088]: Life Mart- Employee Discounts
                      - listitem [ref=e1089]: Employee Wellness Events & Team Challenges
                      - listitem [ref=e1090]: Local Gym Membership Discounts
                    - paragraph [ref=e1091]: "Compensation:"
                    - list [ref=e1092]:
                      - listitem [ref=e1093]: "Salaried/Exempt: Starting at $125,000 annually, increases depending on experience"
                      - listitem [ref=e1094]: "Bilingual Differential: Additionally, we offer $0.75 per hour as compensation for bilingual proficiency in both English and Spanish."
