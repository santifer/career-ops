                  - heading [level=2] [ref=e941]: Full job description
                  - generic [ref=e943]:
                    - paragraph [ref=e944]: At One Community Health (OCH), we're redefining the way healthcare is delivered. As a forward-thinking Federally Qualified Health Center (FQHC) located in the picturesque Columbia River Gorge, OCH is at the forefront of innovation and evidence-based practices to provide comprehensive, patient-centered care through an integrated health care model. Our mission goes beyond treating illness; we're committed to empowering individuals to take control of their well-being through education, prevention, and early intervention. If you're looking to be part of a dynamic team that's shaping the future of healthcare, OCH offers a supportive environment where your ideas are valued, and your contributions make a real difference in the lives of others.
                    - paragraph [ref=e945]: We are seeking a dedicated and experienced Controller to join our finance team. The successful candidate will perform a variety of intermediate accounting and fiscal record keeping activities. Complete tasks necessary to assure organizational compliance with generally accepted accounting principles for non-profit organizations including processing of accounts payable, accurate and timely processing of bi-weekly payroll, reconciliation of financial institution accounts, maintenance of financial records, and other projects as needed. This position is full-time and qualifies for hybrid-remote work after an in-office training period. Required onsite workdays will be at our clinic in Hood River, Oregon.
                    - paragraph [ref=e946]: "Key Responsibilities:"
                    - list [ref=e947]:
                      - listitem [ref=e948]:
                        - paragraph [ref=e949]: Embrace the philosophy, mission, and values of OCH.
                      - listitem [ref=e950]:
                        - paragraph [ref=e951]: Adhere to the guidelines and procedures of OCH.
                      - listitem [ref=e952]:
                        - paragraph [ref=e953]: Oversee all accounting operations including general ledger, accounts payable/receivable, payroll, and grants management.
                      - listitem [ref=e954]:
                        - paragraph [ref=e955]: Prepare accurate and timely monthly, quarterly, and annual financial statements in accordance with GAAP and nonprofit standards.
                      - listitem [ref=e956]:
                        - paragraph [ref=e957]: Monitor and analyze financial performance against the budget.
                      - listitem [ref=e958]:
                        - paragraph [ref=e959]: Lead the annual budget development process in coordination with department heads and the CFO/CEO.
                      - listitem [ref=e960]:
                        - paragraph [ref=e961]: Prepare cash flow forecasts and long-term financial planning reports.
                      - listitem [ref=e962]:
                        - paragraph [ref=e963]: Support scenario planning and projections based on funding and operational changes.
                      - listitem [ref=e964]:
                        - paragraph [ref=e965]: Ensure proper accounting and tracking of federal, state, and private grants, especially HRSA grants.
                      - listitem [ref=e966]:
                        - paragraph [ref=e967]: Monitor compliance with grant terms and conditions, including allowable costs and reporting requirements.
                      - listitem [ref=e968]:
                        - paragraph [ref=e969]: Coordinate with program teams to ensure timely and accurate grant reporting.
                      - listitem [ref=e970]:
                        - paragraph [ref=e971]: Coordinate the annual financial audit and Single Audit (OMB Uniform Guidance).
                      - listitem [ref=e972]:
                        - paragraph [ref=e973]: Maintain and improve internal controls to safeguard assets and ensure regulatory compliance.
                      - listitem [ref=e974]:
                        - paragraph [ref=e975]: Respond to audit inquiries and implement recommendations.
                      - listitem [ref=e976]:
                        - paragraph [ref=e977]: Develop, maintain, and enforce financial policies and procedures, ensuring alignment with best practices and FQHC requirements.
                      - listitem [ref=e978]:
                        - paragraph [ref=e979]: Provide training and guidance to staff on financial protocols.
                      - listitem [ref=e980]:
                        - paragraph [ref=e981]: Ensure compliance with IRS 990 filing, HRSA regulations, UDS reporting, and other federal/state/local financial reporting requirements.
                      - listitem [ref=e982]:
                        - paragraph [ref=e983]: Oversee Medicaid/Medicare cost reports,
                      - listitem [ref=e984]:
                        - paragraph [ref=e985]: Supervise accounting staff and ensure effective workflow and professional development.
                      - listitem [ref=e986]:
                        - paragraph [ref=e987]: Work closely with the CFO, executive team, and Board of Directors (especially the Finance Committee) to provide financial insights and support strategic planning.
                      - listitem [ref=e988]:
                        - paragraph [ref=e989]: Oversee the maintenance and optimization of accounting software (MIP)
                      - listitem [ref=e990]:
                        - paragraph [ref=e991]: Ensure data integrity and streamline financial reporting processes.
                      - listitem [ref=e992]:
                        - paragraph [ref=e993]: Perform other job-related duties as needed and/or assigned.
                    - paragraph [ref=e994]: "Qualifications:"
                    - list [ref=e995]:
                      - listitem [ref=e996]:
                        - paragraph [ref=e997]: "Knowledge of finance and accounting processes and practices, including: period end close, financial consolidations, budgeting, forecasting, management reporting and financial analysis."
                      - listitem [ref=e998]:
                        - paragraph [ref=e999]: Knowledge of Wage and Hour compliance and proactive approach to staying current with payroll and tax compliance and best practices.
                      - listitem [ref=e1000]:
                        - paragraph [ref=e1001]: Able to coordinate the work of others over whom one has no direct authority, gaining cooperation and consensus through team-based approach;
                      - listitem [ref=e1002]:
                        - paragraph [ref=e1003]: Able to prioritize and organize work according to multiple and, at times, competing projects and timelines
                      - listitem [ref=e1004]:
                        - paragraph [ref=e1005]: Able to meet timelines for team and organizational goals safely and with high level of quality.
                      - listitem [ref=e1006]:
                        - paragraph [ref=e1007]: Maintain a high degree of professionalism and confidentiality.
                      - listitem [ref=e1008]:
                        - paragraph [ref=e1009]: Strong written and oral communication skills
                      - listitem [ref=e1010]:
                        - paragraph [ref=e1011]: Successful relationship management skills involving multidisciplinary teams in a diverse, multicultural environment.
                      - listitem [ref=e1012]:
                        - paragraph [ref=e1013]: Able to use initiative and good judgment to resolve problems and challenges
                      - listitem [ref=e1014]:
                        - paragraph [ref=e1015]: Able to work effectively in an operation that expects and promotes teamwork and have demonstrated ability to work with ambiguity.
                      - listitem [ref=e1016]:
                        - paragraph [ref=e1017]: Able to inspire trust and confidence, and communicate effectively with internal and external audiences
                      - listitem [ref=e1018]:
                        - paragraph [ref=e1019]: "High level computer skills, including use of Microsoft Office applications: Word, Excel, Outlook, and other systems"
                      - listitem [ref=e1020]:
                        - paragraph [ref=e1021]: Ability to communicate effectively, verbally and in writing.
                      - listitem [ref=e1022]:
                        - paragraph [ref=e1023]: Ability to learn rapidly absorb and follow a wide range of business rules and workflows.
                      - listitem [ref=e1024]:
                        - paragraph [ref=e1025]: Demonstrate positive and effective interpersonal, analytical, and problem-solving skills.
                      - listitem [ref=e1026]:
                        - paragraph [ref=e1027]: Able to work effectively with a diverse workforce in a multicultural environment.
                      - listitem [ref=e1028]:
                        - paragraph [ref=e1029]: Strong computer skills, including experience with the use of Microsoft office applications. Word, Excel, Outlook, multi-phone live. And other systems and office machines.
                      - listitem [ref=e1030]:
                        - paragraph [ref=e1031]: Ability to organize, prioritize and coordinate multiple activities/tasks.
                      - listitem [ref=e1032]:
                        - paragraph [ref=e1033]: Ability to work in a team environment to work independently and be self-directed.
                      - listitem [ref=e1034]:
                        - paragraph [ref=e1035]: Able to use initiative, good research, good judgement, and resolution skills in completing tasks and responsibilities, resolving technical challenges.
                      - listitem [ref=e1036]:
                        - paragraph [ref=e1037]: Able to work with a high initiative, energy and effectiveness in a fast-paced environment reacting and remaining calm and effective in high pressure or urgent situations.
                      - listitem [ref=e1038]:
                        - paragraph [ref=e1039]: Able to produce work in high quantity and quality meeting timelines.
                      - listitem [ref=e1040]:
                        - paragraph [ref=e1041]: Understands HIPAA and privacy laws and other applicable regulations.
                      - listitem [ref=e1042]:
                        - paragraph [ref=e1043]: Occasionally working hours which may include Saturdays, evening, or extended hours.
                      - listitem [ref=e1044]:
                        - paragraph [ref=e1045]: Ability and willingness to work in a dynamic and changing community health care environment.
                      - listitem [ref=e1046]:
                        - paragraph [ref=e1047]: Able to travel to OCH multi health centers when requested, must have a valid driver’s license.
                      - listitem [ref=e1048]:
                        - paragraph [ref=e1049]: Identify learning needs and goals and design a plan to meet them.
                      - listitem [ref=e1050]:
                        - paragraph [ref=e1051]: Perform other job-related duties as needed and/or assigned.
                    - paragraph [ref=e1052]: Education, License, and Certification
                    - list [ref=e1053]:
                      - listitem [ref=e1054]:
                        - paragraph [ref=e1055]: Bachelor’s degree in Accounting, Finance, or a related field required
                      - listitem [ref=e1056]:
                        - paragraph [ref=e1057]: Certified Public Accountant (CPA) or Master’s degree in Accounting, Finance, or Business Administration preferred
                      - listitem [ref=e1058]:
                        - paragraph [ref=e1059]: Knowledge of nonprofit accounting standards (FASB, GAAP) and federal grant compliance (e.g., OMB Uniform Guidance) is strongly desired
                    - paragraph [ref=e1060]: "Experience:"
                    - list [ref=e1061]:
                      - listitem [ref=e1062]:
                        - paragraph [ref=e1063]: Minimum of 5–7 years of progressive accounting experience, preferably in a non-profit or healthcare setting At least 2–3 years in a supervisory or leadership role in finance or accounting
                      - listitem [ref=e1064]:
                        - paragraph [ref=e1065]: Strong experience with non-profit accounting standards, including fund accounting, restricted/unrestricted funds, and grant management
                      - listitem [ref=e1066]:
                        - paragraph [ref=e1067]: Hands-on experience with federal and state grant compliance (e.g., HRSA, OMB Uniform Guidance, Single Audit) Proficiency in accounting software (e.g., MIP Fund Accounting, QuickBooks, Sage Intacct, or similar) and Microsoft Excel Experience with bi-weekly payroll processing and payroll tax compliance
                      - listitem [ref=e1068]:
                        - paragraph [ref=e1069]: Demonstrated ability to prepare and interpret financial statements, manage budgets, and conduct bank reconciliations Experience supporting or leading annual audits, including the Single Audit
                    - paragraph [ref=e1070]: "Preferred:"
                    - list [ref=e1071]:
                      - listitem [ref=e1072]: Bilingual (Spanish/English).
                      - listitem [ref=e1073]: Understand and work with HRSA requirements and expectations.
                      - listitem [ref=e1074]: Advance Excel skills.
                      - listitem [ref=e1075]: MIP accounting software experience.
                      - listitem [ref=e1076]: ADP Payroll Processing experience.
                      - listitem [ref=e1077]: Knowledge of nonprofit accounting standards (FASB, GAAP) and federal grant compliance (e.g., OMB Uniform Guidance).
                      - listitem [ref=e1078]: Certified Public Accountant (CPA) or Master’s degree in Accounting, Finance, or Business Administration.
                    - paragraph [ref=e1079]: "Benefits:"
                    - list [ref=e1080]:
                      - listitem [ref=e1081]: Medical, Dental & Vision Insurance
                      - listitem [ref=e1082]: Life, Long-Term Disability, Accident, & Critical Illness Insurance
                      - listitem [ref=e1083]: Empower Retirement 401k
                      - listitem [ref=e1084]:
                        - text: 200 hours of Paid Time Off (PTO)
                        - list [ref=e1085]:
