                  - paragraph [ref=e82]:
                    - text: "Job Title: Business Controller Associate Director LATAM"
                    - text: "Location: São Paulo - Brazil"
                  - paragraph [ref=e83]: The Business Controller Associate Director LATAM, is a key finance leader and trusted business partner to the regional leadership team. This role is responsible for driving financial performance, supporting strategic decision-making, and ensuring strong financial discipline across the region.
                  - paragraph [ref=e84]:
                    - strong [ref=e85]: "Key Responsibilities:"
                  - list [ref=e86]:
                    - listitem [ref=e87]: Act as a strategic partner to LATAM leadership, driving financial performance and supporting business decision-making.
                    - listitem [ref=e88]: Lead financial planning (budget, forecast, and long-term planning) and provide insights for decision-making.
                    - listitem [ref=e89]: Monitor KPIs and business performance, identifying risks and opportunities and ensuring corrective actions.
                    - listitem [ref=e90]: Support strategic projects and investments (CAPEX), including financial modeling and return evaluation.
                    - listitem [ref=e91]: Ensure compliance, governance, and continuous improvement of financial processes and reporting.
                    - listitem [ref=e92]: Manage costs and lead a high-performing finance team, developing talent and driving efficiency.
                  - paragraph [ref=e93]:
                    - strong [ref=e94]: "We Offer:"
                  - list [ref=e95]:
                    - listitem [ref=e96]: A rich history and a promising future of bold scientific innovation and passionate creation with our customers;
                    - listitem [ref=e97]: A place to grow, encouraging and supporting curiosity and an open mindset;
                    - listitem [ref=e98]: A culture that prioritizes safety and well-being, both physical and mental;
                    - listitem [ref=e99]: The opportunity to work for a company where sustainability is much more than a statement and is at the core of our strategy and purpose;
                    - listitem [ref=e100]: A flexible work environment that empowers people to take ownership of their work and results;
                    - listitem [ref=e101]: Barrier-free communities within our organization, where every employee is equally valued and respected—regardless of background, beliefs, or identity."
                  - paragraph [ref=e102]:
                    - strong [ref=e103]: "You Bring:"
                  - list [ref=e104]:
                    - listitem [ref=e105]: Bachelor’s degree in Finance, or a related field, with professional certifications preferred (CMA, CPA, ACCA).
                    - listitem [ref=e106]: Experience in controlling within multinational or complex environments.
                    - listitem [ref=e107]: Strong background in commercial finance, partnering closely with business leaders.
                    - listitem [ref=e108]: Solid expertise in financial planning, budgeting, forecasting, and performance analysis.
                    - listitem [ref=e109]: Hands-on profile with strong business acumen, analytical skills, and execution focus.
                    - listitem [ref=e110]: Fluent in English and Spanish
                  - paragraph [ref=e111]:
                    - strong [ref=e112]: Commitment to Equal Opportunity
                  - paragraph [ref=e113]: "dsm-firmenich is fully dedicated to inclusion, because when people feel engaged and empowered, their creativity and innovation drive unprecedented progress. Our goal is to build a workplace where opportunities are truly equal, so that everyone can thrive. We do not discriminate: there is a place for everyone at dsm-firmenich."
                  - paragraph [ref=e114]: dsm-firmenich is an equal opportunity and affirmative action employer. Our workforce is as diverse as our customers. For us, this includes a commitment to ensuring equal employment opportunities for all candidates and employees. Employment decisions are based on job-related factors, regardless of race, color, religion, sex, sexual orientation, gender identity, age, nationality, disability, marital status, genetic information, protected veteran status, or any other status protected by law.
                  - paragraph [ref=e115]: We are committed to providing reasonable support for individuals with disabilities throughout our recruitment process. If you need assistance and feel comfortable sharing this, please let us know."
                  - paragraph [ref=e116]:
                    - strong [ref=e117]: About dsm-firmenich
                  - paragraph [ref=e118]: As innovators in nutrition, health, and beauty, dsm-firmenich reinvents, manufactures, and combines essential nutrients, flavors, and fragrances to support the growth of the world’s population. With our broad portfolio of solutions, based on natural and renewable ingredients and backed by strong scientific and technological expertise, we work to create what is essential for life, desirable for consumers, and more sustainable for the planet.
                  - paragraph [ref=e119]: dsm-firmenich is a Swiss-Dutch company listed on Euronext Amsterdam, with operations in nearly 60 countries and revenues exceeding €12 billion. With a diverse global team of nearly 30,000 employees, we bring progress to life™ every day, everywhere, for billions of people."
