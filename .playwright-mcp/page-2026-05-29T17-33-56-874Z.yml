          - generic [ref=e21]:
            - paragraph [ref=e22]: Skeletons, lasers, tattoo buses — the Torq brand grabs attention like nothing else in cybersecurity. And we're growing like crazy, backed by Series D funding, 200% employee growth, and 300% revenue growth. Fueling Torq's momentum is our game-changing AI SOC platform, backed by a team and culture that makes Torq one of Forbes' Best Startup Employers in America, and a Business Insider 'startup to bet your career on'.
            - paragraph [ref=e23]: Life at Torq is all gas, no brakes. We're a team of relentless, collaborative go-getters pushing the boundaries of what's possible for security automation. Every role is an essential driver of Torq's success as the AI-native autonomous SecOps platform of choice for security teams across the Fortune 500.
          - generic [ref=e28]:
            - paragraph [ref=e29]:
              - text: We are looking for an experienced
              - strong [ref=e30]: Senior
              - strong [ref=e31]: Product Manager
              - text: to own Torq's Runtime domain - the core engine that powers millions of workflow executions for security teams worldwide. We seek an experienced, curious, self-motivated product manager to join our team and lead our events pipeline, orchestration, and execution infrastructure.
            - paragraph [ref=e32]:
              - strong [ref=e33]: What You’ll Be Doing
            - list [ref=e34]:
              - listitem [ref=e35]: Become an expert in all runtime aspects - events pipeline, orchestration, execution, Runners, and the infrastructure that powers them
              - listitem [ref=e36]: Own the end-to-end Runner experience - deployment models, resource management, connectivity, and troubleshooting
              - listitem [ref=e37]: Perform customer research and technical deep-dives to understand scale requirements, reliability needs, and pain points
              - listitem [ref=e38]: Analyze customer escalations to identify patterns and translate them into actionable engineering requirements
              - listitem [ref=e39]: Make critical decisions with respect to architectural trade-offs, reliability, performance, and quality to meet business objectives
              - listitem [ref=e40]: Work closely with engineering to define, develop, and launch new runtime capabilities across our distributed execution layer
            - paragraph [ref=e41]: Our company and team spirit foster an environment that encourages taking initiative, being open to new ideas, and enjoying the ride!
            - paragraph [ref=e42]:
              - strong [ref=e43]: The Ideal Candidate
            - list [ref=e44]:
              - listitem [ref=e45]: 3-5 years of experience as a product manager on backend/infrastructure products, OR 2+ years in PM following a backend engineering role
              - listitem [ref=e46]: Hands-on experience with Kubernetes (EKS, GKE, or OpenShift) and container orchestration
              - listitem [ref=e47]: Cloud infrastructure fluency - comfortable with AWS and GCP compute, networking, and storage
              - listitem [ref=e48]: Experience with high-scale systems handling significant event throughput or distributed execution
              - listitem [ref=e49]: Data-driven, with the ability to ask the right questions
              - listitem [ref=e50]: Excellent interpersonal skills, able to drive teams & interfaces without direct authority
              - listitem [ref=e51]: Strong technical communication - can explain distributed systems to customers and translate their pain into specs
              - listitem [ref=e52]: Computer Science degree or equivalent technical background
            - paragraph [ref=e53]:
              - strong [ref=e54]: Nice to Have
            - list [ref=e55]:
              - listitem [ref=e56]: Experience with message-driven architectures (PubSub, Kafka)
              - listitem [ref=e57]: Familiarity with service-to-service communication
              - listitem [ref=e58]: Background in security, DevOps, or automation platforms
              - listitem [ref=e59]: Experience with hybrid deployments - cloud services connecting to customer-managed agents/runners
            - paragraph [ref=e60]: As an equal-opportunity employer, we are committed to a team defined and empowered by diversity. We consider qualified applicants without regard to race, religion, color, national origin, gender, sexual orientation, age, marital status, veteran status, or disability status.
            - paragraph [ref=e61]: We are waiting for you!
