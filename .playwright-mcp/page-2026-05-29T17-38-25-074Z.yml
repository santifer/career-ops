          - heading "Join Apiiro — Design, develop, and deliver secure software faster" [level=3] [ref=e22]:
            - strong [ref=e23]: Join Apiiro — Design, develop, and deliver secure software faster
          - paragraph [ref=e24]: Apiiro is a fast-growing startup at the forefront of the application security field. Our cutting-edge platform is designed to help development teams build secure software quickly, enabling them to move faster while managing risks. As pioneers in the app-sec space, we’re shaping the future of secure software development. If you're looking for an exciting opportunity to make a significant impact and grow with a passionate team, Apiiro is the place to be.
          - paragraph [ref=e25]
          - paragraph [ref=e26]:
            - strong [ref=e27]: The opportunity
          - paragraph [ref=e28]: "We are creating an entirely new market - Application Risk Management - by reinventing the Secure Development Lifecycle for agile and cloud-native development. Our message is resonating: we won the RSA Conference Innovation Sandbox Contest for the “Most Innovative Startup” and were also named a Gartner Cool Vendor in DevSecOps."
          - paragraph [ref=e29]: Reporting directly into the VP of Marketing, you will play a pivotal role in Apiiro’s marketing plans, from positioning and messaging to sales and partner enablement. The ideal candidate thrives at the cutting edge of creating customer-facing solutions, has a deep understanding of software development, security, and DevSecOps, is an articulate presenter, a strong writer, and is ready to be a key face of the company. This is a completely new role with the ability to create, manage, and execute the Product Marketing function.
          - paragraph [ref=e30]:
            - strong [ref=e31]: What You Will Do
          - list [ref=e32]:
            - listitem [ref=e33]: Develop and maintain positioning and messaging frameworks
            - listitem [ref=e34]: Research industry trends to proactively recommend messaging and content that will resonate with target audiences
            - listitem [ref=e35]: Create compelling assets to educate the market on risk-based application security and why it is essential for organizations of all types and sizes
            - listitem [ref=e36]: Analyze competitors and develop battle cards
            - listitem [ref=e37]: Understand the analyst landscape and helping to craft briefing materials and follow-up for them
            - listitem [ref=e38]: Lead product launches, from building the message to overseeing the development and rollout of new collateral
            - listitem [ref=e39]: Conduct regular conversations with our customers, prospects, and closed-lost deals to keep our pulse on the market
            - listitem [ref=e40]: Lead sales and partner enablement
            - listitem [ref=e41]: Work with cross-functional teams to develop persona-driven, high-performing content and content strategies to maximize conversion throughout the buyer journey
          - paragraph [ref=e42]:
            - strong [ref=e43]: What You’re About
          - list [ref=e44]:
            - listitem [ref=e45]: Enthusiastic about helping to build a game-changing company!
            - listitem [ref=e46]: Ability to develop compelling messaging and razor-sharp positioning
            - listitem [ref=e47]: Demonstrated ability to translate technical concepts into value-based messaging that resonates with both business and technical audiences
            - listitem [ref=e48]: Flexible, well-rounded, and with the ability to adapt to changing priorities
            - listitem [ref=e49]: 5+ years of experience in B2B security, preferably SaaS-based
            - listitem [ref=e50]: Excellent verbal and written communicator and creative thinker
          - paragraph [ref=e51]
