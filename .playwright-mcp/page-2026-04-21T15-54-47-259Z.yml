                  - paragraph [ref=e372]:
                    - text: "Job Title: Business Controller Associate Director LATAM"
                    - text: "Location: São Paulo - Brazil"
                    - text: The Business Controller Associate Director LATAM, is a key finance leader and trusted business partner to the regional leadership team. This role is responsible for driving financial performance, supporting strategic decision-making, and ensuring strong financial discipline across the region.
                    - strong [ref=e374]: Key Responsibilities
                    - list [ref=e376]:
                      - listitem [ref=e377]: Act as a strategic partner to LATAM leadership, driving financial performance and supporting business decision-making.
                      - listitem [ref=e378]: Lead financial planning (budget, forecast, and long-term planning) and provide insights for decision-making.
                      - listitem [ref=e379]: Monitor KPIs and business performance, identifying risks and opportunities and ensuring corrective actions.
                      - listitem [ref=e380]: Support strategic projects and investments (CAPEX), including financial modeling and return evaluation.
                      - listitem [ref=e381]: Ensure compliance, governance, and continuous improvement of financial processes and reporting.
                      - listitem [ref=e382]: Manage costs and lead a high-performing finance team, developing talent and driving efficiency.
                    - strong [ref=e384]: We Offer
                    - list [ref=e386]:
                      - listitem [ref=e387]: A rich history and a promising future of bold scientific innovation and passionate creation with our customers;
                      - listitem [ref=e388]: A place to grow, encouraging and supporting curiosity and an open mindset;
                      - listitem [ref=e389]: A culture that prioritizes safety and well-being, both physical and mental;
                      - listitem [ref=e390]: The opportunity to work for a company where sustainability is much more than a statement and is at the core of our strategy and purpose;
                      - listitem [ref=e391]: A flexible work environment that empowers people to take ownership of their work and results;
                      - listitem [ref=e392]: Barrier-free communities within our organization, where every employee is equally valued and respected—regardless of background, beliefs, or identity."
                    - strong [ref=e394]: You Bring
                    - list [ref=e396]:
                      - listitem [ref=e397]: Bachelor’s degree in Finance, or a related field, with professional certifications preferred (CMA, CPA, ACCA).
                      - listitem [ref=e398]: Experience in controlling within multinational or complex environments.
                      - listitem [ref=e399]: Strong background in commercial finance, partnering closely with business leaders.
                      - listitem [ref=e400]: Solid expertise in financial planning, budgeting, forecasting, and performance analysis.
                      - listitem [ref=e401]: Hands-on profile with strong business acumen, analytical skills, and execution focus.
                      - listitem [ref=e402]: Fluent in English and Spanish
                    - strong [ref=e404]: Commitment to Equal Opportunity
                    - text: "dsm-firmenich is fully dedicated to inclusion, because when people feel engaged and empowered, their creativity and innovation drive unprecedented progress. Our goal is to build a workplace where opportunities are truly equal, so that everyone can thrive. We do not discriminate: there is a place for everyone at dsm-firmenich."
                    - text: dsm-firmenich is an equal opportunity and affirmative action employer. Our workforce is as diverse as our customers. For us, this includes a commitment to ensuring equal employment opportunities for all candidates and employees. Employment decisions are based on job-related factors, regardless of race, color, religion, sex, sexual orientation, gender identity, age, nationality, disability, marital status, genetic information, protected veteran status, or any other status protected by law.
                    - text: We are committed to providing reasonable support for individuals with disabilities throughout our recruitment process. If you need assistance and feel comfortable sharing this, please let us know."
                    - strong [ref=e406]: About Dsm-firmenich
                    - text: As innovators in nutrition, health, and beauty, dsm-firmenich reinvents, manufactures, and combines essential nutrients, flavors, and fragrances to support the growth of the world’s population. With our broad portfolio of solutions, based on natural and renewable ingredients and backed by strong scientific and technological expertise, we work to create what is essential for life, desirable for consumers, and more sustainable for the planet.
                    - text: dsm-firmenich is a Swiss-Dutch company listed on Euronext Amsterdam, with operations in nearly 60 countries and revenues exceeding €12 billion. With a diverse global team of nearly 30,000 employees, we bring progress to life™ every day, everywhere, for billions of people."
