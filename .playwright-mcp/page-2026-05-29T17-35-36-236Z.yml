        - generic [ref=e52]:
          - generic [ref=e53]:
            - paragraph [ref=e54]: At JFrog, we’re reinventing DevSecOps to help the world’s greatest companies innovate. Our team of industry-leading software security experts are true pioneers, constantly pushing the boundaries with original research and technological innovation. JFrog is a special place with a unique combination of brilliance, spirit and just all-around great people. Thousands of customers, including the majority of the Fortune 100, trust JFrog to manage, accelerate, and secure their software delivery from code to production – a concept we call “liquid software”. Wouldn't it be amazing if you could join us on our journey?
            - paragraph [ref=e55]: JFrog Security is a cornerstone of our current product offering and long-term strategy. We are pushing the boundaries of Software Supply Chain Security by introducing new and exciting features to developers, DevOps, and application security professionals. As we navigate the new era of AI-driven threats and opportunities, we are integrating advanced AI/ML capabilities to stay ahead of the curve and ensure our customers' software remains secure and compliant. We’re looking for a tech-savvy Senior Product Manager to own the product throughout the product lifecycle, gathering and prioritizing product and customer requirements, defining the product strategy, and working closely with Engineering to deliver winning products with great user experience that customers love. The position also includes working with customers, Sales, Marketing, and Support to ensure revenue and customer satisfaction goals are met.
            - heading "As a Senior Product Manager at JFrog you will…" [level=5] [ref=e56]:
              - strong [ref=e57]: As a Senior Product Manager at JFrog you will…
            - list [ref=e58]:
              - listitem [ref=e59]: Own the full cycle of product development, including ideation, competitive analysis, client validation, discovery with R&D, spec writing, launching, and monitoring
              - listitem [ref=e60]: "Lead Enterprise Customer Relationships: Build strong relationships with our largest Enterprise customers, understand their complex security requirements and translate them into scalable product solutions"
              - listitem [ref=e61]: "Drive AI Transformation: Lead internal AI initiatives to optimize product workflows and leverage data-driven insights to enhance the JFrog Security offering"
              - listitem [ref=e62]: "Collaborate Cross-Functionally: Work alongside Product Analysts, UX/UI, Product Marketing and other functions to drive successful feature rollouts"
              - listitem [ref=e63]: "Build Strategic Trust: Get buy-in for the product vision across internal and external stakeholders through strong cross-team interactions"
              - listitem [ref=e64]: "Evidence-Based Innovation: Identify, design, and iterate on product decisions by leveraging data from customer usage, market research, and adoption metrics."
            - heading "To be a Senior Product Manager at JFrog you need…" [level=5] [ref=e65]:
              - strong [ref=e66]: To be a Senior Product Manager at JFrog you need…
            - list [ref=e67]:
              - listitem [ref=e68]:
                - strong [ref=e69]: 5+ years of experience
                - text: in E2E Product Management, preferably in B2B SaaS platforms.
              - listitem [ref=e70]:
                - strong [ref=e71]: "Strong Technical Background (Must):"
                - text: Proven ability to engage deeply with engineering teams on complex technical architectures and developer-centric products.
              - listitem [ref=e72]:
                - strong [ref=e73]: "Execution Excellence:"
                - text: Strong project management skills and experience writing detailed PRDs/User stories for engineering and QA teams
              - listitem [ref=e74]:
                - strong [ref=e75]: "Customer-Facing Experience:"
                - text: Experience working with users, buyers, and decision-makers in a global market
              - listitem [ref=e76]:
                - strong [ref=e77]: Communication
                - text: ": Excellent English and the ability to influence cross-functional teams without formal authority"
              - listitem [ref=e78]:
                - strong [ref=e79]: Engineering or Application Security background
                - text: – an advantage
            - heading "Advantages (Nice to have)" [level=3] [ref=e80]:
              - strong [ref=e81]: Advantages (Nice to have)
            - list [ref=e82]:
              - listitem [ref=e83]:
                - strong [ref=e84]: "AI & Data Proficiency:"
                - text: A solid understanding of AI/ML workflows and how to leverage data/AI to drive product value or internal efficiency
              - listitem [ref=e85]:
                - strong [ref=e86]: "Application Security (AppSec) Background:"
                - text: Prior experience in Security, Vulnerability Management, or DevSecOps
