                - paragraph [ref=e140]: Depending on the customs and laws of a specific country, Pfizer offers colleagues health and wellness programs that help them maintain and promote optimum health and wellness. These programs can include health and disability insurance, preventative health programs, medical screening, free or reduced-cost vaccinations, discounts on Pfizer products, and nutrition and fitness counseling.
