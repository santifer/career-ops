                  - paragraph [ref=e312]:
                    - text: Na Cimento Nacional, temos o propósito de sustentar o desenvolvimento da sociedade. Nosso cimento é símbolo de solidez e compromisso com o futuro. Aqui, além de se desenvolver profissionalmente, você terá a chance de contribuir para a construção de um futuro próspero para a empresa e para a sociedade. Na Cimento Nacional
                    - strong [ref=e314]: cuidamos das pessoas
                    - text: ", promovemos"
                    - strong [ref=e316]: respeito
                    - text: e
                    - strong [ref=e318]: abertura
                    - text: ", e incentivamos a"
                    - strong [ref=e320]: evolução contínua
                    - text: ". Seja um dos #TalentosCN!"
                    - strong [ref=e322]: Responsabilidades e atribuições
                    - list [ref=e324]:
                      - listitem [ref=e325]: Coordenar as atividades dos Analistas de Controle e Performance e Analista de Planejamento e Controle de Produção, realizando as avaliações anuais e realizando os feedbacks quando necessário;
                      - listitem [ref=e326]: Coordenar o orçamento anual e o forecast da Fábrica, interagindo com as áreas, consolidando dados e analisando informações, a fim de equilibrar as necessidades da Unidade e as diretrizes e estratégias estabelecidas pela Empresa, garantindo a entrega final.
                      - listitem [ref=e327]: Analisar o fechamento e análise mensal dos custos (fixos e variáveis) e dos indicadores chave de produção da Fábrica, revisando as variações entre orçado x realizado, a fim de identificar as causas e justificativas dos desvios, bem como, sugerir intervenções para a otimização dos custos e desempenho operacionais.
                      - listitem [ref=e328]: Garantir que as informações do apontamento e do boletim de produção da Fábrica estejam de acordo com os dados lançados no sistema e com o quê foi produzido, a fim de atuar em suas interfaces com o sistema e custeio e gestão dos KPI´s da Fábrica.
                      - listitem [ref=e329]: Avaliar e validar juntamente com o Gerente/Coordenador de Produção, o planejamento de produção, mensalmente, disponibilizando para a área área comercial o volume de produção, bem, como realizar alterações na programação, se necessário para atender as mudanças na demanda ou a disponibilidade de recursos
                      - listitem [ref=e330]: "Elaborar análises para a equipe de gestão da Fábrica, fornecendo insights sobre o desempenho financeiro e a performance técnica, recomendando ações para otimizar a utilização de recursos e melhorar a eficiência operacional:"
                      - listitem [ref=e331]: Realizar projeções e simulações de cenários, indicando aos gestores o impacto financeiro e de performance consequentes das alterações nos processos de fabricação e sugerindo alternativas mais viáveis e rentáveis para a Fábrica.
                      - listitem [ref=e332]: "Participar diretamente das ações que possibilitem a efetiva gestão e controle dos custos da Unidade, avaliando variações e identificando oportunidades que permitam o desenvolvimento de ações e/ou projetos, visando a redução e viabilização dos recursos da Fábrica:"
                      - listitem [ref=e333]: "Custo variável: simulações com base nas composições da farinha, matriz energética, cimentos, buscando redução de custos;"
                      - listitem [ref=e334]: "Custo fixo: acompanhamento matricial dos pacotes de gastos junto aos líderes das áreas. Provocar e garantir integração com as áreas chave da planta (PCM, Manutenção, Meio Ambiente, Produção, Segurança, etc) garantindo o controle dos custos fixos e correta gestão para evitar gastos desnecessários."
                      - listitem [ref=e335]: Identificar oportunidades de redução de custos e melhoria no desempenho operacional, propondo ações e boas práticas, a fim de otimizar a eficiência da Fábrica.
                      - listitem [ref=e336]: Consolidar as informações financeiras e de produção, por meio da apresentação de demonstrativos e análises críticas dos resultados da Fábrica, visando subsidiar os gestores de informações relevantes para suportar à tomada de decisão.
                      - listitem [ref=e337]: Participar das reuniões diárias da operação com o objetivo de interação com os principais acontecimentos e desafios da unidade, visto que os indicadores de performance e os custos são consequência do que acontece na unidade.
                      - listitem [ref=e338]: Acompanhar o planejamento das paradas de fornos e moinhos, provocando fóruns de acompanhamento dos custos com as lideranças de manutenção e produção, visando o correto controle do orçado vs realizado.
                      - listitem [ref=e339]: Acompanhar os principais investimentos (CAPEX) da planta junto ao ponto focal de Projetos/Engenharia da unidade, e junto ao corporativo na avaliação do spending.
                      - listitem [ref=e340]: Garantir a acuracidade da informação dos níveis de itens de almoxarifado, estoques de matérias-primas/combustíveis e produtos acabados, identificando as causas de desvio e elaborando planos de ação de correção, visando assegurar a correta apuração das diferenças do inventário cíclico e a confiabilidade contábil dos estoques.
                      - listitem [ref=e341]: Acompanhar o volume de estoques da unidade e buscar sinergias e reduções, visando o fluxo de caixa, além de acompanhar as entradas de insumos na unidade e alinhar com a equipe de Planejamento Integrado em caso de divergências de quantidade, valor ou qualidade dos insumos.
                      - listitem [ref=e342]: Acompanhar e apontar diferenças que existirem entre peso nota e peso balança de entrada dos insumos e combustíveis.
                      - listitem [ref=e343]: Identificar riscos que possam afetar o desempenho financeiro e operacional da Fábrica, desenvolvendo estratégias para mitigar esses riscos e garantir a sustentabilidade do negócio.
                      - listitem [ref=e344]: Liderar as reuniões de resultados do GPD - Gerenciamento pelas Diretrizes com a equipe da Fábrica, apresentando os resultados financeiros e de produção, bem como acompanhando a execução dos planos de ação.
                      - listitem [ref=e345]: Desenvolver conteúdos e realizar apresentações corporativas com informações referentes à performance técnica e financeira da Fábrica.
                      - listitem [ref=e346]: Assegurar a conformidade da Fábrica com as regulamentações financeiras, contábeis e fiscais aplicáveis.
