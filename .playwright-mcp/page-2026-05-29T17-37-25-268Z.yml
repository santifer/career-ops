            - paragraph [ref=e18]:
              - strong [ref=e19]: Who is Tenable?
            - paragraph [ref=e20]: Tenable® is the Exposure Management company. 44,000 organizations around the globe rely on Tenable to understand and reduce cyber risk. Our global employees support 65 percent of the Fortune 500, 45 percent of the Global 2000, and large government agencies. Come be part of our journey!
            - paragraph [ref=e21]:
              - strong [ref=e22]: What makes Tenable such a great place to work?
            - paragraph [ref=e23]: "Ask a member of our team and they’ll answer, “Our people!” We work together to build and innovate best-in-class cybersecurity solutions for our customers; all while creating a culture of belonging, respect, and excellence where we can be our best selves. When you’re part of our #OneTenable team, you can expect to partner with some of the most talented and passionate people in the industry, and have the support and resources you need to do work that truly matters. We deliver results that exceed expectations and we win together!"
          - generic [ref=e24]:
            - paragraph [ref=e25]: Tenable AI was formed following the acquisition of Apex, a pioneering AI security company. Founded in 2023, Apex quickly garnered significant attention from CISOs and prominent investors, including Sam Altman (OpenAI), Clem Delangue (Hugging Face), and venture capital firms Sequoia Capital and Index Ventures. The company swiftly established itself as an innovator in securing AI usage for both developers and everyday employees, addressing the increasing demand for securing AI usage, enforcing policies, and ensuring compliance at scale.
            - paragraph [ref=e26]:
              - generic [ref=e27]: "Your Opportunity:"
            - paragraph [ref=e28]:
              - generic [ref=e29]: Tenable AI is seeking a leading product manager to drive the future of AI security. This strategic role is at the core of Tenable’s fast-growing AI security business. The Product Manager plays a key role in the product life cycle, emphasizing customer requirements and generating and defining the product vision. As a product manager will work closely with multiple departments, including product management, engineering,
              - text: UI/X, sales, customer support, finance, and marketing, to ensure customer requirements are met.
            - paragraph [ref=e30]: If you have an entrepreneurial, creative, and technical mindset, we encourage you to apply.
            - paragraph [ref=e31]:
              - generic [ref=e32]: "Your Role:"
            - list [ref=e33]:
              - listitem [ref=e34]:
                - paragraph [ref=e35]: Closely with engineering and AI teams to define and build the AI security product
              - listitem [ref=e36]:
                - paragraph [ref=e37]: Research and determine the product roadmap
              - listitem [ref=e38]:
                - paragraph [ref=e39]: Work with all G2M teams (marketing, sales, sales engineering, customer support, and more) on positioning and selling our product and continuously delivering the best experience for our customers
            - paragraph [ref=e40]:
