                - text: "- Advanced level understanding of an internal control framework (specifically COSO) and a solid understanding of the concepts of control design and operational efficiency"
                - text: "- Experience with documenting accounting conclusions and related support"
                - text: "- Written and spoken fluency in English and Portuguese required"
