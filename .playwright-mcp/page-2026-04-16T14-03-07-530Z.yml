        - generic [ref=e45]:
          - generic [ref=e47]:
            - generic [ref=e48]:
              - heading "Description" [level=2] [ref=e49]
              - paragraph [ref=e50]:
                - text: At Amazon Brazil we value Diversity, Equity and Inclusion (DEI) in all our job positions, therefore, we act intentionally so that our internal environment reflects the plurality of the businesses we play and the customers we serve.
                - text: In Brazil, we have a Diversity, Equity and Inclusion squad, which is formed by representatives from different roles and areas, as we understand that this agenda must have different perspectives and multiple experiences. Our leadership is committed and understands more and more their role in sharing and acting on our leadership principles, with the purpose of ‘Strive to Be Earth's Best Employer’. Understanding our responsibility and our need for change, we are conscientious that ‘Success and Scale Bring Broad Responsibility’
                - text: "Our affinity groups are built from and by volunteers from different businesses and they are an active part of our DE&I strategies definition. Besides that, they act as ambassadors of this agenda, and they will support you from Day1. Remember, at Amazon ‘It’s always Day1’. Our groups are organized in the following fronts: BEN - Black Employee Network, Women@Amazon, Glamazon (LGBTQIA+) and People With Disabilities."
                - text: __________________________________________
                - text: Amazon is a fast paced, dynamic, high-tech company. The LATAM Stores Accounting organization supports our financial reporting, internal control, and also supports new business launches for Amazon in the consumer products, initiatives, merchant, operations, logistics and payments.
                - text: We are currently looking for a manager level candidate to help support the business growth in Amazon’s Sao Paulo, Brazil office. Successful candidates may have held manager accounting or finance positions in public or private companies and demonstrated experience in leading teams to accomplish unusually complex challenges is also expected.
                - text: Key job responsibilities
                - text: • Oversee financial accounting and reporting functions for the areas under your ownership, ensuring accuracy and compliance with accounting standards and internal policies
                - text: • Understand and implement internal control design principles, assessing the effectiveness of controls within your area of influence to maintain financial integrity
                - text: • Provide technical accounting knowledge and support to stakeholders, conducting accounting research and preparing technical memos as required
                - text: • Identify incomplete or inaccurate data, determine root causes, and execute fixes while partnering on resolutions that maintain the highest standards
                - text: • Drive process improvements by proposing changes and implementing enhancements to remediate gaps and scale controllership with measurable results
                - text: A day in the life
                - text: You'll collaborate with your manager to address priorities and provide technical accounting guidance to stakeholders, as well as performing the month-end-closing activities for the area under your scope. You'll apply your understanding of internal control design to assess effectiveness within your area. You may research accounting treatments for new business launches, prepare technical memos, and support leadership in Brazil with financial insights and reporting.
                - text: About the team
                - text: Our team is responsible for all accounting processes related to the Payments business in LATAM. We work collaboratively to ensure accurate financial reporting, effective controls, and technical accounting support for business operations. As the organization expands across Latin America, we play a crucial role in supporting new business launches and initiatives. We value team members who can provide technical expertise while maintaining high standards in our accounting practices.
