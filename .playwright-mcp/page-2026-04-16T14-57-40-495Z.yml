        - paragraph [ref=e156]:
          - strong [ref=e157]: "Nota importante:"
          - text: A todos os candidatos a emprego que desejem integrar a nossa equipa, informamos que a Siemens não solicita o pagamento de quaisquer taxas antes, durante ou após o processo de candidatura. Não pedimos dados bancários ou informações financeiras pessoais em troca de uma promessa de emprego. Da mesma forma, por favor, não abra documentos em e-mails que pareçam ter sido enviados por um recrutador da Siemens, a menos que tenha a certeza de que está a ser contactado por um dos nossos profissionais no âmbito de um processo de candidatura ativo.
