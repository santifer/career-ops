            - heading "Manager, Tax Management, Tax Engine Operations" [level=1] [ref=e38]
            - paragraph [ref=e40]: "Job ID: 10384135 | Amazon Logistica do Brasil"
          - link "Apply now for Manager, Tax Management, Tax Engine Operations" [ref=e43] [cursor=pointer]:
            - /url: https://www.amazon.jobs/applicant/jobs/10384135/apply
            - text: Apply now
        - generic [ref=e45]:
          - generic [ref=e47]:
            - generic [ref=e48]:
              - heading "Description" [level=2] [ref=e49]
              - paragraph [ref=e50]:
                - text: The Tax Engine team is hiring a Tax Manager with deep Brazil expertise to be a key member of our Global Tax Calculation Services Program based in São Paulo. The Global Tax Calculation Services Program is comprised of tax professionals and software engineers that are responsible for providing end-to-end global transaction tax calculation solutions (sales and use taxes, value-added taxes, good and services taxes, and other consumption taxes) to Amazon and thousands of other merchants selling on Amazon marketplaces and other e-commerce platforms.
                - text: This position is focused on Brazil marketplace operations, leading ICMS research - conducting comprehensive taxability research across all 27 states, analyzing intrastate and interstate scenarios - and Brazil Tax Reform implementation (CBS/IBS/IS) during reform period. This position will require overseeing configuration and ongoing maintenance of Amazon's transaction tax calculation software.
                - text: The manager will lead and develop a team of Tax Analysts supporting Brazil operations, building deep expertise in Brazilian Indirect Tax while fostering a culture of operational excellence and continuous learning. The candidate will work closely with local business partners, Tax Planning, and rest of members of the tax department, providing strategic guidance and support to Global Product Classification.
                - text: The individual in this role will lead critical tax research and classification work for Brazil's complex indirect tax landscape, taking ownership of end-to-end cross-functional tax-related projects and process improvements. The role requires fluent communication with Engineering teams and Applied Scientists to provide strategic direction on technical solutions to be incorporated into the system.
                - text: This position is office-based. Amazon encourages open communication about unique needs for flexible arrangements.
                - text: Key job responsibilities
                - text: "* Leading and developing a team of tax analysts supporting Brazil operations"
                - text: "* Hiring, onboarding, and mentoring team members to build deep Brazil tax expertise"
                - text: "* Managing team capacity, workload distribution, and prioritization across multiple initiatives"
                - text: "* Overseeing comprehensive ICMS tax research across all 27 Brazilian states, including intrastate and interstate rate scenarios"
                - text: "* Ensuring accurate determination of CST (Tax Situation Code) and cClassTrib (Tax Classification Code) combinations"
                - text: "* Managing dual tax regime operations during the 2026-2032 transition period in Brazil"
                - text: "* Reviewing and approving tax engine configurations through Amazon's software systems"
                - text: "* Providing support to the end-to-end Global transaction tax calculation solutions for a broad array of products and services"
                - text: "* Translating complex Brazilian tax legislation into technical requirements for Engineering, Applied Science, and Product teams"
                - text: "* Supporting internal and external Audits"
                - text: "* Supporting local business partners and tax department members with decisions on product taxability matters"
                - text: "* Fostering a culture of operational excellence, continuous learning, and customer obsession"
            - generic [ref=e51]:
              - heading "Basic Qualifications" [level=2] [ref=e52]
              - paragraph [ref=e53]:
                - text: "- Experience working in a large public accounting firm or multi-national corporate tax department"
                - text: "- Bachelor's degree in finance, accounting, business, economics, or a related analytical field (e.g., engineering, math, computer science), or a Bachelor's degree and experience in tax, finance or a related analytical field"
                - text: "- Experience researching indirect tax issues including taxability of products and services"
                - text: "- Experience that includes strong analytical skills, attention to detail, and effective communication abilities, or experience in SQL Server/MySQL"
                - text: "- Experience completing complex tasks quickly with little to no guidance and react with appropriate urgency to situations that require a quick turnaround, or experience with executive level calendar management"
                - text: "- Experience in communication and presentation skills, both written and verbal in Portuguese & English"
                - text: "- Knowledge of Microsoft Office products and applications (esp. MS Excel, Word) at an advanced level"
            - generic [ref=e54]:
              - heading "Preferred Qualifications" [level=2] [ref=e55]
              - paragraph [ref=e56]:
                - text: "- Experience maintaining and operating transaction tax calculation software (e.g. Vertex)"
                - text: "- Experience building and maintaining relationships with business partners"
                - text: "- Experience with Brazilian Tax Reform (Complementary Law 214/2025) - CBS, IBS, IS implementation"
                - text: "- Experience in tax content development, rule creation, or tax research management for technology platforms"
                - text: "- Proficiency in other languages would be an advantage"
                - text: Our inclusive culture empowers Amazonians to deliver the best results for our customers. If you have a disability and need a workplace accommodation or adjustment during the application and hiring process, including support for the interview or onboarding process, please visit
