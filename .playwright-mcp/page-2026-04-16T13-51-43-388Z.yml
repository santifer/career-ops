                  - heading "Sobre a vaga" [level=2] [ref=e397]
                  - paragraph [ref=e1637]:
                    - strong [ref=e1639]: About Umicore
                    - text: Reducing harmful vehicle emissions. Giving new life to used metals. Powering the cars of the future. As a global materials and technology group, we pioneer approaches to sustainability that continue to offer customers materials and solutions that are essential to everyday life. We aim to be a clear world leader in materials for clean mobility and recycling and have turned our sustainability approach into an even greater competitive advantage. To achieve this, however, we know we can’t stand still. We know we need to find new ways to do things, discover new solutions and develop new ideas. It’s why we invest so much in research & development. It’s why we push ourselves to tackle increasingly complex challenges. It’s why we strive to create a collaborative environment in which we can all succeed. It’s why we are looking for talented individuals to shape tomorrow by leading the way today. In an environment like this, imagine what you could do?
                    - strong [ref=e1641]: About Finance
                    - text: A global organization. It’s not just those in our industrial sites and technical center that are vital to Umicore’s growth. Across our support functions we ensure that we continue to grow and evolve – whether it’s by making sure our decisions are commercially viable, enhancing our reputation, building new customer relationships or finding the right people who can build on what we’ve already achieved. The variety of our work means we cannot stand still. We need to find new ways to do things, discover new solutions and develop new ideas. Which is where you come in.
                    - strong [ref=e1643]: What You Will Be Doing
                    - text: Executes and/or manages work in a range of Finance topics. Responsible for financial planning, analysis, and/or general accounting and controlling. Support the business as business partner and ensures the financial health and financial stability of the organization, aligning risk-taking decisions with long-term organizational goals.
                    - strong [ref=e1645]: Key Accountabilities
                    - listitem [ref=e1646]
                    - text: Leads and develops the local Finance team, ensuring clear objectives, performance feedback, and capability building across FP&A, Accounting, Tax, and Compliance.
                    - text: Translates corporate and functional priorities into actionable local plans, aligning resources and removing delivery obstacles to meet business objectives.
                    - text: Delivers accurate and timely financial planning, budgeting, and forecasting, providing insights to support local decision-making and performance management.
                    - text: Ensures robust accounting, tax compliance, and statutory reporting, maintaining adherence to local regulations and corporate standards.
                    - text: Implements and monitors governance and internal controls, proactively identifying risks and ensuring corrective actions are taken promptly.
                    - text: Drives process standardization and digital enablement at local level, leveraging available tools to improve efficiency and data accuracy.
                    - text: Partners with business leaders and cross-functional teams, acting as a trusted advisor to influence decisions and resolve escalations.
                    - text: Promotes continuous improvement and best practices, fostering a culture of accountability and operational excellence within the finance function.
                    - strong [ref=e1648]: Who We Are Looking For
                    - text: Manages several related or unrelated departments of a small sub-function.
                    - text: Focuses on tactical and operational plans with short-to mid-term timeframe.
                    - text: Lead negotiations on divergent issues that have an impact on the function or on business results.
                    - text: Projects faced hold greater complexity in terms of issues or problems encountered or organizational complexity.
                    - list [ref=e1650]:
                      - listitem [ref=e1651]: Academic formation in Accounting/Tax/Law.
                      - listitem [ref=e1652]: "Expert level in the following skills:"
                      - listitem [ref=e1653]: Finance Modeling
                      - listitem [ref=e1654]: Financial Analysis
                      - listitem [ref=e1655]: Program Management
                      - listitem [ref=e1656]: Budgeting
                      - listitem [ref=e1657]: Forecasting
                      - listitem [ref=e1658]: VarianceAnalysis
                      - listitem [ref=e1659]: Cost Accounting
                      - listitem [ref=e1660]: Accountability
                    - strong [ref=e1662]: What We Offer
                    - text: We aim to lead the way. Not just for our customers, but for our employees too. That is why we strive to create a collaborative environment in which we can all succeed, and a culture through which we can all share ideas, develop our expertise and advance our careers. We engage in building an inclusive work culture that offers equal opportunities for all employees irrespective of their diverse backgrounds. As you would expect from a world-leading organization, we will also reward your contribution with a competitive salary and benefits. With all this and more, imagine what you could do?
                    - text: We are committed to bringing diversity to our teams, if you are part of a minority group, please know that we are specifically looking for you. Our aim is to ensure that all voices are heard and fairly represented and we need input from people from all different backgrounds. We count on your participation to build an inclusive and diverse environment.
                    - strong [ref=e1664]: IF WE CAN BECOME A WORLD LEADER IN RECYCLING AND CLEAN MOBILITY, IMAGINE WHAT YOU COULD DO ?
