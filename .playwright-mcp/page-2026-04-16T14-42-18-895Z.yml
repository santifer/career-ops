          - strong [ref=e145]: "MAKE AN IMPACT ON MORE THAN JUST YOUR CAREER #PGDAY1"
          - text: Day 1. It’s something everyone experiences when they join a new company, whether they’re a student, a recent graduate, or a seasoned professional. P&G’s Day 1 starts with you doing something that matters – making an impact on the world, P&G brands, and your career.
          - text: We hire based on the potential we see in people, so here, you’ll be trusted to dive right in, take the lead, use your initiative, and build billion-dollar brands that help make everyday activities easier and make the world a better place. You’ll be doing meaningful work that takes your career places you never imagined. Join us, and you’ll be part of this effort from Day 1.
          - text: "From early on, you’ll be at the core of breakthrough innovations, be given exciting assignments, lead initiatives, and take ownership and responsibility. And you’ll do this in creative work spaces where new ideas flourish. All the while, you’ll receive world-class training to help you become a leader in your field. And it’s not just about what you’ll do, but how you’ll feel: welcomed, valued, purposeful, challenged, heard, and inspired."
