# ─── Email source ───
email:
  source_type: "script_generated"
  generator_script: "scripts/heartbeat.mjs"
  archive_dir: "data/heartbeat-archive"
  archive_filename_pattern: "heartbeat-{YYYY-MM-DD}.html"
  category: "operational-dashboard"
  send_schedule: "09:00 PT (Mon-Fri via com.mitchell.career-ops.heartbeat)"
  review_schedule: "09:30 PT (Mon-Fri via com.mitchell.career-ops.email-review)"

# ─── Audience ───
audience:
  segment: "self"
  context_before_read: "morning coffee, phone-first, dark-mode, pre-work scan, scattered-mode possible"
  primary_action_targets:
    - "click Apply on a queued role (Apply Pack → Apply)"
    - "click Send email on a due outreach"
    - "click Mark Applied after acting"
  decision_state: "runway-critical, anxious-leaning, scattered-mode-possible, INTJ-T / 4w3 / Ni-Te-Fi-Se"

# ─── CTA hierarchy ───
ctas:
  primary: "Open Apply Pack → Apply"
  secondary: "Send outreach email"
  tertiary: "Mark Applied"

# ─── Tracking-critical patterns (regex-blocked from any patch) ───
tracking_critical_patterns:
  - "#\\d+"                            # role IDs like #44, #48
  - "\\d+\\.\\d+\\s*/\\s*5"            # scores like 4.60 / 5
  - "[Aa]pply\\s+[Pp]ack"              # button copy → URL mapping
  - "[Mm]ark\\s+[Aa]pplied"
  - "day\\s+\\d+"                       # outreach day counters
  - "\\d+\\s+touches"
  - "Generated:.*Z"                     # timestamps
  - "heartbeat\\.mjs"
  - "scripts/.*\\.mjs"
  - "data/.*\\.md"
  - "writing-samples/.*"

# ─── Repo + implementation target ───
repo:
  root: "/Users/mitchellwilliams/Documents/career-ops"
  environment: "single"                # career-ops is single-env (no staging)
  branch_strategy: "feature-branch"
  base_branch: "main"
  pr_mode: "draft"
  commit_message_prefix: "email-review:"

# ─── Brain + Mitchell's psychological architecture ───
brain:
