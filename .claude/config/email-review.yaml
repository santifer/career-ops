# ─── Career-ops corpus paths (resolved against actual repo state) ───
corpus:
  voice_reference: "writing-samples/voice-reference.md"
  cv: "cv.md"
  profile_file: "modes/_profile.md"          # may be absent — wizard noted only template present
  story_bank_file: "interview-prep/story-bank.md"
  modes_dir: "modes"
  data_dir: "data"
  reports_dir: "reports"
  runway_status_source: "lib/heartbeat-system-banner.mjs"

# ─── Safety + cost caps ───
caps:
  max_turns: 40
  max_budget_usd: 1.50
  monthly_review_budget_usd: 30
  dispatch_mode: "serial"
  parallel_mode_override: "interactive_only"

# ─── Adjudication ───
adjudication:
  cap_findings_critical_high: 5
  cap_findings_medium: 3
  archive_rest: true
  confidence_floor_for_auto_apply: 0.95
  council_threshold_unanimous_or_3of4: true
  block_if_touches_tracking_critical: true
  block_if_not_reversible: true

# ─── Novelty rotation (analytical lens per weekday) ───
novelty_rotation:
  monday: "copy_hierarchy"
  tuesday: "visual_rhythm_and_spacing"
  wednesday: "action_conversion_friction"
  thursday: "accessibility_and_mobile_rendering"
  friday: "weekly_council_retrospective"
  saturday: "skip"
  sunday: "skip"

# ─── Reporting ───
reporting:
  daily_report_path: ".claude/audit/email-review/{date}-report.md"
  weekly_digest_path: ".claude/audit/email-review/weekly-{ISO-week}-impact.md"
  weekly_digest_day: "friday"
  effort_acknowledgment: true

# ─── /council adapter (wizard-discovered) ───
council:
  signature_kind: "natural_language"
  adapter_path: ".claude/agents/_adapters/council-adapter.md"
  underlying_lib: "lib/council.mjs"
  per_invocation_cost_usd_range: [7, 15]
  approval_gated: true
