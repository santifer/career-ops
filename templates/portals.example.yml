# Konfiguracja skanera portali — SZABLON (wersja polska)
# Skopiuj ten plik do portals.yml w katalogu głównym projektu, a potem dostosuj.
#
# Używane przez /career-ops scan do automatycznego odkrywania nowych ofert.
#
# Strategia (4 poziomy):
#   0. Lokalny parser → skrypt `parser:` per firma dla stron SSR/statycznych (zero-token)
#   1. Playwright → careers_url każdej firmy (czas rzeczywisty, niezawodne)
#   2. HTTP JSON (WebFetch) → `api:` per firma na tracked_companies
#   3. WebSearch z filtrami site: (szerokie odkrywanie, może być nieaktualne)
#
# WAŻNE: Każda firma w tracked_companies MUSI mieć careers_url.
#   Preferuj firmowy (brandowany) URL kariery zawsze, gdy dostępny; URL hostowany przez ATS tylko jako fallback.
#   ✅ https://careers.mastercard.com   ⚠️ https://mastercard.wd1.myworkdayjobs.com (tylko fallback)
#   Wyjątek: URL ATS jest akceptowalny, gdy firma nie ma własnej strony kariery.
#   Użycie surowych URL-i ATS, gdy istnieje strona firmowa, może powodować fałszywe błędy 410 (niezgodność ID oferty).
#
# JAK DOSTOSOWAĆ:
#   1. Skopiuj ten plik do portals.yml w katalogu głównym
#   2. Edytuj title_filter.positive słowami kluczowymi TWOICH docelowych ról
#   3. Dodaj/usuń firmy w tracked_companies
#   4. Dostosuj search_queries pod preferowane polskie tablice ofert
#   5. Ustaw enabled: false na firmach, które Cię nie interesują
#
# Uwaga o polskim rynku:
#   - Dominują kontrakty B2B (faktura) obok umowy o pracę (UoP) i umowy zlecenie
#   - Większość ofert IT podaje widełki w PLN (brutto UoP lub netto+VAT B2B)
#   - Popularne benefity: prywatna opieka medyczna (Medicover/Luxmed), Multisport,
#     dofinansowanie szkoleń, sprzęt, praca zdalna/hybrydowa
#   - Główne huby: Warszawa, Kraków, Wrocław, Trójmiasto, Poznań, Katowice, Łódź

# -- Filtr lokalizacji (opcjonalny) --
# Filtruje skanowane oferty po lokalizacji. Stosowany PO filtrze tytułu, PRZED dedup.
# Jeśli cały ten blok jest nieobecny, wszystkie lokalizacje przechodzą (zachowanie domyślne).
#
# Semantyka (substring bez rozróżniania wielkości liter, w tej kolejności):
#   - Pusta lokalizacja w ofercie → przechodzi (nie karz brakujących danych)
#   - Obecne jakiekolwiek słowo `always_allow` → przechodzi (priorytet nad `block`)
#   - Obecne jakiekolwiek słowo `block` → odrzuć
#   - `allow` puste → przechodzi (już minęło block)
#   - `allow` niepuste → musi pasować co najmniej jedno słowo
#
# Przykład poniżej celuje w Polskę + zdalne EU. Dostosuj do swojej geografii. Odkomentuj, by włączyć.

# location_filter:
#   always_allow:
#     - "Poland"
#     - "Polska"
#     - "Warszawa"
#   allow:
#     - "Remote"
#     - "Zdalna"
#     - "Zdalnie"
#     - "Poland"
#     - "Polska"
#     - "Warsaw"
#     - "Kraków"
#     - "Wrocław"
#     - "EMEA"
#     - "Europe"
#   block:
#     - "India"
#     - "Bengaluru"
#     - "United States"
#     - "Singapore"
#     - "Brazil"

# -- Filtr tytułu --
# Skaner używa tych słów kluczowych, by zdecydować, czy tytuł jest trafny.
# Co najmniej 1 positive musi pasować ORAZ 0 negatives może pasować (bez rozróżniania wielkości liter).
#
# [DOSTOSUJ] Domyślnie filtr celuje w role AI/ML/automatyzacja (oryginalne przeznaczenie
# systemu). Jeśli szukasz ogólnych ról IT, zastąp positive np.: "Backend", "Frontend",
# "Full Stack", "DevOps", "Python", "Java", "Software Engineer", "Programista".

title_filter:
  positive:
    # -- Role AI/ML --
    - "AI"
    - "ML"
    - "LLM"
    - "Agent"
    - "Agentic"
    - "GenAI"
    - "Generative AI"
    - "NLP"
    - "LLMOps"
    - "MLOps"
    - "Machine Learning"
    - "Sztuczna inteligencja"
    # -- Role inżynierskie --
    - "Platform Engineer"
    - "Solutions Architect"
    - "Solutions Engineer"
    - "Forward Deployed"
    - "Customer Engineer"
    - "Integration Engineer"
    - "Software Engineer"
    - "Backend"
    - "Programista"
    # -- Role produktowe --
    - "Product Manager"
    - "Technical PM"
    # -- Role automatyzacyjne --
    - "Automation"
    - "Automatyzacja"
    - "Low-Code"
    - "No-Code"
    - "RevOps"
    - "Business Systems"
  negative:
    # [DOSTOSUJ] Słowa kluczowe ról, które chcesz wykluczyć
    - "Junior"
    - "Intern"
    - "Praktykant"
    - "Staż"
    - "Stażysta"
    - "iOS"
    - "Android"
    - "Embedded"
    - "Firmware"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "Mainframe"
    - "COBOL"
  seniority_boost:
    # Te prefiksy podnoszą trafność, ale nie są wymagane
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"
    - "Director"
    - "Kierownik"

# -- Zapytania wyszukiwania --
# Każde zapytanie uruchamia WebSearch. Użyj site:, by filtrować po portalu.
# Skaner wyciąga tytuł, URL i firmę z wyników.

search_queries:

  # ============================================================
  # -- Polskie tablice ofert IT --
  # ============================================================

  - name: justjoin.it — AI/ML & Senior
    query: 'site:justjoin.it "AI" OR "ML" OR "Machine Learning" OR "Senior" Backend OR Python OR "Solutions"'
    enabled: true

  - name: NoFluffJobs — AI/ML & Senior
    query: 'site:nofluffjobs.com "AI" OR "Machine Learning" OR "Senior" "Backend" OR "Python" OR "Architect"'
    enabled: true

  - name: theprotocol.it — AI/Senior
    query: 'site:theprotocol.it "AI" OR "Machine Learning" OR "Senior" OR "Lead" "Engineer" OR "Architect"'
    enabled: true

  - name: pracuj.pl — IT Senior/AI
    query: 'site:pracuj.pl "AI" OR "Machine Learning" OR "Senior Software" OR "Solutions Architect" praca zdalna'
    enabled: true

  - name: bulldogjob — AI/Senior
    query: 'site:bulldogjob.pl "AI" OR "Machine Learning" OR "Senior" OR "Lead" "Engineer" OR "Architect"'
    enabled: true

  - name: rocketjobs.pl — Tech/AI
    query: 'site:rocketjobs.pl "AI" OR "Senior" OR "Lead" "Engineer" OR "Product" OR "Architect"'
    enabled: true

  - name: solid.jobs — IT Senior
    query: 'site:solid.jobs "AI" OR "Senior" OR "Lead" "Engineer" OR "Architect" OR "Python"'
    enabled: true

  - name: LinkedIn — Poland Tech/AI
    query: 'site:linkedin.com/jobs "AI Engineer" OR "Machine Learning" OR "Solutions Architect" OR "Senior" Poland OR Polska OR Warszawa OR Kraków'
    enabled: true

  # ============================================================
  # -- Międzynarodowe tablice (firmy rekrutujące zdalnie w UE) --
  # ============================================================

  - name: Ashby — AI Engineer (remote EU)
    query: 'site:jobs.ashbyhq.com "AI Engineer" OR "LLM Engineer" OR "Forward Deployed" remote Europe'
    enabled: true

  - name: Greenhouse — AI Engineer (remote EU)
    query: 'site:job-boards.greenhouse.io "AI Engineer" OR "LLM" OR "Agentic" remote Europe'
    enabled: true

  - name: Greenhouse — Solutions Architect (remote EU)
    query: 'site:job-boards.greenhouse.io "Solutions Architect" OR "Forward Deployed" AI remote Europe'
    enabled: true

  - name: Remotive — AI/SA/FDE Europe
    query: 'site:remotive.com "AI Engineer" OR "Solutions Architect" OR "Forward Deployed" Europe'
    enabled: true

  - name: Himalayas — Remote AI Europe
    query: 'site:himalayas.app "AI Engineer" OR "Solutions Architect" OR "Forward Deployed" Europe'
    enabled: true

  - name: RemoteOK — AI/SA
    query: 'site:remoteok.com "AI Engineer" OR "Solutions Architect" OR "Forward Deployed" OR "Founding Engineer"'
    enabled: true

  - name: ai-jobs.net — Applied AI Europe
    query: 'site:ai-jobs.net "AI Engineer" OR "Applied AI" OR "Solutions Architect" OR "Forward Deployed" remote Europe'
    enabled: true

# -- Śledzone firmy --
# Firmy, których strony kariery są sprawdzane bezpośrednio.
# scan_method: playwright (domyślnie), websearch, local_parser
# Dla firm na Greenhouse dodaj pole api: dla szybszego dostępu do strukturalnego JSON.
#
# Auto-wykrywanie providera (scan.mjs) — rozpoznawane wzorce URL:
#   greenhouse      job-boards(.eu)?.greenhouse.io/<slug>  (lub pole api:)
#   ashby           jobs.ashbyhq.com/<slug>
#   lever           jobs.lever.co/<slug>
#   workable        apply.workable.com/<slug>
#   smartrecruiters (careers|jobs).smartrecruiters.com/<slug>
#   recruitee       <slug>.recruitee.com

tracked_companies:

  # ============================================================
  # -- Polskie firmy / polskie biura (skanowalne przez ATS) --
  # ============================================================
  # Wiele polskich firm IT nie wystawia publicznego API ATS na careers_url —
  # scan.mjs je pominie (wymaga wykrywalnego ATS). Wklej URL konkretnej oferty
  # do data/pipeline.md i uruchom /career-ops pipeline (używa Playwright/WebFetch).

  - name: Allegro
    careers_url: https://allegro.tech/jobs
    scan_method: websearch
    scan_query: 'site:allegro.tech/jobs OR "allegro" careers "Engineer" OR "Senior" OR "AI" OR "ML"'
    notes: "Poznań/Warszawa/Kraków/Wrocław. Największa polska platforma e-commerce, duży zespół tech."
    enabled: true

  - name: DocPlanner (ZnanyLekarz)
    careers_url: https://jobs.lever.co/docplanner
    notes: "Warszawa/Barcelona. Healthtech (ZnanyLekarz/Docplanner). Rekrutacja zdalna EU."
    enabled: true

  - name: Brainly
    careers_url: https://jobs.lever.co/brainly
    scan_method: websearch
    scan_query: 'site:jobs.lever.co/brainly OR "brainly" careers "Engineer" OR "AI" OR "ML"'
    notes: "Kraków. Edtech z silnym wykorzystaniem AI/ML."
    enabled: true

  # ============================================================
  # -- Europejskie firmy AI/tech (rekrutacja zdalna/EU) --
  # ============================================================

  - name: Anthropic
    careers_url: https://job-boards.greenhouse.io/anthropic
    api: https://boards-api.greenhouse.io/v1/boards/anthropic/jobs
    enabled: true

  - name: Mistral AI
    careers_url: https://jobs.lever.co/mistral
    notes: "Paryż. Europejskie laboratorium AI."
    enabled: true

  - name: DeepL
    careers_url: https://jobs.ashbyhq.com/DeepL
    scan_method: websearch
    scan_query: 'site:jobs.ashbyhq.com/DeepL'
    notes: "Kolonia DE. Tłumaczenia i AI językowe, rekrutacja w UE."
    enabled: true

  - name: n8n
    careers_url: https://jobs.ashbyhq.com/n8n
    scan_method: websearch
    scan_query: 'site:jobs.ashbyhq.com/n8n'
    notes: "Berlin + zdalnie UE/US. Automatyzacja workflow."
    enabled: true

  - name: Zapier
    careers_url: https://jobs.ashbyhq.com/zapier
    scan_method: websearch
    scan_query: 'site:jobs.ashbyhq.com/zapier'
    notes: "Remote-first. Lider platform automatyzacji."
