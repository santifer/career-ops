<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
<meta charset="UTF-8">
<title>{{NAME}} — CV</title>
<style>
  /* Brian Washington CV — layout per BW_CV_FORMATTING_SPEC.md (Arial, US Letter, 1 page) */
  @page { size: {{PAGE_SIZE}}; margin: 0.35in 0.43in 0.31in 0.43in; }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  body {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 8.5pt;
    line-height: 1.35;
    color: #1a1a1a;
    background: #ffffff;
  }

  .page {
    width: 100%;
    max-width: 7.64in;
    margin: 0 auto;
  }

  /* === HEADER (centered) === */
  .header { text-align: center; margin-bottom: 8px; }

  .header h1 {
    font-size: 13pt;
    font-weight: bold;
    color: #1a1a1a;
    margin-bottom: 4px;
    line-height: 1.15;
  }

  .header .subtitle {
    font-size: 9pt;
    color: #2b5c8a;
    margin-bottom: 6px;
    line-height: 1.3;
  }

  .header .contact-row {
    font-size: 8pt;
    color: #444444;
    line-height: 1.4;
  }

  .header .contact-row a {
    color: #0563c1;
    text-decoration: underline;
  }

  .header .contact-row .sep { color: #999; margin: 0 4px; }

  /* === SECTIONS === */
  .section { margin-bottom: 10px; }

  .section-title {
    font-size: 9.5pt;
    font-weight: bold;
    color: #2b5c8a;
    text-align: left;
    border-bottom: 0.5pt solid #2b5c8a;
    padding-bottom: 2px;
    margin-bottom: 6px;
    margin-top: 10px;
  }

  .section:first-of-type .section-title { margin-top: 0; }

  .summary-text {
    font-size: 8.5pt;
    color: #444444;
    line-height: 1.4;
    margin-top: 4px;
  }

  /* === COMPETENCY TABLE (2 col, no borders) === */
  .competency-table {
    width: 100%;
    border-collapse: collapse;
    border: none;
    margin-top: 4px;
  }

  .competency-table td {
    width: 50%;
    vertical-align: top;
    border: none;
    padding: 3px 8px 3px 0;
    font-size: 8pt;
    color: #444444;
    line-height: 1.35;
  }

  .competency-table td + td { padding-left: 8px; padding-right: 0; }

  .comp-label {
    font-weight: bold;
    color: #2b5c8a;
    font-size: 8pt;
    margin-bottom: 3px;
  }

  /* === WORK EXPERIENCE === */
  .job { margin-bottom: 8px; break-inside: avoid; page-break-inside: avoid; }

  .job-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
    margin-top: 8px;
    margin-bottom: 3px;
  }

  .job-header-left {
    flex: 1;
    min-width: 0;
    font-size: 8.5pt;
    line-height: 1.3;
  }

  .job-role { font-weight: bold; color: #1a1a1a; }

  .job-meta { font-weight: normal; color: #444444; }

  .job-date {
    font-size: 8.5pt;
    font-weight: bold;
    color: #444444;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .job-desc {
    font-size: 8pt;
    font-style: italic;
    color: #444444;
    margin-bottom: 4px;
    line-height: 1.3;
  }

  .job ul {
    padding-left: 14px;
    margin: 0;
  }

  .job li {
    font-size: 8.5pt;
    color: #1a1a1a;
    line-height: 1.35;
    margin-bottom: 2px;
  }

  .job li strong { font-weight: bold; color: #1a1a1a; }

  /* === EDUCATION === */
  .edu-item { margin-bottom: 4px; break-inside: avoid; }

  .edu-line {
    font-size: 8pt;
    color: #1a1a1a;
    line-height: 1.35;
  }

  .edu-line strong { font-weight: bold; }

  .edu-line .edu-gray { color: #444444; font-weight: normal; }

  .edu-note {
    font-size: 8pt;
    font-style: italic;
    color: #444444;
    margin-top: 1px;
  }

  /* === TECHNICAL BACKGROUND TABLE === */
  .tech-table {
    width: 100%;
    border-collapse: collapse;
    border: none;
    margin-top: 4px;
  }

  .tech-table tr { break-inside: avoid; }

  .tech-table td {
    border: none;
    padding: 2px 0;
    font-size: 8pt;
    vertical-align: top;
  }

  .tech-table td:first-child {
    width: 22%;
    font-weight: bold;
    color: #1a1a1a;
    padding-right: 8px;
    white-space: nowrap;
  }

  .tech-table td:last-child {
    color: #444444;
  }

  @media print {
    body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .job, .edu-item, .section { break-inside: avoid; page-break-inside: avoid; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <h1>{{NAME}}</h1>
    <div class="subtitle">{{SUBTITLE}}</div>
    <div class="contact-row">{{CONTACT_ROW}}</div>
  </div>

  <div class="section">
    <div class="section-title">{{SECTION_SUMMARY}}</div>
    <div class="summary-text">{{SUMMARY_TEXT}}</div>
  </div>

  <div class="section">
    <div class="section-title">{{SECTION_COMPETENCIES}}</div>
    <table class="competency-table">
      <tr>
        <td>
          <div class="comp-label">PRODUCT &amp; STRATEGY</div>
          {{COMPETENCY_COL1}}
        </td>
        <td>
          <div class="comp-label">TECHNICAL &amp; RESEARCH</div>
          {{COMPETENCY_COL2}}
        </td>
      </tr>
    </table>
  </div>

  <div class="section">
    <div class="section-title">{{SECTION_EXPERIENCE}}</div>
    {{EXPERIENCE}}
  </div>

  <div class="section">
    <div class="section-title">{{SECTION_EDUCATION}}</div>
    {{EDUCATION}}
  </div>

  <div class="section">
    <div class="section-title">{{SECTION_TECH}}</div>
    {{TECH_BACKGROUND}}
  </div>

</div>
</body>
</html>
