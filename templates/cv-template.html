<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{NAME}} — CV</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  body {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 11px;
    line-height: 1.6;
    color: #1a1a1a;
    background: #ffffff;
  }

  .page {
    width: 100%;
    max-width: {{PAGE_WIDTH}};
    margin: 0 auto;
    padding: 32px 40px;
  }

  /* === HEADER === */
  .header {
    text-align: center;
    margin-bottom: 16px;
  }

  .header h1 {
    font-size: 26px;
    font-weight: bold;
    color: #1a1a1a;
    letter-spacing: 0.02em;
    margin-bottom: 6px;
  }

  .contact-row {
    font-size: 10.5px;
    color: #333;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 0 2px;
    line-height: 1.6;
  }

  .contact-row a {
    color: #2563eb;
    text-decoration: none;
  }

  .separator {
    color: #888;
    margin: 0 3px;
  }

  /* === SECTIONS === */
  .section {
    margin-bottom: 14px;
  }

  .section-title {
    font-size: 11px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #2563eb;
    border-bottom: 1px solid #e2e2e2;
    padding-bottom: 2px;
    margin-bottom: 8px;
  }

  /* === PROFILE SUMMARY === */
  .summary-text {
    font-size: 11px;
    line-height: 1.7;
    color: #1a1a1a;
  }

  /* Links must never break across lines */
  a {
    white-space: nowrap;
  }

  /* === WORK EXPERIENCE === */
  .job {
    margin-bottom: 12px;
  }

  .job-title {
    font-size: 11px;
    font-weight: bold;
    color: #1a1a1a;
  }

  .job-meta {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .job-company {
    font-style: italic;
    font-size: 11px;
    color: #333;
  }

  .job-period {
    font-style: italic;
    font-size: 10.5px;
    color: #333;
    white-space: nowrap;
  }

  .job ul {
    padding-left: 18px;
    margin-top: 4px;
  }

  .job li {
    font-size: 10.5px;
    line-height: 1.65;
    color: #1a1a1a;
    margin-bottom: 3px;
  }

  .job li strong {
    font-weight: bold;
  }

  /* === SKILLS === */
  .skills-list {
    list-style: disc;
    padding-left: 18px;
  }

  .skills-list li {
    font-size: 10.5px;
    line-height: 1.8;
    color: #1a1a1a;
  }

  /* === EDUCATION === */
  .edu-item {
    margin-bottom: 6px;
  }

  .edu-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .edu-org {
    font-weight: bold;
    font-size: 11px;
    color: #1a1a1a;
  }

  .edu-year {
    font-style: italic;
    font-size: 10.5px;
    color: #333;
    white-space: nowrap;
  }

  .edu-degree {
    font-style: italic;
    font-size: 10.5px;
    color: #333;
  }

  .edu-gpa {
    font-size: 10.5px;
    color: #333;
  }

  /* === PRINT === */
  @media print {
    .page { padding: 0; }
  }

  /* === PAGE BREAK CONTROL === */
  .avoid-break,
  .job,
  .edu-item {
    break-inside: avoid;
    page-break-inside: avoid;
  }
</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <div class="header avoid-break">
    <h1>{{NAME}}</h1>
    <div class="contact-row">
      <span>{{PHONE}}</span>
      <span class="separator">·</span>
      <a href="mailto:{{EMAIL}}">{{EMAIL}}</a>
      <span class="separator">·</span>
      <a href="{{LINKEDIN_URL}}">{{LINKEDIN_DISPLAY}}</a>
      <span class="separator">·</span>
      <a href="{{PORTFOLIO_URL}}">{{PORTFOLIO_DISPLAY}}</a>
      <span class="separator">·</span>
      <span>{{LOCATION}}</span>
    </div>
  </div>

  <!-- PROFILE SUMMARY -->
  <div class="section avoid-break">
    <div class="section-title">{{SECTION_SUMMARY}}</div>
    <div class="summary-text">{{SUMMARY_TEXT}}</div>
  </div>

  <!-- WORK EXPERIENCE -->
  <div class="section">
    <div class="section-title">{{SECTION_EXPERIENCE}}</div>
    {{EXPERIENCE}}
  </div>

  <!-- TECHNICAL SKILLS -->
  <div class="section avoid-break">
    <div class="section-title">{{SECTION_SKILLS}}</div>
    {{SKILLS}}
  </div>

  <!-- EDUCATION -->
  <div class="section avoid-break">
    <div class="section-title">{{SECTION_EDUCATION}}</div>
    {{EDUCATION}}
  </div>

</div>
</body>
</html>
